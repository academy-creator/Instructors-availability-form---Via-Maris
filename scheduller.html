          }
          dayGhosts = dayGhosts.filter(g => !myGhosts.includes(g));
        }
      }
    }

    // FINAL HARD-RULES CLEANUP #2 (after ALL shift passes): re-check gap/max/min for final state.
    {
      const byInstDate = {};
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date || !s.startHour) return;
        const k = `${s.instructorId}_${s.date}`;
        if (!byInstDate[k]) byInstDate[k] = [];
        byInstDate[k].push(s);
      });
      Object.keys(byInstDate).forEach(k => {
        const items = byInstDate[k].slice().sort((a,b) => timeToMin(a.startHour) - timeToMin(b.startHour));
        if (items.length === 0) return;
        const inst = instructors.find(i => i.id === items[0].instructorId);
        if (!inst) return;
        const maxNoBreak = inst.maxHoursPerDayNoBreak ?? 6;
        const maxWithBreak = inst.maxHoursPerDayWithBreak ?? 8;
        const min = inst.allowSingleActivity ? 0 : (inst.minHoursPerDay ?? 5);
        let changed = true;
        let iter = 0;
        while (changed && items.length > 0 && iter++ < 20) {
          changed = false;
          // Gap rule: any gap > 60 → strip non-_userEdited
          for (let i = 0; i < items.length-1; i++) {
            const gap = timeToMin(items[i+1].startHour) - timeToMin(items[i].endHour);
            if (gap > 60) {
              const stripIdx = items.findIndex(it => !it._userEdited);
              if (stripIdx < 0) break;
              const stripped = items[stripIdx];
              stripped.instructorId = null; stripped.instructorName = null;
              stripped.status = 'no_instructor';
              stripped.rejectSummary = (stripped.rejectSummary?stripped.rejectSummary+' · ':'') + `${inst.name} פער > שעה`;
              items.splice(stripIdx, 1);
              changed = true;
              break;
            }
          }
          if (changed) continue;
          // Daily max hours
          const total = items.reduce((sum, s) => sum + (timeToMin(s.endHour) - timeToMin(s.startHour))/60, 0);
          let hasBreak = false;
          for (let i = 0; i < items.length-1; i++) {
            if (timeToMin(items[i+1].startHour) - timeToMin(items[i].endHour) >= 60) hasBreak = true;
          }
          const limit = hasBreak ? maxWithBreak : maxNoBreak;
          if (total > limit) {
            const stripIdx = items.findIndex(it => !it._userEdited);
            if (stripIdx < 0) break;
            const stripped = items[stripIdx];
            stripped.instructorId = null; stripped.instructorName = null;
            stripped.status = 'no_instructor';
            stripped.rejectSummary = (stripped.rejectSummary?stripped.rejectSummary+' · ':'') + `${inst.name} מעל מקס יומי (${total.toFixed(1)}/${limit})`;
            items.splice(stripIdx, 1);
            changed = true;
            continue;
          }
          // Min hours
          if (!inst.allowSingleActivity && total < min) {
            const stripIdx = items.findIndex(it => !it._userEdited);
            if (stripIdx < 0) break;
            const stripped = items[stripIdx];
            stripped.instructorId = null; stripped.instructorName = null;
            stripped.status = 'no_instructor';
            stripped.rejectSummary = `${inst.name} מתחת למינ׳ יומי (${total}/${min}ש׳)`;
            items.splice(stripIdx, 1);
            changed = true;
            continue;
          }
        }
      });
    }

    // FINAL VALIDATION: drop any non-_userEdited item whose slot is outside the boat's current frames.
    // This catches schedule items left over from a previous boat configuration.
    function slotFitsAnyFrame(boatId, startHour, endHour) {
      const boat = boats.find(b => b.id === boatId);
      if (!boat) return false;
      const frames = getBoatFrames(boat);
      if (!frames.length) return false;
      const startMin = timeToMin(startHour);
      const endMin = timeToMin(endHour);
      // Activity must fit within a single SLOT (not just the frame). A slot is one interval.
      return frames.some(f => {
        if (!f || !f.startTime) return false;
        const interval = Number(f.slotInterval) || 3;
        const intervalMin = interval * 60;
        const [sh,sm] = f.startTime.split(':').map(Number);
        const [eh,em] = (f.endTime||'22:00').split(':').map(Number);
        const frameStart = sh*60+sm, frameEnd = eh*60+em;
        // Check each slot in the frame
        for (let slotStart = frameStart; slotStart + intervalMin <= frameEnd; slotStart += intervalMin) {
          const slotEnd = slotStart + intervalMin;
          if (startMin >= slotStart && endMin <= slotEnd) return true;
        }
        return false;
      });
    }
    let outOfFrame = 0;
    newSchedule.forEach(s => {
      if (!s.boatId || !s.startHour || !s.endHour) return;
      if (!slotFitsAnyFrame(s.boatId, s.startHour, s.endHour)) {
        s.outOfFrame = true;

        // For auto-scheduled items: strip instructor. For _userEdited: keep but mark.
        if (!s._userEdited) {
          s.instructorId = null;
          s.instructorName = null;
          s.status = 'no_slot';

        }
      }
    });

    // ========================================================================
    // FINAL HARD-RULE VALIDATOR — SAFETY NET (v5.65)
    // Scans every (instructor, date) and STRIPS any item that violates a hard rule:
    //  • allowSingleActivity gap rule (≤1h between same-day items)
    //  • maxFridaysPerMonth / maxSaturdaysPerMonth
    //  • allowConsecutiveWeekend (Fri D + Sat D+1 forbidden if disallowed)
    //  • daily max hours (no-break / with-break)
    //  • inter-slot gap >1h forbidden
    // Stripping = set instructorId=null, mark _strippedByValidator with reason.
    // Skips _userEdited items.
    // ========================================================================
    let validatorStripped = 0;
    const validatorReasons = [];
    {
      const t2m = (t) => { const [h,m] = t.split(':').map(Number); return h*60+m; };
      // Group by (instructor, date)
      const byInstDate = {};
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date || !s.startHour) return;
        if (s._userEdited) return; // never touch user-edited
        const k = `${s.instructorId}_${s.date}`;
        if (!byInstDate[k]) byInstDate[k] = [];
        byInstDate[k].push(s);
      });
      // Also build per-instructor sets of Fri/Sat dates
      const friByInst = {}, satByInst = {};
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date || !s.startHour) return;
        if (s.dayOfWeek === 5) { (friByInst[s.instructorId] ||= new Set()).add(s.date); }
        if (s.dayOfWeek === 6) { (satByInst[s.instructorId] ||= new Set()).add(s.date); }
      });
      const stripItem = (item, reason) => {
        if (item._userEdited) return;
        item.instructorId = null;
        item.instructorName = null;
        item.status = 'no_instructor';
        item._strippedByValidator = reason;
        item.rejectSummary = (item.rejectSummary ? item.rejectSummary + ' · ' : '') + 'מנקה (validator): ' + reason;
        validatorStripped++;
        validatorReasons.push(reason);
      };
      // 1) Per-(inst,date): allowSingle gap + daily max + gap>1h
      Object.keys(byInstDate).forEach(k => {
        let items = byInstDate[k].slice().sort((a,b) => t2m(a.startHour) - t2m(b.startHour));
        const inst = instructors.find(i => i.id === items[0].instructorId);
        if (!inst) return;
        const allowSingle = !!inst.allowSingleActivity;
        const maxNoBreak = inst.maxHoursPerDayNoBreak ?? 6;
        const maxWithBreak = inst.maxHoursPerDayWithBreak ?? 8;
        // Iteratively strip last-added items until rules pass.
        // Order of stripping: items added by less-strict passes first (weekend-fill, bundled, shifts), then main.
        const placePriority = (s) => {
          if (s._weekendFill) return 0; // strip first
          if (s._bundled) return 1;
          if (s._dateShifted) return 2;
          if (s._activityShifted) return 3;
          if (s._placedBy === 'swap') return 4;
          return 5; // main loop placement = strip last
        };
        let safety = 20;
        while (safety-- > 0) {
          items = items.filter(it => it.instructorId); // exclude already-stripped
          if (items.length === 0) break;
          // allowSingle gap rule
          let viol = null;
          if (allowSingle && items.length >= 2) {
            for (let i = 0; i < items.length - 1; i++) {
              const gap = t2m(items[i+1].startHour) - t2m(items[i].endHour);
              if (gap <= 60) { viol = {reason: 'allowSingle gap≤1h', items: [items[i], items[i+1]]}; break; }
            }
          }
          // Inter-slot gap > 1h forbidden
          if (!viol && items.length >= 2) {
            for (let i = 0; i < items.length - 1; i++) {
              const gap = t2m(items[i+1].startHour) - t2m(items[i].endHour);
              if (gap > 60) { viol = {reason: 'גאפ>1h', items: [items[i], items[i+1]]}; break; }
            }
          }
          // Daily max hours
          if (!viol) {
            const totalH = items.reduce((s,it) => s + (t2m(it.endHour)-t2m(it.startHour))/60, 0);
            let hasBreak = false;
            for (let i = 0; i < items.length - 1; i++) {
              const gap = t2m(items[i+1].startHour) - t2m(items[i].endHour);
              if (gap >= 60) hasBreak = true;
            }
            const limit = hasBreak ? maxWithBreak : maxNoBreak;
            if (totalH > limit) {
              const last = items.slice().sort((a,b) => placePriority(a) - placePriority(b))[0];

            }
          }
          if (!viol) break;

          const target = viol.items.slice().sort((a,b) => placePriority(a) - placePriority(b))[0];

      //    SKIP dates where instructor has work-marked availability (override allowed).
      Object.keys(friByInst).forEach(iid => {

        const maxF = inst.maxFridaysPerMonth ?? 1;

          newSchedule.filter(s => s.instructorId === iid && s.date === drop && s.dayOfWeek === 5 && !s._userEdited).forEach(s => stripItem(s, `maxFri>${maxF}`));
          friByInst[iid].delete(drop);

      });
      Object.keys(satByInst).forEach(iid => {

        if (!inst) return;

        const dates = [...satByInst[iid]].filter(dt => !hasWorkOnDate(iid, dt)).sort((a,b) => b - a);
        while (dates.length > maxS) {
          const drop = dates.shift();
          newSchedule.filter(s => s.instructorId === iid && s.date === drop && s.dayOfWeek === 6 && !s._userEdited).forEach(s => stripItem(s, `maxSat>${maxS}`));
          satByInst[iid].delete(drop);
        }
      });
      // 3) Consecutive weekend (Fri D + Sat D+1) — skip if either date has work-availability.
      Object.keys(friByInst).forEach(iid => {
        const inst = instructors.find(i => i.id === iid);
        if (!inst || inst.allowConsecutiveWeekend) return;
        for (const fri of [...friByInst[iid]]) {
          if (satByInst[iid]?.has(fri + 1)) {

            if (hasWorkOnDate(iid, fri) || hasWorkOnDate(iid, fri+1)) continue;
            // Strip the Saturday (later in time)
            newSchedule.filter(s => s.instructorId === iid && s.date === fri + 1 && s.dayOfWeek === 6 && !s._userEdited).forEach(s => stripItem(s, 'סופש רצוף'));
            satByInst[iid].delete(fri + 1);
          }
        }
      });
    }
    if (validatorStripped > 0) {
      console.log('[VALIDATOR] stripped', validatorStripped, 'items. Reasons:', validatorReasons);
    }
    // ========================================================================
    // END FINAL VALIDATOR
    // ========================================================================

    setSchedule(newSchedule);
    const total = newSchedule.length;
    const assigned = newSchedule.filter(s => s.instructorId).length;
    const tentative = newSchedule.filter(s => s.tentativeBlocker).length;
    let msg = `✅ נוצרו ${total} שיבוצים. ${assigned} עם מדריך`;
    const finalNoInstructor = newSchedule.filter(s => s.boatId && !s.instructorId).length;
    if (finalNoInstructor > 0) msg += ` · ⚠ ${finalNoInstructor} ללא מדריך`;
    if (unassignedSlot > 0) msg += ` · ${unassignedSlot} ללא ספינה`;
    if (minHoursViolations > 0) msg += ` · 🚫 ${minHoursViolations} מדריכים הוסרו (מתחת למינ׳)`;
    if (retried > 0) msg += ` · 🔁 ${retried} שובצו מחדש למדריך חלופי`;
    if (rescueAdded > 0) msg += ` · ⭐ ${rescueAdded} שיבוצי הצלה (פעילויות חדשות להשלמת מינ׳)`;
    if (weekendFilled > 0) msg += ` · 🏖 ${weekendFilled} מילויי סוף-שבוע`;
    if (swapsApplied > 0) msg += ` · 🔁 ${swapsApplied} החלפות swap`;
    if (bundledFilled > 0) msg += ` · 🎯 ${bundledFilled} שובצו ב-bundled (מילוי יום שלם למדריך)`;
    if (dateShifted > 0) msg += ` · 🔀 ${dateShifted} עברו תאריך`;
    if (activityShifted > 0) msg += ` · ↔️ ${activityShifted} פעילויות הוחלפו בין תאריכים`;

    if (tentative > 0) msg += ` · 🔧 ${tentative} דורש הזזת תדלוק/טיפול`;
    if (validatorStripped > 0) msg += ` · 🛡 ${validatorStripped} הוסרו ע"י validator (הפרת חוק קשה)`;
    // Weekend coverage check: each Fri/Sat should have TARGET_WEEKEND_STUDENT student activities scheduled.
    const weekendDatesInMonth = daysInMonthArr.filter(d => d.dayOfWeek === 5 || d.dayOfWeek === 6);
    const studentActById = {};
    activities.forEach(a => { if (!a.activityType || a.activityType === 'students') studentActById[a.id] = true; });
    const weekendStudentCount = {};
    newSchedule.forEach(s => {
      if (!s.date) return;
      if (s.dayOfWeek !== 5 && s.dayOfWeek !== 6) return;

    if (underWeekends.length > 0) {

      msg += ` · 📅 סופ"ש מתחת ל-${TARGET_WEEKEND_STUDENT} מודרכות תלמידים: ${summary}`;
    }
    showToast(msg);
  }

  const editInstructor = (itemId, instructorId) => {
    const inst = instructors.find(i => i.id === instructorId);
    setSchedule(schedule.map(s => s.id === itemId ? {
      ...s,
      instructorId: instructorId || null,

    } : s));

  const editBoat = (itemId, boatId) => {

      ...s,
      boatId: boatId || null,

    } : s));

  const editTime = (itemId, startHour, endHour) => {
    setSchedule(schedule.map(s => s.id === itemId ? {
      ...s,
      startHour, endHour,

    } : s));
  };

  // State for editing — which item is being edited inline
  const [editingItem, setEditingItem] = useState(null);
  const [editModalItem, setEditModalItem] = useState(null); // full edit modal

  const deleteItem = (itemId) => setSchedule(schedule.filter(s => s.id !== itemId));

  // Stats
  const stats = useMemo(() => {
    const total = schedule.length;
    const assigned = schedule.filter(s => s.instructorId).length;
    const noInst = schedule.filter(s => !s.instructorId && s.status === 'no_instructor').length;
    const noSlot = schedule.filter(s => s.status === 'no_slot').length;
    return {total, assigned, noInst, noSlot};
  }, [schedule]);

  const sortedSchedule = useMemo(() => {
    return [...schedule].sort((a,b) => {
      if (a.status === 'no_slot' && b.status !== 'no_slot') return 1;
      if (b.status === 'no_slot' && a.status !== 'no_slot') return -1;
      return (a.date||0) - (b.date||0) || (a.startHour||'').localeCompare(b.startHour||'');
    });
  }, [schedule]);

  // Validate a (possibly edited) schedule item against all rules.
  // Returns {errors: [...] (hard), warnings: [...] (soft)}.
  function validateScheduleItem(item, allItems) {
    const t2m = (t) => { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+m; };
    const errors = [];
    const warnings = [];
    const activity = activities.find(a => a.id === item.activityId);
    const boat = boats.find(b => b.id === item.boatId);
    const inst = instructors.find(i => i.id === item.instructorId);
    if (!item.date) { errors.push('תאריך חסר'); return {errors, warnings}; }
    if (!item.startHour || !item.endHour) { errors.push('שעות חסרות'); return {errors, warnings}; }
    const startMin = t2m(item.startHour), endMin = t2m(item.endHour);
    if (endMin <= startMin) errors.push('שעת סיום לפני התחלה');
    if (!activity) errors.push('פעילות לא תקפה');
    if (!boat) errors.push('סירה לא תקפה');

    // HARD: boat slot must fit (within ONE slot subdivision)
    if (boat) {
      const frames = (boat.frames && boat.frames.length) ? boat.frames :
        (boat.startTime ? [{startTime: boat.startTime, endTime: boat.endTime||'22:00', slotInterval: boat.slotInterval||3}] : []);
      const fits = frames.some(f => {
        if (!f.startTime) return false;
        const [sh,sm] = f.startTime.split(':').map(Number);
        const [eh,em] = (f.endTime||'22:00').split(':').map(Number);
        const intervalMin = (Number(f.slotInterval)||3)*60;
        const fs = sh*60+sm, fe = eh*60+em;
        for (let ss = fs; ss + intervalMin <= fe; ss += intervalMin) {
          if (startMin >= ss && endMin <= ss+intervalMin) return true;
        }
        return false;
      });
      if (!fits) warnings.push('הסלוט מחוץ למסגרות סירה');
    }

    // HARD: instructor qualification + availability + conflict + min/max
    if (inst && activity) {
      const skills = inst.skills || [];
      if (skills.length === 0) {
        errors.push('המדריך ללא יכולות');
      } else {
        const hasSpecific = skills.includes(activity.name);
        const isClub = activity.activityType === 'club';
        const isAdvanced = activity.activityType === 'advanced';
        const activityHasSpecificSkill = (typeof knownSkillsSet !== 'undefined' && knownSkillsSet.has) ? knownSkillsSet.has(activity.name) : false;
        const hasClubBlanket = isClub && !activityHasSpecificSkill && skills.includes('מודרכת מועדון');
        const hasAdvancedBlanket = isAdvanced && !activityHasSpecificSkill && skills.includes('מודרכות מתקדמות');
        if (!hasSpecific && !hasClubBlanket && !hasAdvancedBlanket) errors.push('המדריך לא מוסמך לפעילות');
      }
      // Availability
      const avail = availability[`${inst.id}_${month}`] || {};
      for (let m = startMin; m < endMin; m += 60) {
        const h = Math.floor(m/60);
        if (avail[`${item.date}_${h.toString().padStart(2,'0')}:00`] !== true) {
          errors.push(`המדריך לא זמין בשעה ${h.toString().padStart(2,'0')}:00`);
          break;
        }
      }
      // Conflict with other items same instructor
      const sameInstSameDay = allItems.filter(s => s.id !== item.id && s.instructorId === inst.id && s.date === item.date && s.startHour);
      for (const s of sameInstSameDay) {
        if (t2m(s.startHour) < endMin && t2m(s.endHour) > startMin) {
          errors.push(`חופף לשיבוץ קיים: ${s.activityName} ${s.startHour}-${s.endHour}`);
          break;
        }
      }
      // Gap rule + daily limit
      const allSlots = [...sameInstSameDay.map(s => ({startMin: t2m(s.startHour), endMin: t2m(s.endHour)})), {startMin, endMin}].sort((a,b)=>a.startMin-b.startMin);
      const totalH = allSlots.reduce((sum, sl) => sum + (sl.endMin - sl.startMin)/60, 0);
      let hasBreak = false;
      for (let i = 0; i < allSlots.length-1; i++) {
        const gap = allSlots[i+1].startMin - allSlots[i].endMin;
        if (gap > 60) errors.push(`פער > שעה בין שיבוצים`);
        if (gap >= 60) hasBreak = true;
      }
      const limit = hasBreak ? (inst.maxHoursPerDayWithBreak ?? 8) : (inst.maxHoursPerDayNoBreak ?? 6);
      if (totalH > limit) errors.push(`מעל מקס שעות יומי (${totalH}/${limit})`);
      // Min hours (soft warning, not hard error — for manual editing)
      if (!inst.allowSingleActivity) {
        const min = inst.minHoursPerDay ?? 5;
        if (totalH < min) warnings.push(`מתחת למינ׳ יומי (${totalH}/${min}ש׳)`);
      }
      // allowSingle gap rule
      if (inst.allowSingleActivity) {
        for (const s of sameInstSameDay) {
          const oStart = t2m(s.startHour), oEnd = t2m(s.endHour);
          const gap = oStart >= endMin ? oStart - endMin : oEnd <= startMin ? startMin - oEnd : 0;
          if (gap > 0 && gap <= 60) errors.push(`מדריך "פעילות בודדת" — נדרש פער > שעה בין פעילויות`);
        }
      }
    }

    // SOFT: bucket mismatch
    if (activity) {
      const buckets = activity.buckets || {morning:{start:7,end:11}, evening:{start:16,end:20}, night:{start:20,end:22}};
      const sH = Math.floor(startMin/60);
      let inMorning = sH >= buckets.morning.start && sH < buckets.morning.end;
      let inEvening = sH >= buckets.evening.start && sH < buckets.evening.end;
      let inNight = sH >= buckets.night.start && sH < buckets.night.end;
      const morningQ = activity.morning||0, eveningQ = activity.evening||0, nightQ = activity.night||0;
      // Only warn if all three are defined with no "open"
      if (morningQ > 0 && eveningQ > 0 && !inMorning && !inEvening && !inNight) {
        warnings.push('הזמן לא בתוך אף בקאט מוגדר לפעילות');
      }
    }

    // SOFT: weekend rule for club/advanced
    const dow = item.dayOfWeek != null ? item.dayOfWeek : (item.date ? new Date(month.split('-')[0], month.split('-')[1]-1, item.date).getDay() : null);
    if ((dow === 5 || dow === 6) && activity && (activity.activityType === 'club' || activity.activityType === 'advanced')) {
      warnings.push('פעילות מועדון/מתקדמות בסופ"ש');
    }
    return {errors, warnings};
  }

  // For each unassigned item, find instructors who are CLOSE (missing ≤2 hours) — suggestions for the user.
  function getSuggestionsForItem(item) {
    if (item.instructorId || !item.boatId || !item.date || !item.startHour) return [];
    const activity = activities.find(a => a.id === item.activityId);
    if (!activity) return [];
    const t2m = (t) => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    const slotStart = t2m(item.startHour);
    const slotEnd = t2m(item.endHour);
    const isClub = activity.activityType === 'club';
    const isAdvanced = activity.activityType === 'advanced';
    const activityKnown = knownSkillsSet.has(activity.name);
    const suggestions = [];
    for (const inst of instructors) {
      const skills = inst.skills || [];
      if (!skills.length) continue;
      const hasSpecific = skills.includes(activity.name);
      const hasClubBlanket = isClub && !activityKnown && skills.includes('מודרכת מועדון');
      const hasAdvancedBlanket = isAdvanced && !activityKnown && skills.includes('מודרכות מתקדמות');
      if (!hasSpecific && !hasClubBlanket && !hasAdvancedBlanket) continue;
      const avail = availability[`${inst.id}_${month}`] || {};
      const missing = [];
      for (let m = slotStart; m < slotEnd; m += 60) {
        const h = Math.floor(m/60);
        const k = `${item.date}_${h.toString().padStart(2,'0')}:00`;
        if (avail[k] !== true) missing.push(h);
      }
      if (missing.length === 0) continue;
      if (missing.length > 2) continue;
      suggestions.push({ inst, missing });
    }
    return suggestions.slice(0, 3);
  }
  // Mark missing availability hours as TRUE (extend) and re-run auto-schedule
  function extendAvailabilityAndRetry(instructorId, date, missingHours) {
    const key = `${instructorId}_${month}`;
    const cur = availability[key] || {};
    const updates = {...cur};
    missingHours.forEach(h => { updates[`${date}_${h.toString().padStart(2,'0')}:00`] = true; });
    setAvailability(prev => ({...prev, [key]: updates}));
    showToast(`הזמינות הורחבה. הרץ שיבוץ אוטומטי שוב.`);
  }

  return(
    <div>
      <div className="card">
        <div className="card-header">
          <h2>שיבוץ חודשי {month}
            <span className="badge badge-primary" style={{marginRight:8}}>{stats.total}</span>
            {stats.noInst>0 && <span className="badge badge-danger" style={{marginRight:6}}>{stats.noInst} בלי מדריך</span>}
            {stats.noSlot>0 && <span className="badge badge-warning" style={{marginRight:6}}>{stats.noSlot} בלי ספינה</span>}
          </h2>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-primary" onClick={()=>runAutoSchedule()} title="עורך את כל השיבוצים שאינם מסומנים כעריכה ידנית">🔄 שיבוץ אוטומטי</button>
            <button className="btn btn-outline btn-sm" onClick={()=>setShowManualDialog(true)}>➕ הוסף ידני</button>
            {schedule.filter(s => !s.instructorId).length > 0 && (
              <button className="btn btn-outline btn-sm" style={{borderColor:'var(--danger)',color:'var(--danger)'}}
                onClick={()=>{
                  const ghosts = schedule.filter(s => !s.instructorId).length;
                  if(window.confirm(`להסיר ${ghosts} שיבוצים ללא מדריך?`)) {
                    setSchedule(schedule.filter(s => s.instructorId));
                    showToast(`הוסרו ${ghosts} שיבוצים ללא מדריך`);
                  }
                }} title="הסר שיבוצים שאין להם מדריך מהלוח (לא יוסיף ערך)">🧹 הסר ללא-מדריך</button>
            )}
            {schedule.length>0 && <button className="btn btn-outline btn-sm" onClick={()=>{if(window.confirm('למחוק את כל השיבוצים?'))setSchedule([]);}}>🗑 נקה הכל</button>}
          </div>
        </div>

        {schedule.length === 0 ? (
          <div className="empty-state">
            <div className="icon">📅</div>
            <p>אין שיבוצים. לחץ "🔄 שיבוץ אוטומטי" כדי לפרוס את הפעילויות.</p>
            <p style={{fontSize:12,marginTop:6}}>דרישות: פעילויות מוגדרות · ספינות עם סלוטים · מדריכים עם זמינות+יכולות</p>
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th>תאריך</th><th>יום</th><th>שעה</th><th>פעילות</th><th>ספינה</th><th>מדריך</th><th></th>
                </tr>
              </thead>
              <tbody>
                {sortedSchedule.map(item => {
                  const isUnassigned = !item.instructorId;
                  const rowStyle = isUnassigned ? {background:'#fee2e2'} : {};
                  const isEditing = editingItem === item.id;
                  return (
                    <tr key={item.id} style={rowStyle}>
                      <td>{item.date || '—'}</td>
                      <td>{item.dayOfWeek != null ? DAYS_HEB[item.dayOfWeek] : '—'}</td>
                      <td style={{fontFamily:'monospace',fontSize:12}}>
                        {isEditing ? (
                          <span>
                            <input type="time" defaultValue={item.startHour||''} onBlur={e=>{
                              const start = e.target.value;
                              const tm = (t)=>{ const [h,m]=t.split(':').map(Number); return h*60+m; };
                              const dur = item.endHour && item.startHour ? (tm(item.endHour)-tm(item.startHour))/60 : 2;
                              const [sh,sm] = start.split(':').map(Number);
                              const endMin = sh*60+sm+dur*60;
                              const endH = `${Math.floor(endMin/60).toString().padStart(2,'0')}:${(endMin%60).toString().padStart(2,'0')}`;
                              editTime(item.id, start, endH);
                            }} style={{width:70,fontSize:11}}/>
                          </span>
                        ) : (
                          <span onDoubleClick={()=>setEditingItem(item.id)} title="לחץ לחיצה כפולה לעריכה" style={{cursor:'pointer'}}>
                            {item.startHour ? `${item.startHour}-${item.endHour}` : '—'}
                          </span>
                        )}
                      </td>
                      <td style={{fontWeight:600}}>{item.activityName}</td>
                      <td>
                        <select value={item.boatId || ''} onChange={e=>editBoat(item.id, e.target.value)} style={{fontSize:12, minWidth:90, border: item._userEdited?'1px solid var(--primary)':'1px solid var(--border)'}}>
                          <option value="">— ללא ספינה —</option>
                          {boats.map(b => <option key={b.id} value={b.id}>{b.name} {b.type?`(${b.type})`:''}</option>)}
                        </select>
                      </td>
                      <td>
                        <select value={item.instructorId || ''} onChange={e => editInstructor(item.id, e.target.value)}
                          style={{minWidth:120, fontSize:13, color: isUnassigned?'var(--danger)':'var(--text)', fontWeight: item._userEdited?600:400}}>
                          <option value="">— ללא מדריך —</option>
                          {instructors.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                        </select>
                        {item.extraInstructors && item.extraInstructors.length > 0 && (
                          <div style={{fontSize:11,color:'var(--text-light)',marginTop:2}}>
                            +{item.extraInstructors.map(e=>e.name).join(', ')}
                          </div>
                        )}
                        {item.instructorsNeeded > 1 && (
                          <div style={{fontSize:10,color: item.missingInstructors>0 ? 'var(--danger)' : 'var(--text-light)',marginTop:1}}>
                            ({item.instructorsNeeded - (item.missingInstructors||0)}/{item.instructorsNeeded} מדריכים)
                          </div>
                        )}
                        {item._userEdited && <span style={{fontSize:10,color:'var(--primary)',marginRight:6}}>✏️ עריכה ידנית</span>}
                        {isUnassigned && item.rejectSummary && <div style={{fontSize:10,color:'var(--danger)',marginTop:2,fontStyle:'italic'}} title={item.rejectSummary}>{item.rejectSummary}</div>}
                        {isUnassigned && (() => {
                          const sugg = getSuggestionsForItem(item);
                          if (sugg.length === 0) return null;
                          return (
                            <div style={{fontSize:10,marginTop:4,padding:'4px 6px',background:'#fffbeb',border:'1px solid #fbbf24',borderRadius:4}}>
                              💡 הצעות הרחבת זמינות:
                              {sugg.map(s => (
                                <div key={s.inst.id} style={{marginTop:2}}>
                                  <b>{s.inst.name}</b> חסרות שעות: {s.missing.map(h=>`${h.toString().padStart(2,'0')}:00`).join(', ')}{' '}
                                  <button className="btn btn-sm" style={{padding:'1px 6px',fontSize:9,background:'#fbbf24',color:'#fff',border:'none',borderRadius:3,cursor:'pointer'}}
                                    onClick={()=>extendAvailabilityAndRetry(s.inst.id, item.date, s.missing)}>הרחב</button>
                                </div>
                              ))}
                            </div>
                          );
                        })()}
                        {item.outOfFrame && <div style={{fontSize:10,color:'#92400e',marginTop:2,fontStyle:'italic'}} title="הסלוט מחוץ למסגרות הזמן של הסירה">⛵ מחוץ למסגרות סירה</div>}
                        {item._weekendFill && <div style={{fontSize:10,color:'#0891b2',marginTop:2,fontStyle:'italic'}} title="מילוי אוטומטי של סוף שבוע (מעבר ל-totalPerMonth של הפעילות)">🏖 מילוי סוף-שבוע</div>}
                        {item._rescue && <div style={{fontSize:10,color:'#7c3aed',marginTop:2,fontStyle:'italic'}}>⭐ שיבוץ הצלה</div>}
                        {item._dateShifted && <div style={{fontSize:10,color:'#0369a1',marginTop:2,fontStyle:'italic'}}>🔀 הועבר לתאריך אחר</div>}
                        {item._activityShifted && <div style={{fontSize:10,color:'#a16207',marginTop:2,fontStyle:'italic'}}>↔️ פעילות הוחלפה</div>}
                        {item._bestEffort && item._violations?.length > 0 && (
                          <div style={{fontSize:10,color:'#b91c1c',marginTop:2,fontStyle:'italic'}} title={item._violations.join(', ')}>
                            ⚠️ {item._violations.join(' · ')}
                          </div>
                        )}
                        {item.tentativeBlocker && <div style={{fontSize:10,color:'#0891b2',marginTop:2,fontStyle:'italic'}} title={`חוסם הניתן להזזה: ${item.tentativeBlocker}`}>🔧 דורש הזזת: {item.tentativeBlocker.slice(0,40)}{item.tentativeBlocker.length>40?'…':''}</div>}
                      </td>
                      <td>
                        <button className="btn-icon" onClick={()=>setEditModalItem(item)} title="ערוך מלא">✏️</button>
                        <button className="btn-icon" onClick={()=>deleteItem(item.id)} title="הסר שיבוץ">🗑</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {editModalItem && <EditScheduleItemModal
        item={editModalItem}
        instructors={instructors}
        activities={activities}
        boats={boats}
        month={month}
        validate={(it) => validateScheduleItem(it, schedule)}
        onCancel={()=>setEditModalItem(null)}
        onSave={(updated)=>{
          setSchedule(schedule.map(s => s.id === updated.id ? {...updated, _userEdited: true} : s));
          setEditModalItem(null);
          showToast('השיבוץ עודכן');
        }}
      />}
      {showManualDialog && <ManualEntryDialog
        month={month}
        boats={boats}
        instructors={instructors}
        activities={activities}
        onCancel={()=>setShowManualDialog(false)}
        onAdd={(items)=>{
          setSchedule([...schedule, ...items]);
          showToast(`✅ נוספו ${items.length} שיבוצים ידניים`);
          setShowManualDialog(false);
        }}/>}
    </div>
  );
}

function EditScheduleItemModal({item, instructors, activities, boats, month, validate, onSave, onCancel}){
  const [y,m] = month.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const [date,setDate] = useState(item.date || 1);
  const [startHour,setStartHour] = useState(item.startHour || '09:00');
  const [endHour,setEndHour] = useState(item.endHour || '11:00');
  const [activityId,setActivityId] = useState(item.activityId || '');
  const [boatId,setBoatId] = useState(item.boatId || '');
  const [instructorId,setInstructorId] = useState(item.instructorId || '');
  const [validation,setValidation] = useState(null);

  const dayOfWeek = new Date(y, m-1, Number(date)).getDay();
  const dayName = DAYS_HEB[dayOfWeek];
  const activity = activities.find(a => a.id === activityId);
  const boat = boats.find(b => b.id === boatId);
  const inst = instructors.find(i => i.id === instructorId);

  // Build the updated item object
  const buildUpdated = () => ({
    ...item,
    date: Number(date),
    dayOfWeek,
    startHour, endHour,
    activityId,
    activityName: activity?.name || item.activityName,
    boatId,
    boatName: boat?.name || null,
    boatType: boat?.type || null,
    instructorId: instructorId || null,
    instructorName: inst?.name || null,
    status: instructorId ? 'assigned' : (boatId ? 'no_instructor' : 'no_slot'),
  });

  const handleValidate = () => {
    const v = validate(buildUpdated());
    setValidation(v);
    return v;
  };

  const handleUpdate = () => {
    const v = handleValidate();
    const all = [...v.errors.map(e=>`⚠️ ${e}`),...v.warnings.map(w=>`ℹ️ ${w}`)];
    if (all.length > 0) {
      if (!window.confirm(`התראות:\n${all.join('\n')}\n\nלהמשיך בכל זאת?`)) return;
    }
    onSave(buildUpdated());
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
        <h3>עריכת שיבוץ</h3>
        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label>תאריך</label>
            <input type="number" min={1} max={lastDay} value={date} onChange={e=>setDate(Math.min(lastDay,Math.max(1,Number(e.target.value)||1)))}/>
            <div style={{fontSize:11,color:'var(--text-light)',marginTop:2}}>{date}/{m.toString().padStart(2,'0')}/{y} - {dayName}</div>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>שעת התחלה</label>
            <input type="time" value={startHour} onChange={e=>setStartHour(e.target.value)}/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>שעת סיום</label>
            <input type="time" value={endHour} onChange={e=>setEndHour(e.target.value)}/>
          </div>
        </div>
        <div className="form-group" style={{marginBottom:10}}>
          <label>פעילות</label>
          <select value={activityId} onChange={e=>setActivityId(e.target.value)}>
            <option value="">— בחר פעילות —</option>
            {activities.map(a => <option key={a.id} value={a.id}>{a.name} ({a.activityType==='club'?'מועדון':a.activityType==='advanced'?'מתקדמות':'תלמידים'})</option>)}
          </select>
        </div>
        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label>סירה</label>
            <select value={boatId} onChange={e=>setBoatId(e.target.value)}>
              <option value="">— ללא סירה —</option>
              {boats.map(b => <option key={b.id} value={b.id}>{b.name} ({b.type||'-'})</option>)}
            </select>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>מדריך</label>
            <select value={instructorId} onChange={e=>setInstructorId(e.target.value)}>
              <option value="">— ללא מדריך —</option>
              {instructors.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginTop:10}}>
          <button className="btn btn-outline btn-sm" onClick={handleValidate}>🔍 בדוק חוקיות</button>
        </div>
        {validation && (
          <div style={{marginTop:10}}>
            {validation.errors.length > 0 && (
              <div style={{background:'#fee2e2',border:'1px solid var(--danger)',padding:10,borderRadius:6,marginBottom:8}}>
                <b style={{color:'var(--danger)'}}>⚠️ אזהרות חמורות (ניתן לעקוף באישור):</b>
                <ul style={{margin:'4px 0 0',paddingRight:18,fontSize:13}}>
                  {validation.errors.map((e,i) => <li key={i}>{e}</li>)}
                </ul>
              </div>
            )}
            {validation.warnings.length > 0 && (
              <div style={{background:'#fef3c7',border:'1px solid #fbbf24',padding:10,borderRadius:6,marginBottom:8}}>
                <b style={{color:'#92400e'}}>ℹ️ אזהרות רכות:</b>
                <ul style={{margin:'4px 0 0',paddingRight:18,fontSize:13}}>
                  {validation.warnings.map((w,i) => <li key={i}>{w}</li>)}
                </ul>
              </div>
            )}
            {validation.errors.length === 0 && validation.warnings.length === 0 && (
              <div style={{background:'#dcfce7',border:'1px solid var(--success)',padding:10,borderRadius:6,marginBottom:8,color:'#166534'}}>
                ✅ אין שגיאות — השיבוץ עומד בכל החוקים
              </div>
            )}
          </div>
        )}
        <div style={{display:'flex',gap:8,marginTop:14}}>
          <button className="btn btn-primary" onClick={handleUpdate}>✅ עדכן</button>
          <button className="btn btn-outline" onClick={onCancel}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

function ManualEntryDialog({month, boats, instructors, activities, onCancel, onAdd}){
  const [y,m] = month.split('-').map(Number);
  const lastDay = new Date(y,m,0).getDate();
  const [date,setDate]=useState(1);
  const [startHour,setStartHour]=useState('09:00');
  const [durationHours,setDurationHours]=useState(3);
  const [activityName,setActivityName]=useState('');
  const [boatId,setBoatId]=useState('');
  const [instructorId,setInstructorId]=useState('');
  const [multiDay,setMultiDay]=useState(false);
  const [notes,setNotes]=useState('');

  const dayOfWeek = new Date(y, m-1, date).getDay();
  const dayName = DAYS_HEB[dayOfWeek];
  const startH = parseInt(startHour);
  const endH = Math.min(23, startH + Number(durationHours));
  const endHour = `${endH.toString().padStart(2,'0')}:00`;
  const boat = boats.find(b=>b.id===boatId);
  const instructor = instructors.find(i=>i.id===instructorId);
  const canAdd = activityName.trim() && boatId && date>=1 && date<=lastDay;

  const handleAdd = ()=>{
    const items = [];
    const mkItem = (d)=>{
      const dow = new Date(y, m-1, d).getDay();
      return {
        id: Math.random().toString(36).substr(2,9),
        activityId: null,
        activityName: activityName.trim(),
        boatId, boatName: boat?.name,
        date: d, dayOfWeek: dow,
        startHour, endHour,
        instructorId: instructorId||null,
        instructorName: instructor?.name||null,
        status: instructorId ? 'assigned' : 'no_instructor',
        _userEdited: true,
        manualNotes: notes||undefined,
      };
    };
    items.push(mkItem(date));
    if (multiDay && date+1 <= lastDay) items.push(mkItem(date+1));
    onAdd(items);
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
        <h3>➕ הוסף שיבוץ ידני</h3>
        <div style={{fontSize:12,color:'var(--text-light)',marginBottom:12}}>
          השיבוצים שתוסיף יחשבו לסטטיסטיקות המדריך (שעות, מקס יומי וכו') בהפעלה הבאה של "עדכן שיבוץ".
        </div>
        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label>שם הפעילות *</label>
            <input list="act-list" value={activityName} onChange={e=>setActivityName(e.target.value)} placeholder="למשל: קורס דו-יומי"/>
            <datalist id="act-list">{activities.map(a=><option key={a.id} value={a.name}/>)}</datalist>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label>תאריך (1-{lastDay}) *</label>
            <input type="number" min={1} max={lastDay} value={date} onChange={e=>setDate(Number(e.target.value)||1)}/>
            <div style={{fontSize:11,color:'var(--text-light)',marginTop:2}}>יום {dayName}</div>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>שעת התחלה</label>
            <select value={startHour} onChange={e=>setStartHour(e.target.value)}>
              {Array.from({length:24},(_,h)=><option key={h} value={`${h.toString().padStart(2,'0')}:00`}>{h.toString().padStart(2,'0')}:00</option>)}
            </select>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>אורך (שעות)</label>
            <input type="number" min={1} max={12} value={durationHours} onChange={e=>setDurationHours(Math.max(1,Math.min(12,Number(e.target.value)||1)))}/>
            <div style={{fontSize:11,color:'var(--text-light)',marginTop:2}}>סיום: {endHour}</div>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label>ספינה *</label>
            <select value={boatId} onChange={e=>setBoatId(e.target.value)}>
              <option value="">— בחר ספינה —</option>
              {boats.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>מדריך</label>
            <select value={instructorId} onChange={e=>setInstructorId(e.target.value)}>
              <option value="">— ללא מדריך —</option>
              {instructors.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group" style={{marginBottom:10}}>
          <label>הערות (אופציונלי)</label>
          <input type="text" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="למשל: 1 שעה כיתה + 3 שעות סירה"/>
        </div>
        <div className="form-group" style={{marginBottom:14}}>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type="checkbox" checked={multiDay} onChange={e=>setMultiDay(e.target.checked)} style={{width:'auto',margin:0}}/>
            <span>כפל ליום הבא — מוסיף שיבוץ זהה גם בתאריך {date+1<=lastDay?date+1:'(לא ניתן)'} {date+1<=lastDay?`(${DAYS_HEB[new Date(y,m-1,date+1).getDay()]})`:''}</span>
          </label>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" disabled={!canAdd} onClick={handleAdd}>
            ✓ הוסף {multiDay && date+1<=lastDay ? '(2 ימים)' : ''}
          </button>
          <button className="btn btn-outline" onClick={onCancel}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

function StatsTab({instructors,activities,boats,availability,assignments,month}){
  // Use the NEW schedule data: assignments[`schedule_${month}`] = array of items
  const rawSchedule = assignments[`schedule_${month}`];
  const schedule = Array.isArray(rawSchedule) ? rawSchedule : [];

  const timeToMin = (t) => { if(!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; };
  const itemHours = (it) => it.startHour && it.endHour ? (timeToMin(it.endHour)-timeToMin(it.startHour))/60 : 0;

  const instStats = useMemo(()=>{
    return instructors.map(inst => {
      const items = schedule.filter(s => s.instructorId === inst.id);
      const totalHours = items.reduce((sum, it) => sum + itemHours(it), 0);
      const assignmentCount = items.length;
      const avail = availability[`${inst.id}_${month}`] || {};
      const availSlots = Object.values(avail).filter(v => v===true).length;
      const workSlots = Object.values(avail).filter(v => v==='work').length;
      const ideal = inst.idealHours ?? inst.maxHours;
      const utilization = ideal ? Math.round(totalHours/ideal*100) : null;
      // days worked this month
      const daysWorked = new Set(items.map(i => i.date).filter(Boolean)).size;
      return {id:inst.id, name:inst.name, priority:inst.priority||'medium', assignmentCount, totalHours, availSlots, workSlots, ideal, utilization, daysWorked};
    }).sort((a,b) => b.totalHours - a.totalHours || a.name.localeCompare(b.name));
  },[instructors, schedule, availability, month]);

  const actStats = useMemo(()=>{
    return activities.map(act => {
      const items = schedule.filter(s => s.activityId === act.id);
      const total = act.totalPerMonth || 0;
      const placed = items.filter(s => s.date && s.boatId).length;
      const withInstructor = items.filter(s => s.instructorId).length;
      const rescueCount = items.filter(s => s._rescue).length;
      // Cap displayed percentage at 100%. Show overflow as a warning if present.
      const pct = total ? Math.min(100, Math.round(placed/total*100)) : 0;
      const overflow = total ? Math.max(0, placed - total) : placed;
      return {id:act.id, name:act.name, type:act.activityType||'students', placed, withInstructor, total, pct, overflow, rescueCount};
    });
  },[activities, schedule]);

  const boatStats = useMemo(()=>{
    return boats.map(b => {
      const items = schedule.filter(s => s.boatId === b.id);
      const totalHours = items.reduce((sum, it) => sum + itemHours(it), 0);
      const dates = new Set(items.map(i => i.date).filter(Boolean)).size;
      return {id:b.id, name:b.name, type:b.type||'-', count:items.length, totalHours, dates};
    }).sort((a,b) => b.totalHours - a.totalHours);
  },[boats, schedule]);

  const totalAssigned = schedule.filter(s => s.boatId && s.date).length;
  const withInstructor = schedule.filter(s => s.instructorId).length;
  const noInst = schedule.filter(s => s.boatId && !s.instructorId).length;
  const noSlot = schedule.filter(s => !s.boatId || !s.date).length;
  const totalHoursAll = schedule.reduce((s, it) => s + itemHours(it), 0);
  const totalDemand = activities.reduce((s, a) => s + (a.totalPerMonth||0), 0);
  const fillPct = totalDemand ? Math.round(totalAssigned/totalDemand*100) : 0;

  if (schedule.length === 0) {
    return (
      <div className="card">
        <div className="empty-state">
          <div className="icon">📊</div>
          <p>אין שיבוצים לחודש {month}.</p>
          <p style={{fontSize:12,marginTop:6,color:'var(--text-light)'}}>בצע "שיבוץ אוטומטי" בלשונית שיבוצים כדי לראות סטטיסטיקות.</p>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="number">{totalAssigned}</div><div className="label">שיבוצים החודש</div></div>
        <div className="stat-card"><div className="number" style={{color:'var(--success)'}}>{withInstructor}</div><div className="label">עם מדריך</div></div>
        {noInst>0 && <div className="stat-card"><div className="number" style={{color:'var(--danger)'}}>{noInst}</div><div className="label">ללא מדריך</div></div>}
        {noSlot>0 && <div className="stat-card"><div className="number" style={{color:'var(--warning)'}}>{noSlot}</div><div className="label">ללא ספינה</div></div>}
        <div className="stat-card"><div className="number">{totalHoursAll}</div><div className="label">סה"כ שעות</div></div>
        <div className="stat-card">
          <div className="number" style={{color:fillPct===100?'var(--success)':fillPct>=70?'var(--warning)':'var(--danger)'}}>{fillPct}%</div>
          <div className="label">אחוז מילוי</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <h2 style={{marginBottom:12,fontSize:16}}>עומס מדריכים</h2>
          <table>
            <thead><tr><th>מדריך</th><th>ימים</th><th>שיבוצים</th><th>שעות</th><th>ניצולת מול אידיאל</th></tr></thead>
            <tbody>
              {instStats.map(s=>(
                <tr key={s.id}>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  <td>{s.daysWorked}</td>
                  <td>{s.assignmentCount}</td>
                  <td>{s.totalHours}</td>
                  <td>
                    {s.utilization!==null?(
                      <div>
                        <span className={`badge badge-${s.utilization>110?'danger':s.utilization>=90?'success':s.utilization>=60?'warning':'danger'}`}>{s.utilization}% ({s.totalHours}/{s.ideal})</span>
                        <div className="progress-bar" style={{width:100,marginTop:3}}>
                          <div className="fill" style={{width:`${Math.min(s.utilization,100)}%`,background:s.utilization>110?'var(--danger)':s.utilization>=90?'var(--success)':s.utilization>=60?'var(--warning)':'var(--danger)'}}/>
                        </div>
                      </div>
                    ):<span style={{color:'var(--text-light)',fontSize:11}}>אין יעד</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="card">
          <h2 style={{marginBottom:12,fontSize:16}}>מילוי פעילויות</h2>
          <table>
            <thead><tr><th>פעילות</th><th>סוג</th><th>שובצו / נדרשים</th><th>מילוי</th></tr></thead>
            <tbody>
              {actStats.map(s=>(
                <tr key={s.id}>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  <td style={{fontSize:12}}>{s.type==='club'?'מועדון':s.type==='advanced'?'מתקדמות':'תלמידים'}</td>
                  <td>
                    {s.placed}/{s.total}
                    {s.overflow > 0 && <span style={{color:'#0891b2',fontSize:11,marginRight:4}}>(+{s.overflow} {s.rescueCount>0?'הצלה':'עודף'})</span>}
                    {s.placed>s.withInstructor && <div style={{color:'var(--danger)',fontSize:11}}>⚠ {s.placed-s.withInstructor} ללא מדריך</div>}
                  </td>
                  <td>
                    <span className={`badge badge-${s.pct===100?'success':s.pct>50?'warning':'danger'}`}>{s.pct}%</span>
                    <div className="progress-bar" style={{width:80}}>
                      <div className="fill" style={{width:`${s.pct}%`,background:s.pct===100?'var(--success)':s.pct>50?'var(--warning)':'var(--danger)'}}/>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div className="card" style={{marginTop:16}}>
        <h2 style={{marginBottom:12,fontSize:16}}>שימוש בסירות</h2>
        <table>
          <thead><tr><th>סירה</th><th>סוג</th><th>שיבוצים</th><th>שעות</th><th>ימי פעילות</th></tr></thead>
          <tbody>
            {boatStats.map(s=>(
              <tr key={s.id}>
                <td style={{fontWeight:600}}>{s.name}</td>
                <td style={{fontSize:12}}>{s.type}</td>
                <td>{s.count}</td>
                <td>{s.totalHours}</td>
                <td>{s.dates}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}


function RulesTab(){
  // All scheduling rules in Hebrew, numbered. Reference these numbers when reporting issues.
  return (
    <div dir="rtl" style={{maxWidth:980, marginLeft:'auto', marginRight:0}}>
      <div className="card">
        <h2 style={{marginBottom:6}}>📖 חוקי האלגוריתם — מסמך עיון</h2>

          לכל חוק יש מספר. כשמשהו לא עובד כמצופה, ציין את מספר החוק שצריך לתקן ואת השינוי המבוקש.
          מסמך זה משקף את האלגוריתם המורץ ב-<b>{SCHEDULER_VERSION}</b>.
        </p>

        <h3 style={{marginTop:8,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק א' — יצירת דרישות (Demands) מהפעילויות</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>A.1</b> פעילות מושבתת (totalPerMonth = 0 ובלי תאריכים ספציפיים): לא מייצרת דרישות.</li>
          <li><b>A.2</b> פעילות עם תאריכים ספציפיים: יוצרת דרישה אחת לכל תאריך. ההגדרות "מתוכן בשעות" כן חלות — הדרישות מקבלות בקאט לפי הסדר (M בקרים, E ערבים, N לילות, השאר open).</li>
          <li><b>A.3</b> פעילות רגילה: מייצרת totalPerMonth דרישות לפי הסדר — בוקר, ערב, לילה, שישי, שבת, ושאר ה"open".</li>
          <li><b>A.4</b> דרישת "open" יכולה להיות בכל בקאט שעות, אבל לא בשישי/שבת (אלה ספירה נפרדת).</li>
          <li><b>A.5</b> "שעת התחלה ספציפית" — <i>הוסר ב-v5.40</i>. השתמש ב"חלון פעילות מדויק" במקום אם נדרש.</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ב' — סלוטים זמינים</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>B.1</b> כל ספינה מגדירה <b>סלוטים</b> — חלונות זמן שבהם הפעילות יכולה להיפתח. אין שעת תחילת/סיום עבודה כללית לספינה — רק הסלוטים. פעילות שלא נכנסת לתוך אחד הסלוטים — לא תתוזמן בספינה הזאת.</li>
          <li><b>B.2</b> לכל פעילות יש <b>חלון זמן</b>: ☀️ שעות אור (ברירת מחדל) / 🌙 שעות חושך / ⏰ לא משנה. שעות אור מוגדרות פעם אחת גלובלית בראש לשונית "פעילויות". בנוסף ניתן להגדיר "חלון פעילות מדויק" לפעילות ספציפית (גובר על מצב חלון הזמן).</li>
          <li><b>B.3</b> שישי ושבת משתמשים באותם סלוטים של הספינה — אין חוקים נפרדים לסופ"ש (חוץ מהמגבלות הכלליות, ראה C.6).</li>
          <li><b>B.4</b> בתוך סלוט, פעילות יכולה להתחיל בכל שעה עגולה ובלבד שתסתיים בתוך הסלוט. למשל בסלוט 07:00-10:00 פעילות 2ש' יכולה להיפתח ב-07:00 או ב-08:00, אבל לא ב-09:00.</li>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ג' — סינון מועמדים (Slot Filters)</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>C.1</b> סלוטים שכבר נתפסו ע"י דרישה אחרת (גם של פעילות אחרת) — נפסלים.</li>
          <li><b>C.2</b> סלוט חייב להתאים לסוג הספינה / רשימת הספינות המורשות לפעילות (אם מוגדר).</li>
          <li><b>C.3</b> דרישה לבקאט שעות מסוים (בוקר/ערב/לילה) — רק סלוט שמתחיל בתוך הבקאט מתאים. דרישת "open" מקבלת כל בקאט.</li>

          <li><b>C.8</b> חסימת CRM קשיחה (טקסט שלא כולל "תדלוק/טיפול/נקיון/ניקיון/תיקון/תחזוקה") — פוסלת.</li>
          <li><b>C.9</b> חסימת CRM "זזה" (תדלוק/טיפול/נקיון/ניקיון/תיקון/תחזוקה) — האלגוריתם מתעלם ויוצר שיבוץ "טנטטיבי" (מסומן 🔧). הקנס "20 ימי מרחק" משמש <b>בניקוד</b> בלבד: סלוט עם חסימה זזה נחשב כאילו הוא 20 ימים רחוק מיום היעד, כך שמועמד נקי יקבל עדיפות. עדיין נבחר כשאין אופציה אחרת.</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ד' — ניקוד סלוט (Slot Score, נמוך = עדיף)</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>D.1</b> מרחק מ-"יום היעד": למשל לדרישה 3 מתוך 10 בחודש של 30 ימים, יעד = יום 11. הציון מקבל +|date - 11|.</li>
          <li><b>D.2</b> בונוס רצף: <b>-50</b> ימים לכל נקודת contiguity (כל קצה של סלוט שצמוד לסלוט קיים של מדריך כלשהו, פער ≤ 1ש'). משקל גבוה — האלגוריתם יעדיף לבנות יום רציף למדריך גם אם זה לא היום הקרוב ביותר ליעד.</li>
          <li><b>D.3</b> בונוס סמיכות לעבודה: <b>-20</b> ימים לכל נקודת work-adjacency (סלוט שצמוד לזמן 💼 "עובד" של מדריך). אם מדריך סימן 💼 ב-09:00-11:00, פעילות 07:00-09:00 או 11:00-13:00 שלו תקבל בונוס.</li>
          <li><b>D.4</b> קנס חסימת CRM זזה: +20 ימים אם הסלוט נדרש להתעלם מתדלוק/טיפול/ניקיון/תחזוקה.</li>
          <li><b>D.5</b> קנס יום עמוס גלובלי: <b>+20</b> ימים לכל פעילות עודפת מעל הממוצע היומי (`כל הדרישות / ימים בחודש`).</li>
          <li><b>D.6</b> קנס חזרה ביום: <b>+100</b> ימים לכל חזרה של אותה פעילות שכבר באותו יום. שאיפה ל-0 חזרות.</li>
          <li><b>D.7</b> קנס פיזור פעילות: +4 ימים לכל יום של חיסרון ב-"גאפ אידיאלי" (lastDay / totalDemandsForActivity).</li>
          <li><b>D.8</b> דרישה עם תאריך ספציפי: D.5 ו-D.7 לא חלים.</li>
          <li><b>D.9</b> <b>משיכה לסופ"ש לפעילויות תלמידים</b>: כל יום שישי ושבת בחודש צריך 6 פעילויות תלמידים. ימי סופ"ש שלא הגיעו ליעד מקבלים בונוס שלילי של (6 - מספר נוכחי) * 12 ימים בציון.</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ה' — סינון מדריכים (Instructor Filters)</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>E.1</b> מדריך עם רשימת כישורים ריקה — <b>לא</b> מוסמך לאף פעילות (נדחה).</li>
          <li><b>E.2</b> מדריך עם רשימת כישורים: חייב להחזיק את <i>שם הפעילות</i> במפורש.</li>
          <li><b>E.3</b> חריג: לפעילות מסוג "מועדון" ששם הפעילות שלה לא רשום כ-skill מוכר במערכת — מדריך עם הכישור "מודרכת מועדון" כשיר. אם השם רשום כ-skill ספציפי במערכת — חריג זה לא חל.</li>
          <li><b>E.4</b> חריג: לפעילות "מתקדמות" — אותו הדין עם הכישור "מודרכות מתקדמות".</li>
          <li><b>E.5</b> זמינות: כל שעה בתוך הסלוט חייבת להיות מסומנת ✓ (true). 💼 ("עובד") = לא זמין לפעילות. ריק = לא זמין.</li>
          <li><b>E.6</b> מקס שעות יומי + הפסקות:
            <ul style={{paddingRight:14,marginTop:4}}>
              <li>הפסקה <b>שיצרה המערכת</b> (כל השעות בין שני סלוטים מסומנות ✓ זמין) — מותרת רק 1 שעה. גדול מ-1 שעה: דחייה.</li>
              <li>הפסקה <b>טבעית</b> (לפחות שעה אחת בגאפ אינה מסומנת ✓ — כלומר עובד 💼 או ריק) — מותרת בכל אורך.</li>
              <li>שעות יומי: אם יש הפסקה כלשהי ≥שעה → maxHoursPerDayWithBreak (8 ברירת מחדל). אם אין → maxHoursPerDayNoBreak (6 ברירת מחדל).</li>
            </ul>
          </li>
          <li><b>E.7</b> מקס שישי בחודש (maxFridaysPerMonth, 1 ברירת מחדל). מקס שבת בחודש (maxSaturdaysPerMonth, 1 ברירת מחדל).</li>
          <li><b>E.8</b> מקס ימי חול בשבוע (maxDaysPerWeek, 0-5). חל רק על ימים א'-ה'. שישי/שבת לא נספרים פה.</li>
          <li><b>E.9</b> מקס ערבים בשבוע (maxEveningsPerWeek, בקאט 16-20).</li>
          <li><b>E.10</b> אין התנגשות עם שיבוץ קיים של אותו מדריך באותו יום בחפיפת שעות.</li>
          <li><b>E.11</b> מינ' שעות ביום (minHoursPerDay, 5 ברירת מחדל): מדריך נדחה אם <b>גם</b> (existing + slot) &lt; min <b>וגם</b> סך השעות הזמינות שלו ביום &lt; min. הסימון "אפשרי לפעילות בודדת" עוקף.</li>
          <li><b>E.12</b> פוסט-עיבוד <b>איטרטיבי</b>: עד 8 מחזורים של (cleanup + retry) עד יציבות. כל מחזור: סורק מדריכים שמתחת למינ׳, מסיר אותם, מחפש מדריך חלופי. נמשך עד שאין יותר הפרות או שאין מי להחליף.</li>
          <li><b>E.13 (חדש)</b> <b>פעילויות הצלה</b>: לפני ה-cleanup, המערכת מנסה להוסיף עד <b>3 פעילויות נוספות</b> (מ-3 פעילויות שונות) כדי לסגור פערים של מינ׳ שעות. הפעילויות נבחרות לפי כישורי המדריך, סלוטים פנויים באותו יום, ואין התנגשויות. אלה שיבוצים מעבר ל-totalPerMonth שהוגדר. מסומנים ב-⭐.</li>
          <li><b>E.14 (חדש)</b> <b>וולידציה סופית</b>: שיבוצים שלא מתאימים לסלוטים הנוכחיים של הסירה (לאחר שינוי בוטל-הסלוטים בין הרצות) מוסרים. מסומנים "מחוץ למסגרות סירה".</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ו' — מיון מדריכים זמינים (Sort Order)</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>F.1</b> עדיפות (priority): high &gt; medium &gt; low.</li>
          <li><b>F.2</b> רצף (contiguity): מדריך שכבר יש לו סלוט באותו יום צמוד לסלוט הזה (פער 0 או שעה אחת) מועדף.</li>
          <li><b>F.3</b> הגעה למינ׳: מי שעם השיבוץ הזה יגיע ל-min מועדף.</li>
          <li><b>F.4</b> סמיכות לעבודה: מי שיש לו 💼 צמוד לסלוט הזה מועדף.</li>
          <li><b>F.5</b> מרחק מאידיאל: מי שרחוק יותר מ-idealHours שלו (הכי פחות עמוס) מועדף.</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ז' — מדריכים מרובים לפעילות</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>G.1</b> פעילות עם instructorsNeeded = N: האלגוריתם מחפש מדריך ראשון לפי חלק ו'.</li>
          <li><b>G.2</b> לאחר מציאת הראשון: מוצא עוד N-1 מדריכים, כל אחד עובר את אותם פילטרים. שעות העבודה של כולם נספרות.</li>
          <li><b>G.3</b> אם לא נמצאו N מדריכים: השיבוץ נשמר עם חוסר, מסומן partial.</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ח' — סדר עיבוד הדרישות</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>H.1</b> הפעילויות מעובדות לפי <b>סדר קושי יורד</b> (קשות ביותר קודם). הקושי מחושב לפי: תאריכים ספציפיים (+50), שעת התחלה ספציפית (+30), מספר ספינות מתאימות נמוך (+10-30), מספר מדריכים כשירים נמוך (+10-40), משך הפעילות (×2), סוג מועדון/מתקדמות (+5), דרישה לסופ"ש (+15). זה מבטיח שהפעילויות הקשות לא יישארו ללא שיבוץ.</li>
          <li><b>H.2</b> בתוך כל פעילות, הדרישות מעובדות לפי הסדר שיצא מ-generateDemands (בוקר, ערב, לילה, שישי, שבת, open).</li>
          <li><b>H.3</b> לכל דרישה: בוחרים את המועמד עם הציון הנמוך ביותר שיש לו מדריך כשיר. אם אף מועמד אין לו מדריך — נשמר ה-slot הראשון עם "ללא מדריך". <i>הצעות פריסה מחדש (override CRM / חצייה של slot / חריגה מהגדרות) יוצגו לאישור ידני בעתיד.</i></li>
          <li><b>H.4</b> אין fallback מקל אוטומטי. אם דרישה לא יכלה להיות משובצת בכלל (אין סלוט פנוי) — נשמרת כ-"ללא ספינה". <i>הצעות לדריסה (CRM / טיפוס סירה לא מתאים) יוצגו לאישור ידני בעתיד.</i></li>
          <li><b>H.5</b> Retry pass לאחר ה-cleanup של מינ׳ שעות: כל שיבוץ שאיבד את מדריכו (בגלל E.12) מקבל הזדמנות שנייה למצוא מדריך אחר. רק אם גם זה נכשל — נשאר "ללא מדריך".</li>
        </ol>

        <h3 style={{marginTop:16,fontSize:15,borderBottom:'2px solid var(--primary)',paddingBottom:4}}>חלק ט' — ערכי ברירת מחדל</h3>
        <ol style={{paddingRight:20,lineHeight:1.8,fontSize:13}}>
          <li><b>I.1</b> מינ' שעות יומי (minHoursPerDay) = 5</li>
          <li><b>I.2</b> מקס שעות יומי ללא הפסקה (maxHoursPerDayNoBreak) = 6</li>
          <li><b>I.3</b> מקס שעות יומי עם הפסקה (maxHoursPerDayWithBreak) = 8</li>
          <li><b>I.4</b> מקס שישי בחודש = 1</li>
          <li><b>I.5</b> מקס שבת בחודש = 1</li>
          <li><b>I.6</b> מקס ימי חול בשבוע = ללא הגבלה</li>
          <li><b>I.7</b> מקס ערבים בשבוע = ללא הגבלה</li>
          <li><b>I.8</b> מדריכים נדרשים לפעילות = 1 (1-15)</li>
          <li><b>I.9</b> סוג פעילות = "תלמידים"</li>
          <li><b>I.10</b> עדיפות מדריך = "medium"</li>
          <li><b>I.11</b> שישי נפתח ב-07:00, סיום עד 14:00; שבת ב-08:00, סיום עד 14:00 (קבועי בית-ספר).</li>
          <li><b>I.12</b> בקאט שעות: בוקר 07-11, ערב 16-20, לילה 20-22 (ניתן לשינוי פר פעילות).</li>
        </ol>

        <div className="card" style={{background:'#fffbeb',borderColor:'#fcd34d',marginTop:20}}>
          <h3 style={{marginBottom:8,fontSize:14}}>💡 איך לדווח על תקלה</h3>
          <p style={{fontSize:13,lineHeight:1.7}}>
            ציין את <b>מספר החוק</b> שהאלגוריתם הפר או שצריך לשנות, ואת השינוי המבוקש. למשל:<br/>
            • "החוק <b>C.7</b> צריך להיות 1 ולא 2"<br/>
            • "החוק <b>D.5</b> צריך משקל גדול יותר — הפיזור לא עובד"<br/>
            • "חסר חוק: מדריך שלא הוגדר לו 'אפשרי לפעילות בודדת' לא יקבל פחות מ-min, גם לא כברירת ראשונה"<br/>
            כך נדבר על אותו דבר ותוכל למקד את התיקון בלי לפענח שוב את האלגוריתם.
          </p>
        </div>
      </div>
    </div>
  );
}


function InboxTab({inbox,setInbox,instructors,setInstructors,availability,setAvailability,setAssignments,setMonth,currentMonth,showToast}){
  const [filter,setFilter]=useState('pending');
  const [dragOver,setDragOver]=useState(false);
  const [viewing,setViewing]=useState(null);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [resolveDialog,setResolveDialog]=useState(null);
  const [excelImport,setExcelImport]=useState(null);
  const fileInputRef=useRef(null);

  // Pull new submissions from the Apps Script Google Sheet (dedup by sheetKey)
  const syncFromSheet = async () => {
    if (!SUBMISSIONS_SHEET_ID) { showToast('⚠️ יש להגדיר SUBMISSIONS_SHEET_ID בקוד'); return; }
    setSyncStatus('loading');
    try {
      const submissions = await fetchSubmissionsFromSheet();
      setInbox(prev => {
        const existingKeys = new Set(prev.map(it => it.sheetKey).filter(Boolean));
        const newItems = [];
        submissions.forEach(sub => {
          const key = `${sub.timestamp}_${sub.name}_${sub.month}`;
          if (existingKeys.has(key)) return;
          newItems.push({
            id: Math.random().toString(36).substr(2,9),
            sheetKey: key,
            status: 'pending',
            receivedAt: sub.timestamp || new Date().toISOString(),
            fileName: `availability-${sub.name.replace(/\s+/g,'-')}-${sub.month}.json`,
            data: sub.data
          });
        });
        if (newItems.length) showToast(`📥 ${newItems.length} טפסים חדשים נוספו לאינבוקס`);
        return [...newItems, ...prev];
      });
      setSyncStatus('success');
      setTimeout(() => setSyncStatus('idle'), 2500);
    } catch (e) {
      console.error(e);
      setSyncStatus('error');
      showToast('⚠️ שגיאה בסנכרון: ' + e.message);
      setTimeout(() => setSyncStatus('idle'), 4000);
    }
  };

  // Auto-sync on first mount of the Inbox tab
  useEffect(() => { if (SUBMISSIONS_SHEET_ID) syncFromSheet(); }, []);

  const filtered = inbox.filter(it => filter==='all' || it.status===filter);
  const pendingCount = inbox.filter(it=>it.status==='pending').length;
  const appliedCount = inbox.filter(it=>it.status==='applied').length;
  const rejectedCount = inbox.filter(it=>it.status==='rejected').length;

  // Read JSON files dropped into the inbox
  const handleFiles = async (files) => {
    if(!files || !files.length) return;
    const newItems = [];
    const excelFiles = [];
    for(const f of files){
      const ext = (f.name||'').toLowerCase().split('.').pop();
      if(['xlsx','xlsm','xls'].includes(ext)){
        excelFiles.push(f);
        continue;
      }
      try{
        const text = await f.text();
        const data = JSON.parse(text);
        if(data.type !== 'instructor_availability' || !data.instructor || !data.month){
          showToast(`⚠️ ${f.name} - לא טופס זמינות תקין`);
          continue;
        }
        newItems.push({
          id:Math.random().toString(36).substr(2,9),
          status:'pending',
          receivedAt:new Date().toISOString(),
          fileName:f.name,
          data
        });
      }catch(e){
        showToast(`⚠️ ${f.name} - שגיאה בקריאת הקובץ`);
      }
    }
    if(newItems.length){
      setInbox(prev=>[...newItems,...prev]);
      showToast(`📥 נקלטו ${newItems.length} טפסים לאינבוקס`);
    }
    // Process Excel files via dialog (one at a time)
    for (const f of excelFiles) {
      try {
        const result = await parseExcelAvailability(f);
        if (result.count === 0) {
          showToast(`⚠️ ${f.name} - לא נמצאו משבצות זמינות`);
          continue;
        }
        setExcelImport({file: f, slots: result.slots, count: result.count, sheetName: result.sheetName});
        break; // handle one at a time; user can re-drop the others
      } catch (e) {
        showToast(`⚠️ ${f.name} - ${e.message || 'שגיאה בקריאת Excel'}`);
      }
    }
  };

  // Apply an inbox item: match/create instructor, set availability, mark applied
  // Final apply step: write availability and mark inbox item applied
  const finalizeApply = (item, instructorId, contactToWrite) => {
    const formNotes = item.data.notes || '';
    setInstructors(prev => prev.map(x => x.id===instructorId ? {
      ...x,
      phone: contactToWrite?.phone!==undefined ? contactToWrite.phone : x.phone,
      email: contactToWrite?.email!==undefined ? contactToWrite.email : x.email,
      formNotes: formNotes || x.formNotes
    } : x));
    const slotsIn = item.data.availability || {};
    const slotsOut = {};
    Object.entries(slotsIn).forEach(([k,v])=>{
      if(v === true) slotsOut[k] = true;
      else if(v === 'work') slotsOut[k] = 'work';
    });
    const key = `${instructorId}_${item.data.month}`;
    setAvailability(prev => ({...prev, [key]: slotsOut}));
    setInbox(prev => prev.map(it => it.id===item.id ? {...it, status:'applied', appliedAt:new Date().toISOString()} : it));
    if (setAssignments) {
      setAssignments(prev => ({...prev, _lastAppliedInstructor: instructorId, _lastAppliedMonth: item.data.month}));
    }
    // CRITICAL: auto-switch App's month to the form's month so AvailabilityTab shows the right data
    if (setMonth && item.data.month && item.data.month !== currentMonth) {
      setMonth(item.data.month);
      showToast(`✅ נקלט: ${item.data.instructor?.name||'?'} - החודש הוחלף ל-${item.data.month}`);
    } else {
      showToast(`✅ נקלט: ${item.data.instructor?.name||'?'} - ${item.data.month}`);
    }
  };

  const applyItem = (item) => {
    const inst = item.data.instructor || {};
    const targetName = (inst.name||'').trim();
    if(!targetName){ showToast('⚠️ אין שם מדריך בטופס'); return; }
    const existing = instructors.find(x => x.name.trim() === targetName);
    if (!existing) {
      setResolveDialog({mode:'name', item, formName: targetName});
      return;
    }
    const formPhone = (inst.phone||'').trim();
    const formEmail = (inst.email||'').trim();
    const existingPhone = (existing.phone||'').trim();
    const existingEmail = (existing.email||'').trim();
    const phoneConflict = formPhone && existingPhone && formPhone !== existingPhone;
    const emailConflict = formEmail && existingEmail && formEmail !== existingEmail;
    if (phoneConflict || emailConflict) {
      setResolveDialog({mode:'contact', item, existing, formPhone, formEmail});
      return;
    }
    finalizeApply(item, existing.id, {
      phone: existingPhone || formPhone,
      email: existingEmail || formEmail
    });
  };

  const rejectItem = (item) => {
    setInbox(prev => prev.map(it => it.id===item.id ? {...it, status:'rejected'} : it));
  };
  const restoreItem = (item) => {
    setInbox(prev => prev.map(it => it.id===item.id ? {...it, status:'pending'} : it));
  };
  const deleteItem = (item) => {
    if(!window.confirm('למחוק את הטופס מהאינבוקס לצמיתות?')) return;
    setInbox(prev => prev.filter(it => it.id!==item.id));
  };
  const clearProcessed = () => {
    if(!window.confirm('למחוק את כל הטפסים המעובדים (קלוטים/דחויים)?')) return;
    setInbox(prev => prev.filter(it => it.status==='pending'));
    showToast('האינבוקס נוקה');
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
