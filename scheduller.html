<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const DAYS_HEB = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const HOURS = Array.from({length:15},(_,i)=>`${(7+i).toString().padStart(2,'0')}:00`);
const PRIORITY_LABELS = {high:'גבוה',medium:'בינוני',low:'נמוך'};
const PRIORITY_COLORS = {high:'danger',medium:'warning',low:'success'};
const BAND_HOURS={morning:['07:00','08:00','09:00','10:00','11:00','12:00'],midday:['10:00','11:00','12:00','13:00','14:00','15:00'],evening:['16:00','17:00','18:00','19:00','20:00','21:00']};
const BAND_LABELS={morning:'בוקר 7–13',midday:'אמצע 10–16',evening:'ערב 16–22'};
const BAND_KEYS=['morning','midday','evening'];
const PRIORITY_CHIP_COLORS={high:{bg:'#EEEDFE',color:'#3C3489',border:'#7F77DD'},medium:{bg:'#E1F5EE',color:'#085041',border:'#1D9E75'},low:{bg:'#FAEEDA',color:'#633806',border:'#BA7517'}};

const DEFAULT_SKILLS = [];
const SHEET_ID = '12G0sbYsQzJyCYgLW4cRuSifPMulKgogRMl0JZJE1kGY';
const SHEET_GID = '1261216829';

const SUBMISSIONS_SHEET_ID = '1usGHx0o6JMMcOgKhpf4kC3AfgANgPMNnG5AZbqAyzTA';
const SUBMISSIONS_SHEET_GID = '0';
const SCHEDULER_VERSION = 'v6.18';

function parseCsvRobust(text){
  const rows = []; let row = []; let cur = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cur); cur = ''; }
      else if (c === '\n' || c === '\r') {
        if (cur || row.length) { row.push(cur); rows.push(row); row = []; cur = ''; }
        if (c === '\r' && text[i+1] === '\n') i++;
      } else cur += c;
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

async function fetchSubmissionsFromSheet() {
  if (!SUBMISSIONS_SHEET_ID) throw new Error('SUBMISSIONS_SHEET_ID not configured');
  const url = `https://docs.google.com/spreadsheets/d/${SUBMISSIONS_SHEET_ID}/export?format=csv&gid=${SUBMISSIONS_SHEET_GID}`;
  let res;
  try { res = await fetch(url); }
  catch (e) { throw new Error('שגיאת רשת: '+e.message+' (file:// חסום - פתח דרך Netlify או Live Server)'); }
  if (!res.ok) throw new Error('Google החזיר '+res.status);
  const text = await res.text();
  const rows = parseCsvRobust(text).filter(r => r.some(c => c && c.trim()));
  if (rows.length <= 1) return [];
  return rows.slice(1).map(cols => {
    const b64 = (cols[8] || '').trim();
    let data = null;
    try {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      data = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    } catch (e) {}
    return { timestamp: (cols[0]||'').trim(), name: (cols[1]||'').trim(), month: (cols[2]||'').trim(), data };
  }).filter(r => r.data);
}

async function fetchSheetData() {
  if (!SHEET_ID) throw new Error('SHEET_ID לא הוגדר');
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
  let res;
  try { res = await fetch(url); }
  catch (e) { throw new Error('שגיאת רשת: '+e.message+' (file:// חסום - פתח דרך Netlify או Live Server)'); }
  if (!res.ok) throw new Error('Google החזיר '+res.status+': ודא שהגיליון משותף "Anyone with link - Viewer"');
  const text = await res.text();
  if (!text || text.length < 3) throw new Error('הגיליון ריק');
  const rows = parseCsvRobust(text);
  if (rows.length === 0) throw new Error('הגיליון ריק');
  const numCols = rows[0].length;
  const instructors = [];
  for (let col = 0; col < numCols; col++) {
    const name = (rows[0][col] || '').trim();
    if (!name) continue;
    const skills = [];
    for (let r = 1; r < rows.length; r++) {
      const skill = (rows[r][col] || '').trim();
      if (skill) skills.push(skill);
    }
    instructors.push({ name, skills });
  }
  return instructors;
}
const WEEKDAYS=[0,1,2,3,4]; // ראשון-חמישי
const WEEKEND_DAYS=[5,6]; // שישי-שבת
const MORNING_HOURS={start:'08:00',end:'12:00'};
const AFTERNOON_HOURS={start:'13:00',end:'17:00'};

function generateId(){ return Math.random().toString(36).substr(2,9); }

// Boat types - single select (one of)
const BOAT_TYPES = ['בי״ס', 'מונוהול', 'קטמרן', 'מנועית', 'קטמנדו'];

// Hour options for whole-hour selects (00:00 through 23:00)
const HOUR_OPTIONS = Array.from({length:24},(_,h)=>`${h.toString().padStart(2,'0')}:00`);

// Default time buckets for activity scheduling. Each activity can override these.
const DEFAULT_BUCKETS = {
  morning: {start: 7,  end: 11},   // 07:00-11:00
  evening: {start: 16, end: 20},   // 16:00-20:00
  night:   {start: 20, end: 22},   // 20:00-22:00
};
// Classify a slot start time into one of the buckets based on an activity's buckets (or defaults)
function classifyBucketWith(startMin, buckets){
  const b = buckets || DEFAULT_BUCKETS;
  const startH = startMin / 60;
  if (b.night && startH >= b.night.start && startH < b.night.end) return 'night';
  if (b.evening && startH >= b.evening.start && startH < b.evening.end) return 'evening';
  if (b.morning && startH >= b.morning.start && startH < b.morning.end) return 'morning';
  return 'open';
}

// Default mapping from CRM roomId to scheduler boat NAME. Resolved to boatId at import time.
// Room → Boat NAME mapping. User-confirmed mappings (some boats have multiple room IDs in CRM).
// NOTE: room 4 was previously mistakenly mapped to ושתי — it's actually classroom מגלן (user-confirmed v5.69).
const DEFAULT_ROOM_BOAT_MAP_BY_NAME = {
  '6': 'סבא שמשון',
  '7': 'דניאל',
  '13': 'נאווה',
  '16': 'רונית',
  '17': 'קטמנדו',
  '30': 'ליאור',
  '166': 'מישל',
  '173': 'כרמן',
  '175': 'ושתי',
  '177': 'עידו',
  '180': 'עידו',
  '178': 'אסתר',
  '179': 'רוני',
  '182': 'כרמל גת',
};
// roomIds that should be silently dropped on import (classrooms / non-boat resources)
// Rooms 11, 27, 181 are ignored entirely.
// Rooms 4 (מגלן), 22 (מגלן — אותה כיתה), 24 (כיתה 3) — classrooms shown in daily calendar.
const IGNORED_ROOM_IDS = new Set(['11','27','181']);
const CLASSROOM_NAMES_BY_ROOM_ID = {
  '4': 'מגלן',
  '22': 'מגלן',
  '24': 'כיתה 3',
};
// Events whose TEXT contains any of these keywords are "out of office" — hide from classroom display
// even if their roomId maps to a classroom. (CRM doesn't expose the "מחוץ למשרד" flag directly.)
const OUT_OF_OFFICE_KEYWORDS = [
  'IYT-BB-Abroad',  // קורסים בחו"ל
  'פלוטילה',         // טיולי פלוטילה
  'Regatta',         // תחרות
  'רגאטה',
  'הפלגה במפרשים',   // הפלגה בפועל
  'הפלגה פרטית',
  'הפלגת',
  'כיבוי אש מעשי',  // אש מעשי בנמל
  'מעשי מסכם',      // מעשי בים
  'הנצלה מעשי',
  'אדם בים - הלכה למעשה',
];

// Extract instructor name from a CRM event's text field. Names appear in parentheses inside the HTML.
// Example: "<b>ניווט חופי</b><br/>...<br/>(נייק איתן)<br/>9" → "נייק איתן"
function extractInstructorName(text){
  if(!text) return '';
  const stripped = text.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ');
  // Find the LAST parens (closest to end - usually the instructor)
  const matches = [...stripped.matchAll(/\(([^)]+)\)/g)];
  if(matches.length === 0) return '';
  return matches[matches.length - 1][1].trim();
}

// Shift a YYYY-MM-DD date string by N days (used to compensate for CRM timezone offset)
function shiftDate(dateStr, offsetDays){
  if(!dateStr) return dateStr;
  const d = new Date(dateStr+'T12:00:00');
  if(isNaN(d.getTime())) return dateStr;
  d.setDate(d.getDate() + offsetDays);
  const y = d.getFullYear();
  const m = (d.getMonth()+1).toString().padStart(2,'0');
  const day = d.getDate().toString().padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// Compute slots for a single time frame {startTime, endTime, slotInterval (hours)}
function computeFrameSlots(frame){
  if(!frame || !frame.startTime || !frame.slotInterval) return [];
  const interval = Number(frame.slotInterval);
  if(!interval || interval <= 0) return [];
  const fmt = (m)=>`${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;
  const [sh,sm] = frame.startTime.split(':').map(Number);
  const [eh,em] = (frame.endTime||'22:00').split(':').map(Number);
  const startMin = sh*60+sm, endMin = eh*60+em;
  const out = [];
  let cur = startMin;
  while(cur + interval*60 <= endMin){
    const next = cur + interval*60;
    out.push({start: fmt(cur), end: fmt(next)});
    cur = next;
  }
  return out;
}

// Returns the boat's active frames. Migrates legacy single-frame data.
function getBoatFrames(boat){
  if(!boat) return [];
  if(Array.isArray(boat.frames) && boat.frames.length) return boat.frames;
  // Legacy: boat used to have startTime/endTime/slotInterval at top level
  if(boat.startTime){
    return [{startTime: boat.startTime, endTime: boat.endTime||'22:00', slotInterval: boat.slotInterval||3}];
  }
  return [];
}

// Compute all slots for a boat across all its frames (sorted by start time)
function getBoatSlots(boat){
  const slots = getBoatFrames(boat).flatMap(f => computeFrameSlots(f));
  return slots.sort((a,b) => a.start.localeCompare(b.start));
}

// Normalize a slot value. Supports legacy format (array of instructor ids)
// and new format (array of {boatId, instructors:[ids]}).
function normSlots(v){
  if(!Array.isArray(v)||v.length===0)return [];
  if(typeof v[0]==='string')return [{boatId:null,instructors:v.filter(Boolean)}];
  return v.map(s=>({boatId:s?.boatId||null,instructors:Array.isArray(s?.instructors)?s.instructors.filter(Boolean):[]}));
}
function flatInst(slots){ return normSlots(slots).flatMap(s=>s.instructors); }

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = {hasError: false, error: null, info: null}; }
  static getDerivedStateFromError(error){ return {hasError: true, error}; }
  componentDidCatch(error, info){ console.error('Tab crash:', error, info); this.setState({info}); }
  render(){
    if (this.state.hasError) {
      return (
        <div className="card" style={{background:'#fef2f2',borderColor:'var(--danger)'}}>
          <h3 style={{color:'var(--danger)',marginBottom:8}}>⚠️ שגיאה בטעינת הלשונית</h3>
          <p style={{fontSize:13,marginBottom:8}}>אירעה שגיאה. ניתן לפתוח את ה-DevTools (F12) → Console כדי לראות פרטים.</p>
          <pre style={{background:'#fff',padding:10,borderRadius:6,fontSize:11,overflow:'auto',maxHeight:200,direction:'ltr'}}>
            {String(this.state.error?.message || this.state.error)}
            {this.state.info?.componentStack ? '\n\n' + this.state.info.componentStack : ''}
          </pre>
          <div style={{marginTop:10}}>
            <button className="btn btn-outline btn-sm" onClick={()=>this.setState({hasError:false,error:null,info:null})}>נסה שוב</button>
            <button className="btn btn-outline btn-sm" style={{marginRight:6}} onClick={()=>{
              if(window.confirm('למחוק נתוני שיבוצים ישנים מ-localStorage? פעולה זו לא ניתנת לביטול אבל יכולה לפתור את הבעיה.')){
                try{
                  const data = JSON.parse(localStorage.getItem('sch_assignments')||'{}');
                  // Keep only `schedule_${month}` (array) and the meta keys, drop legacy keys
                  const cleaned = {};
                  Object.entries(data).forEach(([k,v])=>{
                    if (k.startsWith('schedule_') && Array.isArray(v)) cleaned[k] = v;
                    else if (k === '_lastAppliedInstructor' || k === '_lastAppliedMonth') cleaned[k] = v;
                  });
                  localStorage.setItem('sch_assignments', JSON.stringify(cleaned));
                  window.location.reload();
                }catch(e){ alert('שגיאה: '+e.message); }
              }
            }}>🧹 ניקוי נתוני שיבוץ ישנים</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

}

function BoatModal({boat,onSave,onClose}){
  const [name,setName]=useState(boat?.name||'');
  const [type,setType]=useState(boat?.type||'');
  // Frames: array of {startTime, endTime, slotInterval}. Each generates a sequence of slots.
  const [frames,setFrames]=useState(()=>{
    const initial = getBoatFrames(boat||{});
    return initial.length ? initial.map(f=>({...f})) : [{startTime:'07:00', endTime:'22:00', slotInterval:3}];
  });
  const addFrame=()=>setFrames([...frames,{startTime:'09:00',endTime:'20:00',slotInterval:3}]);
  const updateFrame=(idx,field,val)=>setFrames(frames.map((f,i)=>i===idx?{...f,[field]:val}:f));
  const removeFrame=(idx)=>setFrames(frames.filter((_,i)=>i!==idx));
  // Combined preview across all frames
  const previewSlots = frames.flatMap(f => computeFrameSlots({...f, slotInterval: Number(f.slotInterval)})).sort((a,b)=>a.start.localeCompare(b.start));

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{boat?'עריכת ספינה':'הוספת ספינה'}</h3>

          <div className="form-group" style={{flex:1}}>

            <label>סוג</label>
            <select value={type} onChange={e=>setType(e.target.value)}>
              <option value="">— בחר —</option>
              {BOAT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group" style={{marginBottom:12}}>
          <label>מסגרות פעילות (כל מסגרת = שעת התחלה + מרווח + שעת סיום)</label>
          <div style={{fontSize:11,color:'var(--text-light)',marginBottom:8}}>
            אפשר להגדיר יותר ממסגרת אחת לספינה. למשל: 7-9 (מרווח 2) ואז 13-16 (מרווח 3).
          </div>
          <div className="frames-list">
            {frames.map((f,i)=>(
              <div key={i} className="frame-row">
                <span className="frame-lbl">מ-</span>
                <select value={f.startTime} onChange={e=>updateFrame(i,'startTime',e.target.value)}>
                  {HOUR_OPTIONS.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
                <span className="frame-lbl">עד</span>
                <select value={f.endTime} onChange={e=>updateFrame(i,'endTime',e.target.value)}>
                  {HOUR_OPTIONS.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
                <span className="frame-lbl">מרווח</span>
                <select value={f.slotInterval} onChange={e=>updateFrame(i,'slotInterval',Number(e.target.value))}>
                  <option value={1}>1 שעה</option>
                  <option value={2}>2 שעות</option>
                  <option value={3}>3 שעות</option>
                  <option value={4}>4 שעות</option>
                  <option value={5}>5 שעות</option>
                </select>
                {frames.length>1 && <button type="button" className="btn-icon" onClick={()=>removeFrame(i)} title="הסר מסגרת">🗑</button>}

function ActivitiesTab({activities,setActivities,allSkills,boats,showToast,daylightStart,setDaylightStart,daylightEnd,setDaylightEnd}){
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [openGroups,setOpenGroups]=useState(()=>new Set());

  const boatTypes=useMemo(()=>[...new Set(boats.map(b=>b.type).filter(Boolean))].sort(),[boats]);

  const grouped=useMemo(()=>{
    const g={};
    const add=(key,a)=>{if(!g[key])g[key]=[];if(!g[key].find(x=>x.id===a.id))g[key].push(a);};
    activities.forEach(a=>{
      const types=a.allowedBoatTypes||[];
      const ids=a.allowedBoatIds||[];
      if(!types.length&&!ids.length){add('כל הסירות',a);}
      else{
        types.forEach(t=>add(t,a));
        if(ids.length&&!types.length){
          const ts=new Set(ids.map(id=>boats.find(b=>b.id===id)?.type).filter(Boolean));
          if(ts.size)ts.forEach(t=>add(t,a));else add('ספציפי',a);
        }
      }
    });
    return g;
  },[activities,boats]);

  const groupOrder=useMemo(()=>[
    ...boatTypes.filter(t=>grouped[t]),
    ...(grouped['כל הסירות']?['כל הסירות']:[]),
    ...(grouped['ספציפי']?['ספציפי']:[]),
  ],[boatTypes,grouped]);

  const toggleGroup=key=>setOpenGroups(prev=>{const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});

  return(
    <div>
      <div className="card" style={{background:'#fffbeb',borderColor:'#fbbf24',marginBottom:12}}>
        <h3 style={{marginBottom:8,fontSize:14}}>☀️ שעות אור (חל על כל הפעילויות)</h3>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontSize:13}}>מ:</span>
          <input type="time" value={daylightStart} onChange={e=>setDaylightStart(e.target.value)} style={{width:120}}/>
          <span style={{fontSize:13}}>עד:</span>
          <input type="time" value={daylightEnd} onChange={e=>setDaylightEnd(e.target.value)} style={{width:120}}/>
          <span style={{fontSize:11,color:'var(--text-light)'}}>פעילות שמוגדרת "שעות אור" תהיה רק בטווח הזה. "שעות חושך" - מחוץ לטווח. "לא משנה" - בכל זמן.</span>
        </div>
      </div>
      <div className="card">
        <div className="card-header">
          <h2>רשימת פעילויות <span className="badge badge-primary">{activities.length}</span></h2>
          <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true);}}>+ הוסף פעילות</button>
        </div>
        {activities.length===0?(
          <div className="empty-state"><div className="icon">📋</div><p>טרם הוגדרו פעילויות. לחץ "+ הוסף פעילות" כדי להתחיל.</p></div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:8}}>
            {groupOrder.map(groupKey=>{
              const acts=grouped[groupKey]||[];
              const isOpen=openGroups.has(groupKey);
              const totalPerMonth=acts.reduce((s,a)=>s+(Number(a.totalPerMonth)||0),0);
              return(
                <div key={groupKey} style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',background:'var(--bg)',userSelect:'none'}} onClick={()=>toggleGroup(groupKey)}>
                    <span style={{width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:5,border:'1px solid var(--border)',fontSize:16,fontWeight:700,flexShrink:0,background:'#fff'}}>{isOpen?'−':'+'}</span>
                    <span style={{fontWeight:700,fontSize:14,flex:1}}>{groupKey}</span>
                    <span style={{fontSize:12,color:'var(--text-light)',background:'var(--primary-light)',borderRadius:4,padding:'2px 8px',marginLeft:6}}>{acts.length} פעילויות</span>
                    <span style={{fontSize:12,color:'var(--text-light)'}}>{totalPerMonth} סה״כ/חודש</span>
                  </div>
                  {isOpen&&(
                    <div style={{borderTop:'1px solid var(--border)'}}>
                      <table style={{margin:0}}>
                        <thead>
                          <tr>
                            <th>שם פעילות</th>
                            <th>אורך</th>
                            <th>סה״כ/חודש</th>
                            <th>מדריכים</th>
                            <th>פעולות</th>
                          </tr>
                        </thead>
                        <tbody>
                          {acts.map(a=>(
                            <tr key={a.id} style={(a.totalPerMonth||0)===0?{opacity:.5}:{}}>
                              <td style={{fontWeight:600}}>{a.name}{(a.totalPerMonth||0)===0?' (מושבת)':''}{(a.specificDates&&a.specificDates.length>0)?' 📅':''}</td>
                              <td style={{fontSize:13}}>{a.durationHours||3}ש'</td>
                              <td style={{fontWeight:600,fontSize:14}}>{a.totalPerMonth||0}</td>
                              <td style={{fontSize:13}}>{a.instructorsNeeded||1}</td>
                              <td>
                                <div style={{display:'flex',gap:4}}>
                                  <button className="btn-icon" onClick={()=>{setEditing(a);setShowModal(true);}}>✏️</button>
                                  <button className="btn-icon" onClick={()=>{setActivities(p=>p.filter(x=>x.id!==a.id));showToast('פעילות הוסרה');}}>🗑️</button>
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
      {showModal&&<ActivityModal activity={editing} boats={boats} onSave={(data)=>{
        if(editing){setActivities(p=>p.map(x=>x.id===editing.id?{...x,...data}:x));showToast('פעילות עודכנה');}
        else{setActivities(p=>[...p,{id:generateId(),...data}]);showToast('פעילות נוספה');}
        setShowModal(false);
      }} onClose={()=>setShowModal(false)}/>}
    </div>
  );
}
function ActivityModal({activity,boats,onSave,onClose}){
  const [name,setName]=useState(activity?.name||'');
  const [activityType,setActivityType]=useState(activity?.activityType||'students'); // 'students' | 'advanced' | 'club'
  const [durationHours,setDurationHours]=useState(activity?.durationHours||3);
  const [totalPerMonth,setTotalPerMonth]=useState(activity?.totalPerMonth ?? 0);
  const [instructorsNeeded,setInstructorsNeeded]=useState(activity?.instructorsNeeded ?? 1);
  const [morning,setMorning]=useState(activity?.morning||0);
  const [evening,setEvening]=useState(activity?.evening||0);
  const [night,setNight]=useState(activity?.night||0);
  const [friday,setFriday]=useState(activity?.friday||0);
  const [saturday,setSaturday]=useState(activity?.saturday||0);
  const [allowedBoatTypes,setAllowedBoatTypes]=useState(activity?.allowedBoatTypes ? [...activity.allowedBoatTypes] : []);
  const [allowedBoatIds,setAllowedBoatIds]=useState(activity?.allowedBoatIds ? [...activity.allowedBoatIds] : []);
  // Specific days of the month (1..31) on which this activity must be placed.
  const [specificDatesText,setSpecificDatesText]=useState((activity?.specificDates||[]).join(', '));
  // Time mode: 'daylight' (default) | 'dark' | 'any'
  const [timeMode,setTimeMode]=useState(activity?.timeMode||'daylight');
  // Optional: explicit override window (HH:MM-HH:MM). If set, takes precedence over timeMode.
  const [activeWindowStart,setActiveWindowStart]=useState(activity?.activeWindowStart||'');
  const [activeWindowEnd,setActiveWindowEnd]=useState(activity?.activeWindowEnd||'');
  // Time-bucket overrides (defaults if not set)
  const defaultB = {morning:{start:7,end:11}, evening:{start:16,end:20}, night:{start:20,end:22}};
  const initialB = activity?.buckets || defaultB;
  const [bMorningStart,setBMorningStart]=useState(initialB.morning?.start ?? 7);
  const [bMorningEnd,setBMorningEnd]=useState(initialB.morning?.end ?? 11);
  const [bEveningStart,setBEveningStart]=useState(initialB.evening?.start ?? 16);
  const [bEveningEnd,setBEveningEnd]=useState(initialB.evening?.end ?? 20);
  const [bNightStart,setBNightStart]=useState(initialB.night?.start ?? 20);
  const [bNightEnd,setBNightEnd]=useState(initialB.night?.end ?? 22);
  const [showBuckets,setShowBuckets]=useState(false);
  const bucketsAreDefault = bMorningStart===7 && bMorningEnd===11 && bEveningStart===16 && bEveningEnd===20 && bNightStart===20 && bNightEnd===22;

  const toggleType = (t) => setAllowedBoatTypes(allowedBoatTypes.includes(t) ? allowedBoatTypes.filter(x=>x!==t) : [...allowedBoatTypes, t]);
  const toggleBoat = (id) => setAllowedBoatIds(allowedBoatIds.includes(id) ? allowedBoatIds.filter(x=>x!==id) : [...allowedBoatIds, id]);

  const total = Number(totalPerMonth)||0;
  const allocated = Number(morning)+Number(evening)+Number(night);
  const openCount = Math.max(0, total - allocated);
  const dayAllocated = Number(friday)+Number(saturday);

  const numInput = (val, setter) => (
    <input type="number" min={0} value={val} onChange={e=>setter(Math.max(0,Number(e.target.value)||0))} style={{width:70,textAlign:'center'}}/>
  );

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:600}}>
        <h3>{activity?'עריכת פעילות':'הוספת פעילות'}</h3>
        <div className="form-row">
          <div className="form-group" style={{flex:2}}>
            <label>שם הפעילות *</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="למשל: סדנת חתירה" autoFocus/>
          </div>
          <div className="form-group" style={{flex:1.5}}>
            <label>סוג</label>
            <select value={activityType} onChange={e=>setActivityType(e.target.value)}>
              <option value="students">מודרכת תלמידים</option>
              <option value="advanced">מודרכות מתקדמות</option>

        <div className="form-row">

            <label>אורך (שעות) *</label>

          </div>
          <div className="form-group" style={{flex:1}}>
            <label>כמות בחודש</label>
            <input type="number" min={0} value={totalPerMonth} onChange={e=>setTotalPerMonth(Math.max(0,Number(e.target.value)||0))}/>
            <div style={{fontSize:10,color:'var(--text-light)',marginTop:2}}>0 = לא לתזמן (השאר ב-DB)</div>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>מדריכים נדרשים</label>
            <input type="number" min={1} max={15} value={instructorsNeeded} onChange={e=>setInstructorsNeeded(Math.min(15,Math.max(1,Number(e.target.value)||1)))}/>

        </div>

        <div className="form-group" style={{marginBottom:12}}>
          <label>מתוכן בשעות (אופציונלי - מה שלא הוגדר פתוח לכל שעה)</label>
          <div className="time-breakdown">
            <div className="tb-row"><span className="tb-lbl">בוקר {bMorningStart.toString().padStart(2,'0')}:00-{bMorningEnd.toString().padStart(2,'0')}:00</span>{numInput(morning,setMorning)}</div>
            <div className="tb-row"><span className="tb-lbl">ערב {bEveningStart.toString().padStart(2,'0')}:00-{bEveningEnd.toString().padStart(2,'0')}:00</span>{numInput(evening,setEvening)}</div>
            <div className="tb-row"><span className="tb-lbl">לילה {bNightStart.toString().padStart(2,'0')}:00-{bNightEnd.toString().padStart(2,'0')}:00</span>{numInput(night,setNight)}</div>
          </div>
          <div style={{marginTop:6}}>
            <button type="button" className="btn btn-outline btn-sm" onClick={()=>setShowBuckets(!showBuckets)}>
              {showBuckets?'▼ הסתר':'▶ עדכן חלונות זמן'} {!bucketsAreDefault && '⚙'}
            </button>
            {showBuckets && (
              <div style={{background:'#f8fafc',border:'1px solid var(--border)',borderRadius:6,padding:10,marginTop:6}}>
                <div style={{fontSize:11,color:'var(--text-light)',marginBottom:8}}>
                  שינוי החלונות לפעילות זו (למשל שעון חורף). אם לא נוגעים, נשמר ברירת המחדל.
                </div>
                <div className="form-row">
                  <div className="form-group" style={{flex:1}}>
                    <label>בוקר מ</label>
                    <select value={bMorningStart} onChange={e=>setBMorningStart(Number(e.target.value))}>
                      {Array.from({length:24},(_,h)=><option key={h} value={h}>{h.toString().padStart(2,'0')}:00</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{flex:1}}>
                    <label>בוקר עד</label>
                    <select value={bMorningEnd} onChange={e=>setBMorningEnd(Number(e.target.value))}>
                      {Array.from({length:24},(_,h)=><option key={h} value={h}>{h.toString().padStart(2,'0')}:00</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-row">
                  <div className="form-group" style={{flex:1}}>
                    <label>ערב מ</label>
                    <select value={bEveningStart} onChange={e=>setBEveningStart(Number(e.target.value))}>
                      {Array.from({length:24},(_,h)=><option key={h} value={h}>{h.toString().padStart(2,'0')}:00</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{flex:1}}>
                    <label>ערב עד</label>
                    <select value={bEveningEnd} onChange={e=>setBEveningEnd(Number(e.target.value))}>
                      {Array.from({length:24},(_,h)=><option key={h} value={h}>{h.toString().padStart(2,'0')}:00</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-row">
                  <div className="form-group" style={{flex:1}}>
                    <label>לילה מ</label>
                    <select value={bNightStart} onChange={e=>setBNightStart(Number(e.target.value))}>
                      {Array.from({length:24},(_,h)=><option key={h} value={h}>{h.toString().padStart(2,'0')}:00</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{flex:1}}>
                    <label>לילה עד</label>
                    <select value={bNightEnd} onChange={e=>setBNightEnd(Number(e.target.value))}>
                      {Array.from({length:24},(_,h)=><option key={h} value={h}>{h.toString().padStart(2,'0')}:00</option>)}
                    </select>
                  </div>
                </div>
              </div>
            )}
          </div>
          {total > 0 && (
            <div style={{fontSize:12,color: allocated>total?'var(--danger)':'var(--text-light)',marginTop:6}}>
              {allocated > total ? `⚠️ הוקצו ${allocated} בעוד שהכמות החודשית היא ${total}` : `הוקצו ${allocated} מתוך ${total} (${openCount} פתוחים)`}
            </div>
          )}
        </div>

        <div className="form-group" style={{marginBottom:12}}>
          <label>תאריכים ספציפיים בחודש (אופציונלי)</label>
          <input value={specificDatesText} onChange={e=>setSpecificDatesText(e.target.value)} placeholder="לדוגמה: 5, 12, 19, 26"/>
          <div style={{fontSize:11,color:'var(--text-light)',marginTop:4}}>
            אם מוגדר — האלגוריתם יפרוס בדיוק אחד מכל תאריך. "מתוכן בשעות" יחול על התאריכים האלה.
          </div>
        </div>
        <div className="form-group" style={{marginBottom:12}}>
          <label>חלון זמן לפעילות</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[
              {v:'daylight',l:'☀️ שעות אור (ברירת מחדל)'},

              {v:'any',l:'⏰ לא משנה'}

              <label key={o.v} style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',padding:'5px 10px',borderRadius:6,border:'1px solid var(--border)',background:timeMode===o.v?'var(--primary-light)':'#fff',fontSize:13,fontWeight:500}}>
                <input type="radio" name="timeMode" value={o.v} checked={timeMode===o.v} onChange={()=>setTimeMode(o.v)} style={{width:'auto',margin:0}}/>
                {o.l}
              </label>
            ))}
          </div>
        </div>
        <div className="form-group" style={{marginBottom:12}}>
          <label>חלון פעילות מדויק (אופציונלי, גובר על "חלון זמן")</label>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:12}}>מ:</span>
            <input value={activeWindowStart} onChange={e=>setActiveWindowStart(e.target.value)} placeholder="HH:MM" style={{flex:1}}/>
            <span style={{fontSize:12}}>עד:</span>
            <input value={activeWindowEnd} onChange={e=>setActiveWindowEnd(e.target.value)} placeholder="HH:MM" style={{flex:1}}/>
          </div>
        </div>

        <div className="form-group" style={{marginBottom:12}}>
          <label>מתוכן בסוף שבוע (אופציונלי)</label>
          <div className="time-breakdown">
            <div className="tb-row"><span className="tb-lbl">שישי</span>{numInput(friday,setFriday)}</div>
            <div className="tb-row"><span className="tb-lbl">שבת</span>{numInput(saturday,setSaturday)}</div>
          </div>
          {total > 0 && dayAllocated > 0 && (
            <div style={{fontSize:12,color: dayAllocated>total?'var(--danger)':'var(--text-light)',marginTop:6}}>
              {dayAllocated > total ? `⚠️ הוקצו ${dayAllocated} ימי סופ"ש בעוד שהכמות היא ${total}` : `${dayAllocated} מתוך ${total} בסופ"ש`}
            </div>
          )}
        </div>

        <div className="form-group" style={{marginBottom:12}}>
          <label>סירות מתאימות לפי סוג (אם ריק - כל הסוגים מתאימים)</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
            {BOAT_TYPES.map(t=>(
              <label key={t} style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',padding:'5px 10px',borderRadius:6,border:'1px solid var(--border)',background:allowedBoatTypes.includes(t)?'var(--primary-light)':'#fff',fontSize:13,fontWeight:500}}>
                <input type="checkbox" checked={allowedBoatTypes.includes(t)} onChange={()=>toggleType(t)} style={{width:'auto',margin:0}}/>
                {t}
              </label>
            ))}
          </div>
        </div>

        <div className="form-group" style={{marginBottom:12}}>
          <label>או סירות ספציפיות (אופציונלי - בחר אחת או יותר)</label>
          {boats.length===0 ? (
            <div style={{fontSize:12,color:'var(--text-light)',padding:6}}>אין ספינות מוגדרות עדיין.</div>
          ) : (
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:4,maxHeight:160,overflowY:'auto',padding:6,border:'1px solid var(--border)',borderRadius:6}}>
              {boats.map(b=>(
                <label key={b.id} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',padding:'3px 8px',borderRadius:6,border:'1px solid var(--border)',background:allowedBoatIds.includes(b.id)?'var(--primary-light)':'#fff',fontSize:12}}>
                  <input type="checkbox" checked={allowedBoatIds.includes(b.id)} onChange={()=>toggleBoat(b.id)} style={{width:'auto',margin:0}}/>
                  {b.name}
                </label>
              ))}
            </div>
          )}
          <div style={{fontSize:11,color:'var(--text-light)',marginTop:4}}>אם לא נבחרת אף סירה כאן - כל הסירות מהסוגים שנבחרו למעלה ייחשבו מתאימות.</div>
        </div>

        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button className="btn btn-primary" disabled={!name.trim()} onClick={()=>{
            const parsedDates = specificDatesText.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean).map(Number).filter(n=>Number.isInteger(n)&&n>=1&&n<=31);
            const finalTotal = parsedDates.length > 0 ? parsedDates.length : total;
            onSave({
              name:name.trim(),
              activityType:activityType||'students',
              durationHours:Number(durationHours)||3,
              totalPerMonth:finalTotal,
              instructorsNeeded:Number(instructorsNeeded)||1,
              morning:Number(morning), evening:Number(evening), night:Number(night),
              friday:Number(friday), saturday:Number(saturday),
              allowedBoatTypes:[...allowedBoatTypes],
              allowedBoatIds:[...allowedBoatIds],
              specificDates: parsedDates,
              timeMode: timeMode||'daylight',
              activeWindowStart: (activeWindowStart||'').trim(),
              activeWindowEnd: (activeWindowEnd||'').trim(),
              buckets: {
                morning:{start:bMorningStart,end:bMorningEnd},
                evening:{start:bEveningStart,end:bEveningEnd},
                night:{start:bNightStart,end:bNightEnd}
              }
            });
          }}>
            {activity?'עדכן':'הוסף'}
          </button>
          <button className="btn btn-outline" onClick={onClose}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

function AvailabilityTab({instructors,availability,setAvailability,month,showToast,lastAppliedId}){
  const [viewMode,setViewMode]=useState(()=>{ try{return localStorage.getItem('avail_view_mode')||'inst';}catch{return 'inst';} });
  useEffect(()=>{try{localStorage.setItem('avail_view_mode', viewMode);}catch{}},[viewMode]);
  const [search,setSearch]=useState('');
  // Sort instructors by priority (high first), then alphabetically
  const allInstructorsSorted = useMemo(()=>{
    const pOrder = {high:0, medium:1, low:2};
    return instructors.slice().sort((a,b)=>{
      const pa = pOrder[a.priority] ?? 1, pb = pOrder[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      return (a.name||'').localeCompare(b.name||'', 'he');
    });
  },[instructors]);
  // Filtered list (by search) — used for the dropdown options
  const sortedInstructors = useMemo(()=>{
    if (!search) return allInstructorsSorted;
    return allInstructorsSorted.filter(i =>
      i.name?.includes(search) || i.phone?.includes(search) || i.skills?.some(s=>s.includes(search))
    );
  },[allInstructorsSorted, search]);
  // Persist last viewed instructor across tab switches and app reloads
  const [selectedInstructor,setSelectedInstructor]=useState(()=>{
    try {
      const saved = localStorage.getItem('avail_last_inst');
      if (saved && instructors.find(i => i.id === saved)) return saved;
    } catch {}
    return lastAppliedId || allInstructorsSorted[0]?.id || '';
  });
  useEffect(()=>{
    if (selectedInstructor) {
      try { localStorage.setItem('avail_last_inst', selectedInstructor); } catch {}
    }
  },[selectedInstructor]);
  // When search filters narrow the list and current selection isn't in it, jump to the first match
  useEffect(()=>{
    if (search && sortedInstructors.length > 0 && !sortedInstructors.find(i => i.id === selectedInstructor)) {
      setSelectedInstructor(sortedInstructors[0].id);
    }
  },[sortedInstructors, search]);
  // Drag state for click-and-hold painting like the availability form
  const dragRef = React.useRef({active:false, mode:null, value:null});
  // Only respond to lastAppliedId CHANGES (not initial value) — initial state already considered it as fallback.
  // This prevents overriding the saved "last viewed instructor" on every mount.
  const initialLastApplied = React.useRef(lastAppliedId);
  useEffect(()=>{
    if (lastAppliedId !== initialLastApplied.current && lastAppliedId && instructors.find(i=>i.id===lastAppliedId)){
      setSelectedInstructor(lastAppliedId);
      initialLastApplied.current = lastAppliedId;
    }
  },[lastAppliedId]);

  const daysInMonth = useMemo(()=>{
    if(!month)return[];
    const [y,m]=month.split('-').map(Number);
    const count=new Date(y,m,0).getDate();
    return Array.from({length:count},(_,i)=>{
      const d=new Date(y,m-1,i+1);
      return {date:i+1,dayOfWeek:d.getDay(),dayName:DAYS_HEB[d.getDay()]};
    });
  },[month]);

  const key=`${selectedInstructor}_${month}`;
  const instAvail=availability[key]||{};
  // Check if this instructor has data in OTHER months (helps debugging)
  const otherMonthsWithData = useMemo(()=>{
    if(!selectedInstructor) return [];
    const others = [];
    Object.keys(availability).forEach(k=>{
      const [iid, mo] = k.split('_');
      if(iid === selectedInstructor && mo !== month && Object.keys(availability[k]||{}).length > 0){
        others.push(mo);
      }
    });
    return others;
  }, [selectedInstructor, month, availability]);

  // Left click cycles between empty <-> available (✓).
  // Right click cycles between empty <-> work (💼) -- "busy elsewhere, prefer adjacent activity".
  const toggleSlot=(date,hour,asWork)=>{
    const slotKey=`${date}_${hour}`;
    setAvailability(prev=>{
      const cur=(prev[key]||{})[slotKey];
      let newValue;
      if(asWork){
        newValue = cur === 'work' ? false : 'work';
      } else {
        newValue = cur === true ? false : true;
      }
      return {...prev,[key]:{...prev[key],[slotKey]:newValue}};
    });
  };

  // Directly set a slot to a target value (used during drag-paint, not for toggling)
  const setSlot = (date, hour, newValue) => {
    const slotKey = `${date}_${hour}`;
    setAvailability(prev => ({...prev, [key]:{...prev[key], [slotKey]: newValue}}));
  };

  // Drag handlers: begin a drag on mousedown, paint subsequent cells with the same value
  const beginDrag = (date, hour, isRight) => {
    const cur = instAvail[`${date}_${hour}`];
    let target;
    if (isRight) {
      target = cur === 'work' ? false : 'work';
    } else {
      target = cur === true ? false : true;
    }
    dragRef.current = {active:true, mode: isRight?'work':'avail', value: target};
    setSlot(date, hour, target);
  };
  const enterDrag = (date, hour) => {
    if (!dragRef.current.active) return;
    setSlot(date, hour, dragRef.current.value);
  };
  const endDrag = () => { dragRef.current = {active:false, mode:null, value:null}; };
  useEffect(()=>{
    const up = () => endDrag();
    window.addEventListener('mouseup', up);
    return () => window.removeEventListener('mouseup', up);
  },[]);

  const toggleDay=(date)=>{
    const daySlots={};
    const current=availability[key]||{};
    const allOn=HOURS.every(h=>current[`${date}_${h}`]);
    HOURS.forEach(h=>{daySlots[`${date}_${h}`]=!allOn;});
    setAvailability(prev=>({...prev,[key]:{...prev[key],...daySlots}}));
  };

  const fillAll=()=>{
    const slots={};
    daysInMonth.forEach(d=>{
      HOURS.forEach(h=>{slots[`${d.date}_${h}`]=true;});
    });
    setAvailability(prev=>({...prev,[key]:slots}));
    showToast('זמינות מלאה סומנה (חוץ משבת)');
  };

  const clearAll=()=>{
    setAvailability(prev=>({...prev,[key]:{}}));
    showToast('זמינות נוקתה');
  };

  const availCount=Object.values(instAvail).filter(Boolean).length;

  if(instructors.length===0)return(
    <div className="card"><div className="empty-state"><div className="icon">📅</div><p>יש להוסיף מדריכים קודם בלשונית "מדריכים".</p></div></div>
  );

  return(
    <div>
      <div className="card">
        <div className="card-header">
          <h2>ניהול זמינות חודשית</h2>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{display:'flex',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
              <button onClick={()=>setViewMode('inst')} className="btn-sm" style={{padding:'5px 10px',border:'none',background:viewMode==='inst'?'var(--primary)':'#fff',color:viewMode==='inst'?'#fff':'var(--text)',cursor:'pointer',fontSize:12}}>👤 לפי מדריך</button>
              <button onClick={()=>setViewMode('date')} className="btn-sm" style={{padding:'5px 10px',border:'none',background:viewMode==='date'?'var(--primary)':'#fff',color:viewMode==='date'?'#fff':'var(--text)',cursor:'pointer',fontSize:12}}>📅 לפי תאריך</button>
            </div>
            {viewMode==='inst' && <input placeholder="🔍 חיפוש מדריך..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:140}}/>}
            {viewMode==='inst' && <select value={selectedInstructor} onChange={e=>setSelectedInstructor(e.target.value)} style={{minWidth:180}}>
              {sortedInstructors.map(i=><option key={i.id} value={i.id}>{i.name} {i.priority==='high'?'★':i.priority==='low'?'·':''}</option>)}
            </select>}
            <button className="btn btn-sm btn-success" onClick={fillAll}>✓ סמן הכל</button>
            <button className="btn btn-sm btn-outline" onClick={clearAll}>✗ נקה הכל</button>
            <label className="btn btn-sm btn-primary" style={{cursor:'pointer'}}>
              📥 ייבוא מטופס מדריך
              <input type="file" accept=".json" multiple style={{display:'none'}} onChange={e=>{
                const files=Array.from(e.target.files);
                let imported=0;
                files.forEach(f=>{
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    try{
                      const d=JSON.parse(ev.target.result);
                      if(d.type==='instructor_availability'&&d.instructor&&d.availability){
                        const inst=instructors.find(i=>i.name===d.instructor.name);
                        if(inst){
                          const avKey=`${inst.id}_${d.month||month}`;
                          setAvailability(prev=>({...prev,[avKey]:{...(prev[avKey]||{}),...d.availability}}));
                          imported++;
                          showToast(`זמינות של ${d.instructor.name} יובאה בהצלחה (${d.summary?.totalHours||0} שעות)`);
                        }else{
                          showToast(`מדריך "${d.instructor.name}" לא נמצא במערכת. הוסף אותו קודם.`);
                        }
                      }else{showToast('קובץ לא תקין - אינו טופס זמינות מדריך');}
                    }catch{showToast('שגיאה בקריאת הקובץ');}
                  };reader.readAsText(f);
                });
                e.target.value='';
              }}/>
            </label>
          </div>
        </div>
        <div style={{marginBottom:12,fontSize:13,color:'var(--text-light)'}}>
          ✓ זמין: לחיצה / גרירה שמאלית. 💼 עובד: לחיצה / גרירה ימנית. לחץ על תאריך כדי לסמן/לבטל יום שלם.
          <span className="badge badge-info" style={{marginRight:8}}>{availCount} משבצות זמינות</span>
          {otherMonthsWithData.length>0 && (
            <span className="badge badge-warning" style={{marginRight:8}}>
              למדריך זה יש זמינות גם בחודשים: {otherMonthsWithData.join(', ')} - שנה את החודש למעלה
            </span>
          )}
        </div>
        <div style={{overflowX:'auto'}}>
          {viewMode==='inst' ? (
          <div className="avail-grid" style={{gridTemplateColumns:`80px repeat(${HOURS.length},minmax(48px,1fr))`}}>
            <div className="avail-cell header">תאריך</div>
            {HOURS.map(h=><div key={h} className="avail-cell header" style={{fontSize:10}}>{h}</div>)}
            {daysInMonth.map(d=>(
              <React.Fragment key={d.date}>
                <div className="avail-cell header" style={{cursor:'pointer',fontSize:11}} onClick={()=>toggleDay(d.date)}>
                  {d.date} - {d.dayName}
                </div>
                {HOURS.map(h=>{
                  const v=instAvail[`${d.date}_${h}`];
                  const cls = v===true ? 'available' : v==='work' ? 'work' : 'unavailable';
                  const label = v===true ? '✓' : v==='work' ? '💼' : '';
                  return <div key={h} className={`avail-cell ${cls}`}
                    onMouseDown={e=>{e.preventDefault(); beginDrag(d.date, h, e.button === 2);}}
                    onContextMenu={e=>e.preventDefault()}
                    onMouseEnter={()=>enterDrag(d.date, h)}
                    title="לחץ והחזק שמאלי לסימון זמין · לחץ והחזק ימני לסימון עובד · גרור לרוחב"
                  >{label}</div>;
                })}
              </React.Fragment>
            ))}
          </div>
          ) : (
          // BY-DATE view: rows = instructors, columns = hours, for a SELECTED date
          <AvailabilityByDate
            instructors={allInstructorsSorted}
            availability={availability}
            month={month}
            daysInMonth={daysInMonth}
            setAvailability={setAvailability}
          />
          )}
        </div>
      </div>
    </div>
  );
}

function AvailabilityByDate({instructors, availability, month, daysInMonth, setAvailability}){
  const [selectedDate,setSelectedDate]=useState(()=>{
    try { return Number(localStorage.getItem('avail_by_date_selected'))||1; } catch { return 1; }
  });
  useEffect(()=>{try{localStorage.setItem('avail_by_date_selected', String(selectedDate));}catch{}},[selectedDate]);
  const dragRef = React.useRef({active:false, mode:null, value:null});
  useEffect(()=>{
    const up = ()=>{ dragRef.current = {active:false, mode:null, value:null}; };
    window.addEventListener('mouseup', up);
    return ()=>window.removeEventListener('mouseup', up);
  },[]);
  const dayObj = daysInMonth.find(d => d.date === selectedDate) || daysInMonth[0];
  if (!dayObj) return <div style={{padding:20}}>אין תאריכים</div>;
  const setSlot = (instId, hour, newValue) => {
    const key = `${instId}_${month}`;
    setAvailability(prev => ({...prev, [key]: {...prev[key], [`${selectedDate}_${hour}`]: newValue}}));
  };
  const beginDrag = (instId, hour, isRight) => {
    const key = `${instId}_${month}`;
    const cur = availability[key]?.[`${selectedDate}_${hour}`];
    const target = isRight
      ? (cur === 'work' ? false : 'work')
      : (cur === true ? false : true);
    dragRef.current = {active:true, value: target};
    setSlot(instId, hour, target);
  };
  const enterDrag = (instId, hour) => {
    if (!dragRef.current.active) return;
    setSlot(instId, hour, dragRef.current.value);
  };
  return (
    <div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10}}>
        <button className="btn btn-outline btn-sm" onClick={()=>setSelectedDate(Math.max(1,selectedDate-1))} disabled={selectedDate===1}>◀</button>
        <select value={selectedDate} onChange={e=>setSelectedDate(Number(e.target.value))} style={{minWidth:160}}>
          {daysInMonth.map(d => <option key={d.date} value={d.date}>{d.date}/{month.split('-')[1]} - {d.dayName}</option>)}
        </select>
        <button className="btn btn-outline btn-sm" onClick={()=>setSelectedDate(Math.min(daysInMonth.length,selectedDate+1))} disabled={selectedDate===daysInMonth.length}>▶</button>
        <span style={{fontSize:12,color:'var(--text-light)'}}>תצוגה: כל המדריכים עבור תאריך זה</span>
      </div>
      <div className="avail-grid" style={{gridTemplateColumns:`120px repeat(${HOURS.length},minmax(40px,1fr))`}}>
        <div className="avail-cell header">מדריך</div>
        {HOURS.map(h=><div key={h} className="avail-cell header" style={{fontSize:10}}>{h}</div>)}
        {instructors.map(inst => (
          <React.Fragment key={inst.id}>
            <div className="avail-cell header" style={{fontSize:11,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',padding:'4px 6px'}}>
              {inst.name} {inst.priority==='high'?'★':inst.priority==='low'?'·':''}
            </div>
            {HOURS.map(h=>{
              const v = availability[`${inst.id}_${month}`]?.[`${selectedDate}_${h}`];
              const cls = v===true ? 'available' : v==='work' ? 'work' : 'unavailable';
              const label = v===true ? '✓' : v==='work' ? '💼' : '';
              return <div key={h} className={`avail-cell ${cls}`}
                onMouseDown={e=>{e.preventDefault(); beginDrag(inst.id, h, e.button === 2);}}
                onContextMenu={e=>e.preventDefault()}
                onMouseEnter={()=>enterDrag(inst.id, h)}
                title={`${inst.name} - ${selectedDate}/${month.split('-')[1]} ${h}`}
              >{label}</div>;
            })}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function CalendarDayView({boats, instructors, assignments, crmEvents, roomBoatMap, month, setMonth}){
  // Visual L→R: עידו ושתי אסתר רוני כרמל גת כרמן מישל נאווה רונית ליאור דניאל סבא שמשון קטמנדו | כיתה 3 מגלן
  // RTL table: first DOM col = visually rightmost → reverse desired visual order for array
  const BOAT_COL_ORDER=['קטמנדו','סבא שמשון','דניאל','ליאור','רונית','נאווה','מישל','כרמן','כרמל גת','רוני','אסתר','ושתי','עידו'];
  const CLASS_COL_ORDER=['מגלן','כיתה 3'];
  const sortedBoats=useMemo(()=>[...boats].sort((a,b)=>{
    const ia=BOAT_COL_ORDER.indexOf(a.name),ib=BOAT_COL_ORDER.indexOf(b.name);
    if(ia===-1&&ib===-1)return(a.name||'').localeCompare(b.name||'','he');
    if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;
  }),[boats]);
  const sortCls=(ids)=>[...ids].sort((a,b)=>{
    const ia=CLASS_COL_ORDER.indexOf(a),ib=CLASS_COL_ORDER.indexOf(b);
    if(ia===-1&&ib===-1)return a.localeCompare(b,'he');
    if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;
  });

  // Persist selected date
  const [selectedDateNum, setSelectedDateNum] = useState(()=>{
    try { const saved = localStorage.getItem('cal_view_date'); return saved ? Number(saved) : 1; }
    catch { return 1; }
  });
  useEffect(()=>{ try { localStorage.setItem('cal_view_date', String(selectedDateNum)); } catch {} },[selectedDateNum]);

  const [y,mNum] = month.split('-').map(Number);
  const lastDay = new Date(y, mNum, 0).getDate();
  const selDate = Math.min(Math.max(selectedDateNum, 1), lastDay);
  const selDateObj = new Date(y, mNum-1, selDate);
  const dayName = DAYS_HEB[selDateObj.getDay()];
  const dateStr = `${y}-${mNum.toString().padStart(2,'0')}-${selDate.toString().padStart(2,'0')}`;

  // Hours grid: 06:00 - 22:00 by default
  const CAL_START_HOUR = 6;
  const CAL_END_HOUR = 22;
  const calHours = Array.from({length: CAL_END_HOUR - CAL_START_HOUR}, (_,i) => CAL_START_HOUR + i);

  const stripHtml = (s) => (s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
  const extractParens = (text) => {
    const stripped = stripHtml(text);
    const matches = [...stripped.matchAll(/\(([^)]+)\)/g)];
    return matches.length ? matches[matches.length-1][1].trim() : '';
  };

  // Build events for the selected date, per boat
  // Sources: 1) scheduled assignments from auto-scheduler, 2) CRM events mapped to boats
  const rawSched_cdv = assignments[`schedule_${month}`];
  const scheduledItems = (Array.isArray(rawSched_cdv) ? rawSched_cdv : []).filter(s=>s.date===selDate && s.boatId);
  // Robust date filter — handles YYYY-MM-DD, YYYY-M-D, DD/MM/YYYY, ISO with time, etc.
  const crmDayEvents = crmEvents.filter(e=>{
    const d = e.startDate;
    if (!d) return false;
    // ISO: YYYY-MM-DD or YYYY-MM-DDTHH:...
    const iso = d.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (iso) return Number(iso[1])===y && Number(iso[2])===mNum && Number(iso[3])===selDate;
    // DD/MM/YYYY
    const dmy = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (dmy) return Number(dmy[3])===y && Number(dmy[2])===mNum && Number(dmy[1])===selDate;
    // MM/DD/YYYY
    const mdy = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (mdy) return Number(mdy[3])===y && Number(mdy[1])===mNum && Number(mdy[2])===selDate;
    return d===dateStr;
  });

  // resolveBoatIdForRoom: returns boat id, or null if classroom/unknown/ignored.
  // Classroom rooms ALWAYS return null — even if roomBoatMap has a stale entry.
  const resolveBoatIdForRoom = (roomId) => {
    if (roomId == null) return null;
    const idStr = String(roomId);
    if (CLASSROOM_NAMES_BY_ROOM_ID[idStr]) return null; // known classroom — never a boat
    if (IGNORED_ROOM_IDS.has(idStr)) return null;
    if (roomBoatMap[roomId]) return roomBoatMap[roomId];
    const boatName = DEFAULT_ROOM_BOAT_MAP_BY_NAME[idStr];
    if (!boatName) return null;
    const found = boats.find(b => (b.name||'').trim() === boatName.trim());
    return found ? found.id : null;
  };
  // For each boat, collect events as {startMin, endMin, title, subtitle, color, source}
  const eventsByBoat = {};
  for (const boat of boats) eventsByBoat[boat.id] = [];
  // Classroom events keyed by display label (not roomId).
  const eventsByClassroom = {};
  const classroomsToShow = new Set();
  Object.keys(CLASSROOM_NAMES_BY_ROOM_ID).forEach(rid => {
    const lbl = CLASSROOM_NAMES_BY_ROOM_ID[rid];
    if (!classroomsToShow.has(lbl)) { classroomsToShow.add(lbl); eventsByClassroom[lbl] = []; }
  });
  crmDayEvents.forEach(e=>{
    if (e.roomId == null) return;
    const idStr = String(e.roomId);
    if (IGNORED_ROOM_IDS.has(idStr)) return;
    if (DEFAULT_ROOM_BOAT_MAP_BY_NAME[idStr]) return;
    const lbl = CLASSROOM_NAMES_BY_ROOM_ID[idStr] || ('חדר ' + idStr);
    if (!classroomsToShow.has(lbl) && !resolveBoatIdForRoom(e.roomId)) {
      classroomsToShow.add(lbl); eventsByClassroom[lbl] = [];
    }
  });

  const timeToMin = (t)=>{ const [h,m]=t.split(':').map(Number); return h*60+m; };

  scheduledItems.forEach(s=>{
    const boat = boats.find(b=>b.id===s.boatId);
    if(!boat) return;
    eventsByBoat[boat.id]?.push({
      startMin: timeToMin(s.startHour),
      endMin: timeToMin(s.endHour),
      title: s.activityName,
      subtitle: s.instructorName || (s.status==='no_instructor' ? '⚠️ ללא מדריך' : ''),
      color: s.instructorId ? '#3b82f6' : '#ef4444',
      textColor: '#fff',
      source: 'schedule'
    });
  });

  // Helper: does this event's text indicate "out of office" (sailing trip/regatta/abroad/etc.)?
  // Such events should not appear in classroom columns even when their roomId is a classroom.
  const isOutOfOffice = (text) => {
    const t = text || '';
    return OUT_OF_OFFICE_KEYWORDS.some(k => t.includes(k));
  };

  crmDayEvents.forEach(e=>{
    if (e.roomId == null) return;
    const idStr = String(e.roomId);
    if (IGNORED_ROOM_IDS.has(idStr)) return;
    const mappedBoatId = resolveBoatIdForRoom(e.roomId);
    const stripped = stripHtml(e.text);
    const inst = extractParens(e.text);
    const titleMatch = stripped.split(/[(,]/)[0].trim();
    const evObj = {
      startMin: timeToMin(e.startHour),
      endMin: timeToMin(e.endHour||'23:59'),
      title: titleMatch || 'אירוע',
      subtitle: inst || '',
      color: e.color || '#94a3b8',
      textColor: '#1e293b',
      source: 'crm'
    };
    if (mappedBoatId) {
      if (eventsByBoat[mappedBoatId]) eventsByBoat[mappedBoatId].push(evObj);
    } else {
      if (isOutOfOffice(e.text)) return;
      const lbl = CLASSROOM_NAMES_BY_ROOM_ID[idStr] || ('חדר ' + idStr);
      if (eventsByClassroom[lbl]) eventsByClassroom[lbl].push({...evObj,color:'#fef3c7',textColor:'#92400e'});
    }
  });

  // Pre-compute which hours each event covers, for table layout with rowSpan.
  // FIX: multiple events overlapping the same hour are now ALL rendered (stacked side-by-side
  // in the same cell). Previously only the first was shown and subsequent events were dropped.
  function buildLayoutFor(events){
    const layout = {}; // {hour: {type:'start'|'continue'|'free', events:[...], span?}}
    for (let h = CAL_START_HOUR; h < CAL_END_HOUR; h++) layout[h] = {type:'free'};
    const sorted = events.slice().sort((a,b)=>a.startMin-b.startMin);
    for (const ev of sorted) {
      const startH = Math.max(CAL_START_HOUR, Math.round(ev.startMin/60));
      const endH = Math.min(CAL_END_HOUR, Math.ceil(ev.endMin/60));
      if(endH <= startH) continue;
      const span = endH - startH;
      if (layout[startH].type === 'free') {
        layout[startH] = {type:'start', events:[ev], span, fromMin: ev.startMin, toMin: ev.endMin};
        for(let h=startH+1; h<endH; h++) layout[h] = {type:'continue'};
      } else if (layout[startH].type === 'start') {
        // Another event starts at the same hour — stack in same cell
        layout[startH].events.push(ev);
        // Expand span if this event runs longer
        if (span > layout[startH].span) {
          // Convert hours that were 'free' between old end and new end → 'continue'
          const oldEnd = startH + layout[startH].span;
          for (let h = oldEnd; h < startH + span; h++) {
            if (layout[h]?.type === 'free') layout[h] = {type:'continue'};
          }
          layout[startH].span = span;
        }
      } else if (layout[startH].type === 'continue') {
        // Event starts mid-way of another running event. Find the nearest preceding 'start' and add it there.
        let anchorH = startH;
        while (anchorH > CAL_START_HOUR && layout[anchorH].type !== 'start') anchorH--;
        if (layout[anchorH]?.type === 'start') {
          layout[anchorH].events.push(ev);
          // Expand span if needed
          const requiredSpan = endH - anchorH;
          if (requiredSpan > layout[anchorH].span) {
            const oldEnd = anchorH + layout[anchorH].span;
            for (let h = oldEnd; h < anchorH + requiredSpan; h++) {
              if (layout[h]?.type === 'free') layout[h] = {type:'continue'};
            }
            layout[anchorH].span = requiredSpan;
          }
        }
      }
    }
    return layout;
  }

  const layouts = {};

function BoatEventsByDate({monthEvents,roomBoatMap,boats,stripHtml}){
  const [openDates,setOpenDates]=useState(()=>new Set());
  const toggle=(d)=>setOpenDates(prev=>{const n=new Set(prev);n.has(d)?n.delete(d):n.add(d);return n;});
  const byDate=useMemo(()=>{
    const map={};
    monthEvents.forEach(e=>{const d=e.startDate||'?';if(!map[d])map[d]=[];map[d].push(e);});
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  },[monthEvents]);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:4}}>
      {byDate.map(([date,evs])=>{
        const open=openDates.has(date);
        const mapped=evs.filter(e=>roomBoatMap[e.roomId]).length;
        return(
          <div key={date} style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
            <div onClick={()=>toggle(date)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',background:'#f8fafc',userSelect:'none'}}>
              <span style={{fontSize:16,fontWeight:700,color:'var(--text-light)',width:16,display:'inline-block',textAlign:'center'}}>{open?'−':'+'}</span>
              <span style={{fontWeight:600,fontSize:14}}>{date}</span>
              <span className="badge badge-primary" style={{fontSize:11}}>{evs.length} אירועים</span>
              {mapped>0&&<span className="badge badge-success" style={{fontSize:11}}>{mapped} משויכים</span>}
              {evs.length-mapped>0&&<span className="badge badge-warning" style={{fontSize:11}}>{evs.length-mapped} לא משויכים</span>}
            </div>
            {open&&(
              <div style={{overflowX:'auto'}}>
                <table style={{margin:0}}>
                  <thead><tr><th>שעות</th><th>roomId</th><th>סירה במערכת</th><th>מדריך (CRM)</th><th>תיאור</th></tr></thead>
                  <tbody>
                    {evs.map((e,i)=>{
                      const mid=roomBoatMap[e.roomId];
                      const mboat=mid?boats.find(b=>b.id===mid)?.name:null;
                      return(
                        <tr key={e.id||i} style={mboat?{background:'#f0fdf4'}:{}}>
                          <td style={{fontSize:12,fontFamily:'monospace'}}>{e.startHour}–{e.endHour}</td>
                          <td style={{fontSize:12}}>{e.roomId}</td>
                          <td style={{fontSize:13,fontWeight:mboat?600:400,color:mboat?'var(--success)':'var(--text-light)'}}>{mboat||'—'}</td>
                          <td style={{fontSize:12}}>{extractInstructorName(e.text)||'-'}</td>
                          <td style={{fontSize:11,maxWidth:260}}>{stripHtml(e.text).slice(0,80)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function BoatAvailabilityTab({boats, crmEvents, setCrmEvents, roomBoatMap, setRoomBoatMap, month, showToast}){
  const [showImport, setShowImport] = useState(false);
  const [viewMonth, setViewMonth] = useState(()=>{
    try { return localStorage.getItem('crm_view_month') || month; }
    catch { return month; }
  });
  useEffect(()=>{
    try { localStorage.setItem('crm_view_month', viewMonth); } catch {}
  }, [viewMonth]);

  // Filter events to the chosen view month
  const monthEvents = useMemo(()=>{
    if(!viewMonth) return [];
    const [y,m] = viewMonth.split('-').map(Number);
    return crmEvents.filter(e=>{
      if(!e.startDate) return false;
      const [ey,em] = e.startDate.split('-').map(Number);
      return ey===y && em===m;
    }).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||'') || (a.startHour||'').localeCompare(b.startHour||''));
  }, [crmEvents, viewMonth]);

  const stripHtml = (s) => (s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();

  // Count enforced events (those with a mapped boat)
  const enforcedCount = monthEvents.filter(e=>roomBoatMap[e.roomId]).length;
  // "Unmapped" = roomIds we don't have a default mapping for (truly unknown)
  // Known roomIds that just couldn't resolve to a boat are reported separately
  const unmappedRoomIds = useMemo(()=>{
    const knownIds = new Set(Object.keys(DEFAULT_ROOM_BOAT_MAP_BY_NAME));
    const ids = new Set();
    monthEvents.forEach(e=>{
      if(!e.roomId) return;
      const idStr = String(e.roomId);
      if (knownIds.has(idStr)) return; // it's in defaults - not "unknown"
      if (IGNORED_ROOM_IDS.has(idStr)) return; // explicitly ignored
      if (roomBoatMap[e.roomId]) return; // mapped
      ids.add(e.roomId);
    });
    return [...ids];
  },[monthEvents, roomBoatMap]);
  // Known IDs in defaults but boat name didn't match (boat not in list?)
  const unresolvedRoomIds = useMemo(()=>{
    const ids = [];
    Object.entries(DEFAULT_ROOM_BOAT_MAP_BY_NAME).forEach(([roomId, boatName])=>{
      if (!roomBoatMap[roomId]) {
        const hasEvents = monthEvents.some(e=>String(e.roomId)===roomId);
        if (hasEvents) ids.push({roomId, expectedName: boatName});
      }
    });
    return ids;
  },[monthEvents, roomBoatMap]);

  // Auto-resolve mapping whenever boats list changes (so the mapping stays in sync)
  useEffect(()=>{
    let changed = false;
    const newMap = {...roomBoatMap};
    for (const [roomId, boatName] of Object.entries(DEFAULT_ROOM_BOAT_MAP_BY_NAME)) {
      const boat = boats.find(b => (b.name||'').trim() === boatName.trim());
      if (boat && newMap[roomId] !== boat.id) {
        newMap[roomId] = boat.id;
        changed = true;
      } else if (!boat && newMap[roomId]) {
        // Boat no longer exists - clear the stale mapping
        delete newMap[roomId];
        changed = true;
      }
    }
    if (changed) setRoomBoatMap(newMap);
  }, [boats]);

  const resolveMapping = () => {
    const newMap = {...roomBoatMap};
    for (const [roomId, boatName] of Object.entries(DEFAULT_ROOM_BOAT_MAP_BY_NAME)) {
      const boat = boats.find(b => (b.name||'').trim() === boatName.trim());
      if (boat) newMap[roomId] = boat.id;
    }
    return newMap;
  };

  return(
    <div>
      <div className="card">
        <div className="card-header">
          <h2>זמינות סירות מ-CRM
            <span className="badge badge-primary" style={{marginRight:8}}>{monthEvents.length} אירועים</span>
            {enforcedCount>0 && <span className="badge badge-success" style={{marginRight:6}}>{enforcedCount} משויכים</span>}
            {unmappedRoomIds.length>0 && <span className="badge badge-warning" style={{marginRight:6}}>{unmappedRoomIds.length} roomIds לא ידועים</span>}
          </h2>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="month" value={viewMonth} onChange={e=>setViewMonth(e.target.value)} style={{padding:'6px 10px'}}/>
            <button className="btn btn-primary" onClick={()=>setShowImport(true)}>📥 ייבא מ-CRM</button>
          </div>
        </div>

        <div style={{background:'#eff6ff',border:'1px solid #93c5fd',borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:'#1e40af'}}>
          המיפוי בין roomId לספינות מוגדר בקוד. ה-roomIds הבאים מתעלמים: {[...IGNORED_ROOM_IDS].join(', ')}.
          {unresolvedRoomIds.length>0 && (
            <div style={{marginTop:6,color:'var(--danger)',fontWeight:600}}>
              ⚠️ {unresolvedRoomIds.length} roomIds במיפוי לא נמצאה להם ספינה תואמת בלשונית ספינות:
              <ul style={{margin:'4px 18px 0 0',paddingRight:18}}>
                {unresolvedRoomIds.map(u=>(<li key={u.roomId}>roomId {u.roomId} → מחפש ספינה בשם <b>"{u.expectedName}"</b></li>))}
              </ul>
              <div style={{marginTop:4,fontWeight:400}}>תוודא ששמות הספינות בלשונית "ספינות" תואמים בדיוק (כולל רווחים), או שעדיין לא הוספת אותן.</div>
            </div>
          )}
          {unmappedRoomIds.length>0 && (
            <div style={{marginTop:6,color:'var(--warning)'}}>
              ℹ️ roomIds חדשים שלא במיפוי הקבוע: <b>{unmappedRoomIds.join(', ')}</b> — לא יחסמו סלוטים. אם שייכים לספינה, יש להוסיף אותם ל-DEFAULT_ROOM_BOAT_MAP_BY_NAME בקוד.
            </div>
          )}
        </div>

        <h3 style={{fontSize:14,marginBottom:8}}>אירועים בחודש {viewMonth}</h3>
        {monthEvents.length===0 ? (
          <div className="empty-state"><div className="icon">📅</div><p>אין אירועים בחודש זה. לחץ "📥 ייבא מ-CRM" כדי לייבא.</p></div>
        ) : (
          <BoatEventsByDate monthEvents={monthEvents} roomBoatMap={roomBoatMap} boats={boats} stripHtml={stripHtml}/>
        )}
      </div>

      {showImport && <CrmImportDialog defaultMonth={viewMonth} onCancel={()=>setShowImport(false)}
        onImport={(events, importedMonth)=>{
          // Merge: replace events for the imported month, keep events from other months
          const [iy,im] = importedMonth.split('-').map(Number);
          const otherMonths = crmEvents.filter(e=>{
            if(!e.startDate) return true;
            const [ey,em] = e.startDate.split('-').map(Number);
            return ey!==iy || em!==im;
          });
          const allEvents = [...otherMonths, ...events];
          setCrmEvents(allEvents);
          // Auto-resolve room mapping using DEFAULT_ROOM_BOAT_MAP_BY_NAME
          const newMap = resolveMapping(allEvents);
          setRoomBoatMap(newMap);
          // Switch view to the imported month
          setViewMonth(importedMonth);
          setShowImport(false);
          showToast(`📥 נקלטו ${events.length} אירועים מ-CRM לחודש ${importedMonth}`);
        }}/>}
    </div>
  );
}

function CrmImportDialog({defaultMonth, onCancel, onImport}){
  const [text, setText] = useState('');
  const [error, setError] = useState('');
  const [importMonth, setImportMonth] = useState(defaultMonth);
  const [dateOffset, setDateOffset] = useState(1); // CRM dates appear to be 1 day behind reality

  const [y, m] = importMonth.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const fromStr = `${y}-${m.toString().padStart(2,'0')}-01`;
  const toStr = `${y}-${m.toString().padStart(2,'0')}-${lastDay.toString().padStart(2,'0')}`;
  const url = `https://yamonline.custhelp.com/cc/CalendarServer/getEvents?from=${fromStr}&to=${toStr}`;

  const handleImport = () => {
    setError('');
    try {
      const data = JSON.parse(text);
      let events = Array.isArray(data) ? data : (Array.isArray(data.events) ? data.events : null);
      if (!events) { setError('הקובץ לא נראה כמערך של אירועים'); return; }
      if (events.length > 0 && !events[0].startDate) {
        setError('האירועים לא מכילים שדה startDate - האם זה ה-JSON הנכון?');
        return;
      }
      // Apply date shift. Keep ALL events including classrooms (rooms not mapped to boats).
      // Classrooms show in the daily calendar but never block boat slots.
      const shifted = events
        .map(e => ({
          ...e,
          startDate: shiftDate(e.startDate, dateOffset),
          endDate: shiftDate(e.endDate, dateOffset),
        }));
      onImport(shifted, importMonth);
    } catch (e) {
      setError('JSON לא תקין: ' + e.message);
    }
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:680}}>
        <h3>📥 ייבוא אירועי קלנדר מ-CRM</h3>

        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label>חודש לייבוא *</label>
            <input type="month" value={importMonth} onChange={e=>setImportMonth(e.target.value)}/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label>תיקון תאריך (ימים)</label>
            <select value={dateOffset} onChange={e=>setDateOffset(Number(e.target.value))}>
              <option value={-1}>−1 (תאריך נוכחי בעודף)</option>
              <option value={0}>0 (ללא תיקון)</option>
              <option value={1}>+1 (תאריך CRM בחסר - ברירת מחדל)</option>
              <option value={2}>+2</option>
            </select>
          </div>
        </div>

        <div style={{background:'#fef9c3',border:'1px solid #fde047',borderRadius:8,padding:10,marginBottom:14,fontSize:13}}>
          <b>הוראות:</b>
          <ol style={{paddingRight:18,marginTop:6,lineHeight:1.7}}>
            <li>פתח את הקישור הזה בכרום (חייב להיות מחובר ל-CRM):</li>
            <li style={{listStyle:'none',background:'#fff',padding:6,borderRadius:6,fontFamily:'monospace',fontSize:11,wordBreak:'break-all',marginRight:'-18px'}}>
              <a href={url} target="_blank" rel="noopener" style={{color:'var(--primary)'}}>{url}</a>
            </li>
            <li>הדפדפן יציג JSON גולמי. עשה Ctrl+A → Ctrl+C</li>
            <li>הדבק כאן ולחץ "פענח וייבא"</li>
          </ol>
        </div>
        <div className="form-group" style={{marginBottom:12}}>
          <label>JSON של האירועים</label>
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} style={{width:'100%',fontFamily:'monospace',fontSize:11}} placeholder='[{"id":"...", "startDate":"...", ...}, ...]'/>
        </div>
        {error && <div style={{color:'var(--danger)',fontSize:13,marginBottom:10}}>⚠️ {error}</div>}
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" onClick={handleImport} disabled={!text.trim()}>פענח וייבא</button>
          <button className="btn btn-outline" onClick={onCancel}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

function ScheduleTab({instructors,activities,boats,availability,setAvailability,assignments,setAssignments,month,showToast,crmEvents,roomBoatMap,allSkills,daylightStart,daylightEnd}){
  // Set of activity names that ARE registered as specific skills in the system.
  // The "blanket" certification (מודרכת מועדון / מודרכות מתקדמות) only applies when
  // the activity name is NOT already a recognized specific skill.
  const knownSkillsSet = useMemo(() => new Set(allSkills || []), [allSkills]);
  // Schedule items live under assignments[`schedule_${month}`] as an array
  const scheduleKey = `schedule_${month}`;
  const rawSchedule = assignments[scheduleKey];
  // Defensive: schedule MUST be an array. Old data may have stored objects under this key.
  const schedule = Array.isArray(rawSchedule) ? rawSchedule : [];

  const setSchedule = (newSched) => {
    setAssignments(prev => ({...prev, [scheduleKey]: newSched}));
  };

  const [showManualDialog, setShowManualDialog] = useState(false);

  // Time-of-day buckets per user's definition. Order matters for boundary cases.
  // Slot classification using DEFAULT_BUCKETS (used for per-instructor stats like evenings/week).
  // For activity matching, classifyBucketWith(startMin, activity.buckets) is used (with overrides).
  function classifyBucket(startMin){
    return classifyBucketWith(startMin, DEFAULT_BUCKETS);
  }
  function timeToMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }

  const daysInMonthArr = useMemo(()=>{
    if(!month)return[];
    const [y,m]=month.split('-').map(Number);
    const count=new Date(y,m,0).getDate();
    return Array.from({length:count},(_,i)=>{
      const d=new Date(y,m-1,i+1);
      return {date:i+1,dayOfWeek:d.getDay()};
    });
  },[month]);

  function enumerateAllSlots(){
    const result = [];
    for (const boat of boats) {
      const boatSlots = getBoatSlots(boat);
      for (const d of daysInMonthArr) {
        for (const s of boatSlots) {
          const sm = timeToMin(s.start), em = timeToMin(s.end);
          result.push({
            boatId: boat.id, boatName: boat.name, boatType: boat.type || '',
            date: d.date, dayOfWeek: d.dayOfWeek,
            startHour: s.start, endHour: s.end,
            startMin: sm, endMin: em,
            bucket: classifyBucket(sm)
          });
        }
      }
    }
    return result;
  }

  // Build candidate slots: a boat's frame is DIVIDED into discrete SLOTS of slotInterval hours.
  // An activity must fit entirely within ONE slot (cannot cross slot boundaries).
  // Within a slot, the activity can start at any 1-hour boundary, provided it ENDS by slot end.
  // Example: frame 07:00-22:00 with slotInterval=3 → slots [07-10, 10-13, 13-16, 16-19, 19-22].
  // A 2h activity can be 07-09, 08-10 (in slot 07-10), 10-12, 11-13 (in 10-13), etc.
  // A 3h activity can ONLY be 07-10, 10-13, 13-16, 16-19, 19-22 (exact slot fits).
  function enumerateSlotRunsForDuration(durHours){
    const targetMin = durHours * 60;
    const result = [];
    for (const boat of boats) {
      const frames = getBoatFrames(boat);
      for (const d of daysInMonthArr) {
        for (const frame of frames) {
          if (!frame || !frame.startTime) continue;
          const interval = Number(frame.slotInterval) || 3;
          const intervalMin = interval * 60;
          const [sh, sm] = frame.startTime.split(':').map(Number);
          const [eh, em] = (frame.endTime || '22:00').split(':').map(Number);
          const frameStart = sh*60 + sm;
          const frameEnd = eh*60 + em;
          // Iterate each slot in the frame
          for (let slotStart = frameStart; slotStart + intervalMin <= frameEnd; slotStart += intervalMin) {
            const slotEnd = slotStart + intervalMin;
            // Activity must fit within this slot. Start at any 1h boundary, end ≤ slotEnd.
            for (let actStart = slotStart; actStart + targetMin <= slotEnd; actStart += 60) {
              const actEnd = actStart + targetMin;
              const runSlots = [];
              for (let m = actStart; m < actEnd; m += 60) {
                runSlots.push(`${Math.floor(m/60).toString().padStart(2,'0')}:00`);
              }
              const fmt = (m) => `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;
              result.push({
                boatId: boat.id, boatName: boat.name, boatType: boat.type || '',
                date: d.date, dayOfWeek: d.dayOfWeek,
                startHour: fmt(actStart),
                endHour: fmt(actEnd),
                startMin: actStart, endMin: actEnd,
                bucket: classifyBucket(actStart),
                runSlots
              });
            }
          }
        }
      }
    }
    // Deduplicate same (boat,date,startHour,endHour) and sort by date+startMin for predictable iteration order
    const seen = new Set();
    const dedup = [];
    for (const r of result) {
      const k = `${r.boatId}_${r.date}_${r.startHour}_${r.endHour}`;
      if (seen.has(k)) continue;
      seen.add(k);
      dedup.push(r);
    }
    dedup.sort((a,b) => a.date - b.date || a.startMin - b.startMin);
    return dedup;
  }

  // Cache: runs by duration (one entry per unique activity duration in use)
  const runsByDurationCache = {};
  function getRunsForDuration(dur){
    if(!runsByDurationCache[dur]) runsByDurationCache[dur] = enumerateSlotRunsForDuration(dur);
    return runsByDurationCache[dur];
  }

  // Keywords that mark a CRM event as MOVEABLE (e.g., fueling, maintenance, cleaning).
  // The scheduler may override these blocks; the user reschedules them physically afterwards.
  const MOVEABLE_CRM_KEYWORDS = ['תדלוק', 'טיפול', 'נקיון', 'ניקיון', 'נקיו', 'ניקיו', 'תיקון', 'תחזוקה'];
  function isCrmEventMoveable(eventText){
    const t = (eventText||'').toString();
    return MOVEABLE_CRM_KEYWORDS.some(kw => t.includes(kw));
  }

  // Returns: false (no block), 'hard' (blocked, can't override), or {soft:true, text:string} (moveable block).
  function isSlotBlockedByCrm(boatId, date, startMin, endMin){
    if (!crmEvents || crmEvents.length === 0) return false;
    if (!roomBoatMap) return false;
    const [y,m] = month.split('-').map(Number);
    let softBlocker = null;
    for (const e of crmEvents) {
      const mappedBoat = roomBoatMap[e.roomId];
      if (mappedBoat !== boatId) continue;
