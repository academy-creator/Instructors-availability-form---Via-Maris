      if (!e.startDate || !e.startHour) continue;
      const [ey, em, ed] = e.startDate.split('-').map(Number);
      if (ey !== y || em !== m || ed !== date) continue;
      const [esH, esM] = e.startHour.split(':').map(Number);
      const [eeH, eeM] = (e.endHour||'23:59').split(':').map(Number);
      const eStart = esH*60+esM, eEnd = eeH*60+eeM;
      if (eStart < endMin && eEnd > startMin) {
        if (isCrmEventMoveable(e.text)) {
          // Remember but keep scanning — if any hard block exists, that wins.
          softBlocker = softBlocker || {soft:true, text:(e.text||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,80), date, boatId};
        } else {
          return 'hard';
        }
      }
    }
    return softBlocker || false;
  }

  function isBoatAllowedFor(boatId, boatType, activity){
    const types = activity.allowedBoatTypes || [];
    const ids = activity.allowedBoatIds || [];
    if (!types.length && !ids.length) return true;
    if (ids.length && ids.includes(boatId)) return true;
    if (types.length && boatType && types.includes(boatType)) return true;
    return false;
  }

  function isInstructorAvailable(inst, date, startMin, endMin){
    const avail = availability[`${inst.id}_${month}`] || {};
    for (let m = startMin; m < endMin; m += 60) {
      const h = Math.floor(m/60);
      const v = avail[`${date}_${h.toString().padStart(2,'0')}:00`];
      // Only `true` counts as available. 'work' means busy elsewhere - NOT available.
      if (v !== true) return false;
    }
    return true;
  }

  function generateDemands(activity){
    const total = Number(activity.totalPerMonth)||0;
    const specDates = Array.isArray(activity.specificDates) ? activity.specificDates : [];
    // A.1 STRICT: if totalPerMonth is 0 AND there are no specific dates, the activity is DISABLED.
    if (total === 0 && specDates.length === 0) return [];
    const M = Number(activity.morning)||0;
    const E = Number(activity.evening)||0;
    const N = Number(activity.night)||0;
    const F = Number(activity.friday)||0;
    const Sa = Number(activity.saturday)||0;
    // NOTE: legacy 'afternoon' field is INTENTIONALLY IGNORED (was removed from UI in earlier version).
    // Old backups may still have it set to a non-zero value — we must not use it.
    const fixedStartMin = null;
    // Specific dates: generate one demand per date. Apply bucket allocation per the morning/evening/night counts.
    if (specDates.length > 0) {
      const [y,m] = month.split('-').map(Number);
      const lastDay = new Date(y, m, 0).getDate();
      const validDates = specDates.filter(d => d>=1 && d<=lastDay);
      // Bucket queue: M morning, E evening, N night, rest = 'open'
      const buckets = [];
      for (let i=0;i<M;i++) buckets.push('morning');
      for (let i=0;i<E;i++) buckets.push('evening');
      for (let i=0;i<N;i++) buckets.push('night');
      while (buckets.length < validDates.length) buckets.push('open');
      return validDates.map((d, idx) => ({
        bucket: buckets[idx] || 'open',
        weekend: null,
        fixedDate: d,
        fixedStartMin
      }));
    }
    // Cap each bucket by remaining quota to ensure NEVER exceed total
    const demands = [];
    const addUpTo = (count, demand) => {
      const left = total - demands.length;
      const actual = Math.max(0, Math.min(count, left));
      for (let i=0; i<actual; i++) demands.push(demand);
    };
    // v5.71 — B4: weekend demand FIRST (Saturday → Friday → weekday).
    // Matches user's manual approach: lock in Sat/Fri before working on weekday slots.
    addUpTo(Sa, {bucket:'open', weekend:6, fixedStartMin});
    addUpTo(F, {bucket:'open', weekend:5, fixedStartMin});
    addUpTo(M, {bucket:'morning', weekend:null, fixedStartMin});
    addUpTo(E, {bucket:'evening', weekend:null, fixedStartMin});
    addUpTo(N, {bucket:'night', weekend:null, fixedStartMin});
    // Fill remainder with 'open' demands
    while (demands.length < total) demands.push({bucket:'open', weekend:null, fixedStartMin});
    return demands;
  }

  function runAutoSchedule(){
    if (activities.length === 0) { showToast('⚠️ אין פעילויות מוגדרות'); return; }
    if (boats.length === 0) { showToast('⚠️ אין ספינות מוגדרות'); return; }
    if (instructors.length === 0) { showToast('⚠️ אין מדריכים מוגדרים'); return; }
    // Diagnostic: warn about activities referencing missing boats
    const boatIdSet = new Set(boats.map(b => b.id));
    const missingBoatActivities = [];
    activities.forEach(a => {
      const ids = a.allowedBoatIds || [];
      const missing = ids.filter(id => !boatIdSet.has(id));
      if (missing.length > 0 && missing.length === ids.length) {
        missingBoatActivities.push(a.name);
      }
    });
    if (missingBoatActivities.length > 0) {
      const proceed = window.confirm(`⚠️ הפעילויות הבאות מוגבלות לסירות שלא קיימות:\n\n${missingBoatActivities.join('\n')}\n\nתוצאה: הן לא יוכלו להיות משובצות. לתקן את הסירות המורשות ב"פעילויות".\n\nהמשך בכל זאת?`);
      if (!proceed) return;
    }

    // Manual overrides: items the user has explicitly edited (always preserved)
    const fixedItems = schedule.filter(s => s._userEdited && s.boatId && s.date);
    const used = new Set();
    // Track per-instructor stats: hours, weekend days, days/week, evenings/week, slots/date
    const instructorStats = {};
    instructors.forEach(i => instructorStats[i.id] = {
      hours: 0,
      fridayDates: new Set(),
      saturdayDates: new Set(),
      daysByWeek: {},     // weekIdx -> Set of dates
      eveningsByWeek: {}, // weekIdx -> count
      morningsByWeek: {}, // weekIdx -> count
      slotsByDate: {},    // date -> array of {startMin, endMin} for daily limit checks
    });
    const weekOf = (date) => Math.floor((date-1)/7);
    const recordStat = (instId, slot, dur) => {
      const s = instructorStats[instId];
      if (!s) return;
      s.hours += dur;
      if (slot.dayOfWeek === 5) s.fridayDates.add(slot.date);
      if (slot.dayOfWeek === 6) s.saturdayDates.add(slot.date);
      const wk = weekOf(slot.date);
      if (!s.daysByWeek[wk]) s.daysByWeek[wk] = new Set();
      // Only weekdays (Sun-Thu = 0..4) count toward "max weekdays per week" limit.
      // Fri/Sat are governed by their own limits (maxFridaysPerMonth, maxSaturdaysPerMonth).
      if (slot.dayOfWeek >= 0 && slot.dayOfWeek <= 4) {
        s.daysByWeek[wk].add(slot.date);
      }
      if (slot.bucket === 'evening') s.eveningsByWeek[wk] = (s.eveningsByWeek[wk]||0) + 1;
      if (slot.bucket === 'morning') s.morningsByWeek[wk] = (s.morningsByWeek[wk]||0) + 1;
      if (!s.slotsByDate[slot.date]) s.slotsByDate[slot.date] = [];
      s.slotsByDate[slot.date].push({startMin: slot.startMin, endMin: slot.endMin});
    };
    fixedItems.forEach(f => {
      used.add(`${f.boatId}_${f.date}_${f.startHour}`);
      if (f.instructorId) {
        const dur = (timeToMin(f.endHour)-timeToMin(f.startHour))/60;
        const fakeSlot = {
          date:f.date, dayOfWeek:f.dayOfWeek,
          bucket:classifyBucket(timeToMin(f.startHour)),
          startMin:timeToMin(f.startHour), endMin:timeToMin(f.endHour)
        };
        recordStat(f.instructorId, fakeSlot, dur);
      }
    });

    // CRITICAL: rebuilds instructorStats fully from newSchedule. Call BEFORE every auxiliary pass.
    // The auxiliary passes (SWAP, ACTIVITY-SHIFT, DATE-SHIFT, weekend-fill) mutate newSchedule but
    // don't always update stats — that causes downstream eligibility checks to use stale data,
    // which is the root cause of allowSingle/maxFri/maxSat/consec-weekend violations.
    const rebuildInstructorStats = () => {
      instructors.forEach(i => {
        instructorStats[i.id] = {
          hours: 0,
          fridayDates: new Set(),
          saturdayDates: new Set(),
          daysByWeek: {},
          eveningsByWeek: {},
          morningsByWeek: {},
          slotsByDate: {},
        };
      });
      newSchedule.forEach(item => {
        if (!item.instructorId || !item.date || !item.startHour) return;
        const dur = (timeToMin(item.endHour) - timeToMin(item.startHour))/60;
        const slot = {
          date: item.date,
          dayOfWeek: item.dayOfWeek,
          bucket: classifyBucket(timeToMin(item.startHour)),
          startMin: timeToMin(item.startHour),
          endMin: timeToMin(item.endHour)
        };
        recordStat(item.instructorId, slot, dur);
      });
    };

    // ═══════════════════════════════════════════════════════════════════════
    // v5.71 — User's manual-scheduling logic
    // A3: Weekly quotas per activity (weekday demand divided proportionally)
    // C8: Live counter — when 0, activity blocked for that week
    // D10: Month-wide bucket count per activity (for diversity penalty)
    // PREF-bucket helper: 3-bucket split matching user's mental model
    // ═══════════════════════════════════════════════════════════════════════
    // 3-bucket classification for instructor PREFERENCE (independent of activity buckets).
    // morning: 07-12, midday: 12-16, evening: 16-22.
    const instructorBucketForSlot = (startMin) => {
      const h = startMin / 60;
      if (h < 12) return 'morning';
      if (h < 16) return 'midday';
      return 'evening';
    };

    // Group weekdays (Sun-Thu) by week index. Weekends excluded from quota math.
    const weekdaysByWeek = {};
    const allWeekdaysInMonth = [];
    daysInMonthArr.forEach(d => {
      if (d.dayOfWeek === 5 || d.dayOfWeek === 6) return;
      allWeekdaysInMonth.push(d.date);
      const wk = weekOf(d.date);
      if (!weekdaysByWeek[wk]) weekdaysByWeek[wk] = [];
      weekdaysByWeek[wk].push(d.date);
    });
    const totalWeekdaysInMonth = allWeekdaysInMonth.length || 1;

    // A3: weeklyQuotas[activityId][weekIdx] = target placements for that activity in that week.
    // Formula: round((totalPerMonth − fridayDemand − saturdayDemand) / weekdaysInMonth × weekdaysInThisWeek) + 1 buffer.
    // C8: weeklyRemaining mirrors quotas and is decremented on each successful placement.
    const weeklyQuotas = {};
    const weeklyRemaining = {};
    activities.forEach(a => {
      const total = Number(a.totalPerMonth) || 0;
      const fri = Number(a.friday) || 0;
      const sat = Number(a.saturday) || 0;
      const weekdayDemand = Math.max(0, total - fri - sat);
      const perWeekday = weekdayDemand / totalWeekdaysInMonth;
      weeklyQuotas[a.id] = {};
      weeklyRemaining[a.id] = {};
      Object.keys(weekdaysByWeek).forEach(wk => {
        const wkdys = weekdaysByWeek[wk].length;
        // Buffer of +1 lets "one week gets the extra" as user described.
        const quota = Math.round(perWeekday * wkdys) + 1;
        weeklyQuotas[a.id][wk] = quota;
        weeklyRemaining[a.id][wk] = quota;
      });
    });

    // Decrement live counter on placement. Called from EVERY pass that pushes to newSchedule.
    const decrementWeeklyQuota = (activityId, date, dayOfWeek) => {
      if (!activityId) return;
      if (dayOfWeek === 5 || dayOfWeek === 6) return; // weekend doesn't consume weekday quota
      const wk = weekOf(date);
      if (weeklyRemaining[activityId] && weeklyRemaining[activityId][wk] != null) {
        weeklyRemaining[activityId][wk] = Math.max(0, weeklyRemaining[activityId][wk] - 1);
      }
    };
    // Pre-charge from fixed (user-edited) items so the counter starts honest.
    fixedItems.forEach(f => decrementWeeklyQuota(f.activityId, f.date, f.dayOfWeek));

    // C8 check used in eligibility. Returns TRUE if activity is at its weekly cap for this date's week.
    const isWeeklyQuotaExhausted = (activityId, date, dayOfWeek) => {
      if (!activityId) return false;
      if (dayOfWeek === 5 || dayOfWeek === 6) return false;
      const wk = weekOf(date);
      return (weeklyRemaining[activityId]?.[wk] ?? 999) <= 0;
    };

    // D10: bucket-distribution counter — counts how many times each activity has landed
    // in morning/midday/evening across the month. Used as a soft scoring penalty.
    const activityBucketCounts = {};
    activities.forEach(a => { activityBucketCounts[a.id] = {morning:0, midday:0, evening:0}; });
    const recordActivityBucket = (activityId, startMin) => {
      if (!activityId) return;
      const b = instructorBucketForSlot(startMin);
      if (activityBucketCounts[activityId]) activityBucketCounts[activityId][b]++;
    };
    fixedItems.forEach(f => {
      if (f.activityId && f.startHour) recordActivityBucket(f.activityId, timeToMin(f.startHour));
    });
    // Returns the OVER-REPRESENTATION ratio (0=balanced, >0=over) of a bucket for this activity.
    // Score penalty proportional to over-representation.
    const bucketOverRatio = (activityId, startMin) => {
      const counts = activityBucketCounts[activityId];
      if (!counts) return 0;
      const total = (counts.morning + counts.midday + counts.evening) || 1;
      const b = instructorBucketForSlot(startMin);
      const share = counts[b] / total;
      // Penalize if share already ≥ 0.5 (over half of placements landed in this bucket)
      return Math.max(0, share - 0.4);
    };

    // v5.71 — B5: Day difficulty index (per user's "hard day first" principle).
    // A weekday is HARDER when it has fewer usable boat-slots (CRM blocks) and fewer
    // candidate instructors available. We compute a BASELINE difficulty at scheduler start,
    // then use it as a soft pull during candidate scoring (higher difficulty → preferred).
    const dayDifficulty = {};
    daysInMonthArr.forEach(d => {
      if (d.dayOfWeek === 5 || d.dayOfWeek === 6) { dayDifficulty[d.date] = 0; return; }
      let usableBoatHours = 0;
      let crmBlockedHours = 0;
      for (const boat of boats) {
        const frames = (typeof getBoatFrames === 'function') ? getBoatFrames(boat) : [];
        for (const frame of frames) {
          if (!frame || !frame.startTime) continue;
          const [sh, sm] = frame.startTime.split(':').map(Number);
          const [eh, em] = (frame.endTime || '22:00').split(':').map(Number);
          const fs = sh*60+sm, fe = eh*60+em;
          if (fe <= fs) continue;
          usableBoatHours += (fe - fs)/60;
          // Count CRM-hard hours that fall in this frame on this date
          if (Array.isArray(crmEvents)) {
            const [yY, mM] = month.split('-').map(Number);
            for (const e of crmEvents) {
              if (!e.startDate || !e.startHour) continue;
              const mappedBoat = roomBoatMap?.[e.roomId];
              if (mappedBoat !== boat.id) continue;
              const [ey, eM, ed] = e.startDate.split('-').map(Number);
              if (ey !== yY || eM !== mM || ed !== d.date) continue;
              if (isCrmEventMoveable(e.text)) continue;
              const [esH, esM] = e.startHour.split(':').map(Number);
              const [eeH, eeM] = (e.endHour||'23:59').split(':').map(Number);
              const eStart = esH*60+esM, eEnd = eeH*60+eeM;
              const overlap = Math.max(0, Math.min(fe,eEnd) - Math.max(fs,eStart));
              crmBlockedHours += overlap/60;
            }
          }
        }
      }
      // Count instructors with ANY availability today
      let availableInstructors = 0;
      instructors.forEach(inst => {
        const av = availability[`${inst.id}_${month}`] || {};
        for (let h = 7; h < 22; h++) {
          if (av[`${d.date}_${h.toString().padStart(2,'0')}:00`] === true) {
            availableInstructors++;
            break;
          }
        }
      });
      // Difficulty = blocked-hour ratio × 20 + (max-instructors − available) × 1.5
      const blockedRatio = usableBoatHours > 0 ? (crmBlockedHours / usableBoatHours) : 0;
      const instGap = Math.max(0, instructors.length - availableInstructors);
      dayDifficulty[d.date] = blockedRatio * 20 + instGap * 1.5;
    });

    // HARD RULES:
    //  1) Total daily hours ≤ maxHoursPerDayNoBreak (default 6) if no break, or maxHoursPerDayWithBreak (default 8) if ≥1h break.
    //  2) ANY gap between consecutive slots ≤ 1 hour. Larger gaps NOT ALLOWED (regardless of availability).
    function wouldExceedDailyLimit(instId, slot) {
      const inst = instructors.find(i => i.id === instId);
      if (!inst) return false;
      const maxNoBreak = inst.maxHoursPerDayNoBreak ?? 6;
      const maxWithBreak = inst.maxHoursPerDayWithBreak ?? 8;
      const existing = instructorStats[instId]?.slotsByDate[slot.date] || [];
      const allSlots = [...existing, {startMin: slot.startMin, endMin: slot.endMin}]
        .sort((a,b) => a.startMin - b.startMin);
      let totalMin = 0;
      allSlots.forEach(s => totalMin += (s.endMin - s.startMin));
      const totalHours = totalMin / 60;
      let hasBreak = false;
      for (let i = 0; i < allSlots.length-1; i++) {
        const gapStart = allSlots[i].endMin;
        const gapEnd = allSlots[i+1].startMin;
        if (gapEnd <= gapStart) continue;
        const gapMin = gapEnd - gapStart;
        // HARD RULE: gap > 1 hour is forbidden.
        if (gapMin > 60) return true;
        if (gapMin >= 60) hasBreak = true; // exactly 1h is allowed but counts as break
      }
      const limit = hasBreak ? maxWithBreak : maxNoBreak;
      return totalHours > limit;
    }

    // Helper: does the instructor have ANY 'work'-marked availability on a date?
    // Used to override weekend limits — if the instructor is already working that day
    // (e.g. external job), the algorithm may "attach" activities to that day even if it
    // would exceed maxFridaysPerMonth / maxSaturdaysPerMonth / allowConsecutiveWeekend.
    // ALSO checks CRM events: if there's a CRM event on the date assigned to this instructor
    // (by name match), it counts as 'work' even without explicit avail='work' marker.
    const _dateStrForCrm = (date) => {
      const [y,mo] = month.split('-').map(Number);
      return `${y}-${mo.toString().padStart(2,'0')}-${date.toString().padStart(2,'0')}`;
    };
    // Normalize a name: trim, split tokens, sort (so "איתן נייק" matches "נייק איתן")
    const _normName = (n) => (n||'').split(/\s+/).filter(Boolean).map(s => s.replace(/[^֐-׿א-ת؀-ۿa-zA-Z]/g, '').toLowerCase()).sort().join(' ');
    const _instNameTokens = new Map();
    instructors.forEach(i => _instNameTokens.set(i.id, _normName(i.name)));
    const hasWorkOnDate = (instId, date) => {
      const av = availability[`${instId}_${month}`] || {};
      for (const k in av) {
        if (av[k] === 'work' && k.startsWith(`${date}_`)) return true;
      }
      // CRM check: any event on this date where extracted instructor matches inst's name
      if (Array.isArray(crmEvents) && crmEvents.length) {
        const target = _instNameTokens.get(instId) || '';
        if (!target) return false;
        const dateStr = _dateStrForCrm(date);
        for (const e of crmEvents) {
          if (e.startDate !== dateStr) continue;
          if (e.roomId && IGNORED_ROOM_IDS.has(String(e.roomId))) continue;
          const crmName = extractInstructorName(e.text || '');
          if (!crmName) continue;
          if (_normName(crmName) === target) return true;
        }
      }
      return false;
    };

    // CANONICAL HARD-RULES CHECK — every auxiliary pass uses this to ensure consistency.
    // Returns true ONLY if assigning `inst` to `slot` violates NO hard rule.
    // `excludeItemId` (optional): item being replaced/moved (its current state is ignored).
    // `activity` (required): activity object for skill matching.
    // ASSUMPTION: instructorStats has been rebuilt fresh via rebuildInstructorStats() so it
    // accurately reflects newSchedule. Caller is responsible for this.
    const canAssignHard = (inst, slot, activity, excludeItemId) => {
      const skills = inst.skills || [];
      if (!skills.length) return false;
      // Skill (specific OR blanket if activity name not a known skill)
      const hasSpec = skills.includes(activity.name);
      const known = knownSkillsSet.has(activity.name);
      const isClub = activity.activityType === 'club';
      const isAdv = activity.activityType === 'advanced';
      const hasClubBl = isClub && !known && skills.includes('מודרכת מועדון');
      const hasAdvBl = isAdv && !known && skills.includes('מודרכות מתקדמות');
      if (!hasSpec && !hasClubBl && !hasAdvBl) return false;
      // Availability
      if (!isInstructorAvailable(inst, slot.date, slot.startMin, slot.endMin)) return false;
      // Conflict with other items (excluding self)
      const conflict = newSchedule.find(s =>
        s.instructorId === inst.id && s.date === slot.date && s.id !== excludeItemId &&
        s.startHour && timeToMin(s.startHour) < slot.endMin && timeToMin(s.endHour) > slot.startMin
      );
      if (conflict) return false;
      // Daily limit + 1h gap rule (uses stats; for excludeItemId case must compute virtual)
      const stats = instructorStats[inst.id] || {fridayDates:new Set(), saturdayDates:new Set(), slotsByDate:{}, daysByWeek:{}, eveningsByWeek:{}, morningsByWeek:{}, hours:0};
      const maxNoBreak = inst.maxHoursPerDayNoBreak ?? 6;
      const maxWithBreak = inst.maxHoursPerDayWithBreak ?? 8;
      // Build virtual day slots: existing (from newSchedule, excluding self) + new slot
      const dayItems = newSchedule.filter(s =>
        s.instructorId === inst.id && s.date === slot.date && s.id !== excludeItemId && s.startHour
      ).map(s => ({startMin: timeToMin(s.startHour), endMin: timeToMin(s.endHour)}));
      const allSlots = [...dayItems, {startMin: slot.startMin, endMin: slot.endMin}].sort((a,b) => a.startMin - b.startMin);
      const totalMin = allSlots.reduce((sum, s) => sum + (s.endMin - s.startMin), 0);
      const totalHours = totalMin / 60;
      let hasBreak = false;
      for (let i = 0; i < allSlots.length - 1; i++) {
        const g = allSlots[i+1].startMin - allSlots[i].endMin;
        if (g > 60) return false; // HARD: gap > 1h forbidden
        if (g >= 60) hasBreak = true;
      }
      const dayLimit = hasBreak ? maxWithBreak : maxNoBreak;
      if (totalHours > dayLimit) return false;
      // allowSingleActivity gap rule: when active, multiple items same day need >1h gap pair-wise
      if (inst.allowSingleActivity && allSlots.length >= 2) {
        for (let i = 0; i < allSlots.length - 1; i++) {
          const g = allSlots[i+1].startMin - allSlots[i].endMin;
          if (g <= 60) return false;
        }
      }
      // maxFridaysPerMonth / maxSaturdaysPerMonth — virtual (exclude self's date if applicable)
      // OVERRIDE: if instructor has 'work'-marked availability on this date, allow exceeding —
      // we want to "attach" activities to days they're already working.
      if (slot.dayOfWeek === 5) {
        const maxF = inst.maxFridaysPerMonth ?? 1;
        const fSet = new Set(stats.fridayDates);
        if (excludeItemId) {
          const self = newSchedule.find(s => s.id === excludeItemId);
          if (self && self.dayOfWeek === 5 && fSet.has(self.date)) {
            const otherSameDate = newSchedule.some(s =>
              s.id !== excludeItemId && s.instructorId === inst.id && s.date === self.date && s.startHour
            );
            if (!otherSameDate) fSet.delete(self.date);
          }
        }
        if (!fSet.has(slot.date) && fSet.size >= maxF && !hasWorkOnDate(inst.id, slot.date)) return false;
      }
      if (slot.dayOfWeek === 6) {
        const maxS = inst.maxSaturdaysPerMonth ?? 1;
        const sSet = new Set(stats.saturdayDates);
        if (excludeItemId) {
          const self = newSchedule.find(s => s.id === excludeItemId);
          if (self && self.dayOfWeek === 6 && sSet.has(self.date)) {
            const otherSameDate = newSchedule.some(s =>
              s.id !== excludeItemId && s.instructorId === inst.id && s.date === self.date && s.startHour
            );
            if (!otherSameDate) sSet.delete(self.date);
          }
        }
        if (!sSet.has(slot.date) && sSet.size >= maxS && !hasWorkOnDate(inst.id, slot.date)) return false;
      }
      // Consecutive Friday-Saturday rule. OVERRIDE: allow if instructor has 'work'-marked on this date.
      if (!inst.allowConsecutiveWeekend) {
        if (slot.dayOfWeek === 5 && stats.saturdayDates.has(slot.date + 1)) {
          const self = newSchedule.find(s => s.id === excludeItemId);
          if (!(self && self.date === slot.date + 1 && self.dayOfWeek === 6) && !hasWorkOnDate(inst.id, slot.date)) return false;
        }
        if (slot.dayOfWeek === 6 && stats.fridayDates.has(slot.date - 1)) {
          const self = newSchedule.find(s => s.id === excludeItemId);
          if (!(self && self.date === slot.date - 1 && self.dayOfWeek === 5) && !hasWorkOnDate(inst.id, slot.date)) return false;
        }
      }
      // 120% utilization cap (across whole month, excluding self)
      const ideal = inst.idealHours ?? inst.maxHours;
      if (ideal && ideal > 0) {
        const monthHours = newSchedule.filter(s =>
          s.instructorId === inst.id && s.id !== excludeItemId && s.startHour
        ).reduce((sum, s) => sum + (timeToMin(s.endHour) - timeToMin(s.startHour))/60, 0);
        const slotDur = (slot.endMin - slot.startMin)/60;
        if (monthHours + slotDur > ideal * 1.2) return false;
      }
      return true;
    };

    // Score how "contiguous" a slot is with the instructor's ALREADY-ASSIGNED slots on this date.
    // Bonus: prefer SAME BOAT for adjacent activities (no boat transition).
    function contiguityScore(instId, slot) {
      const existing = instructorStats[instId]?.slotsByDate[slot.date] || [];
      if (existing.length === 0) return 0;
      // We also need to look at newSchedule to find which boats the instructor used
      const myItems = newSchedule.filter(s => s.instructorId === instId && s.date === slot.date && s.boatId);
      let before = 0, after = 0;
      let sameBoatBonus = 0;
      for (const e of existing) {
        if (e.endMin <= slot.startMin && slot.startMin - e.endMin <= 60) { before = 1; }
        if (e.startMin >= slot.endMin && e.startMin - slot.endMin <= 60) { after = 1; }
      }
      // Same-boat bonus: if any of my existing items on this date is on the SAME boat AND adjacent
      for (const it of myItems) {
        if (it.boatId !== slot.boatId) continue;
        const itStart = timeToMin(it.startHour), itEnd = timeToMin(it.endHour);
        if ((itEnd <= slot.startMin && slot.startMin - itEnd <= 60) ||
            (itStart >= slot.endMin && itStart - slot.endMin <= 60)) {
          sameBoatBonus = 1; // strong preference — continuous on same boat
        }
      }
      return before + after + sameBoatBonus;
    }

    // Score how "adjacent" a slot is to the instructor's existing work hours.
    // 'work' = busy elsewhere (can't schedule there - filtered earlier). We prefer scheduling
    // RIGHT BEFORE or RIGHT AFTER 'work' time so the instructor has one continuous workday.
    // A gap of 0 or 1 hour counts as adjacent (1h is a normal break). 2+ hour gap = not adjacent.
    // Score: 0 = no adjacency, 1 = adjacent on one side, 2 = adjacent on both sides.
    function adjacencyScore(inst, date, startMin, endMin) {
      const avail = availability[`${inst.id}_${month}`] || {};
      const startH = Math.floor(startMin/60);
      const endH = Math.floor(endMin/60);
      let score = 0;
      // Before: hour immediately before (startH-1) OR with 1h gap (startH-2)
      for (const h of [startH-1, startH-2]) {
        if (h < 0 || h > 23) continue;
        const key = `${date}_${h.toString().padStart(2,'0')}:00`;
        if (avail[key] === 'work') { score++; break; }
      }
      // After: hour immediately after (endH) OR with 1h gap (endH+1)
      for (const h of [endH, endH+1]) {
        if (h < 0 || h > 23) continue;
        const key = `${date}_${h.toString().padStart(2,'0')}:00`;
        if (avail[key] === 'work') { score++; break; }
      }
      return score;
    }

    const instructorHours = new Proxy({}, {get:(_,k)=>instructorStats[k]?.hours||0});

    const newSchedule = [...fixedItems];
    let unassignedInstructor = 0, unassignedSlot = 0;
    const lastDay = daysInMonthArr.length || 30;
    // Global per-day activity load (across all activities) for distribution balance.
    const dayLoad = {};
    // Per-activity per-day count, for "max 2 same activity per day" hard rule
    const sameActivityDayCount = {}; // {`${activityId}_${date}`: count}
    // Per-activity dates already used, for spreading SAME activity across the month
    const activityDatesUsed = {}; // {activityId: [date,date,...]}
    // Weekend student-activity load — target 3 student activities per Fri/Sat day.
    const TARGET_WEEKEND_STUDENT = 3;
    const weekendStudentLoad = {}; // {date: count of student activities on this weekend day}
    fixedItems.forEach(f => {
      if (f.date) {
        dayLoad[f.date] = (dayLoad[f.date]||0) + 1;
        const ak = `${f.activityId}_${f.date}`;
        sameActivityDayCount[ak] = (sameActivityDayCount[ak]||0) + 1;
        if (!activityDatesUsed[f.activityId]) activityDatesUsed[f.activityId] = [];
        activityDatesUsed[f.activityId].push(f.date);
      }
    });
    // Total demands across all activities (for computing average target load per day)
    const totalAllDemands = activities.reduce((s,a) => {
      const sd = Array.isArray(a.specificDates) ? a.specificDates : [];
      return s + (sd.length || Number(a.totalPerMonth) || 0);
    }, 0);
    const avgPerDay = totalAllDemands / Math.max(lastDay, 1);

    // H.1: process activities by DIFFICULTY (hardest first) so easy ones don't squeeze out hard ones.
    // Difficulty heuristic: specific dates/hours, restrictive boats, narrow skill match, fewer eligible instructors.
    function activityDifficulty(act) {
      let score = 0;
      if (Array.isArray(act.specificDates) && act.specificDates.length > 0) score += 50; // date-locked is hardest
      if ((act.specificStartHour||'').trim()) score += 30; // hour-locked
      const boatTypes = (act.allowedBoatTypes||[]).length;
      const boatIds = (act.allowedBoatIds||[]).length;
      if (boatTypes > 0 || boatIds > 0) {
        // Smaller compatible boat set = higher difficulty
        const compatibleBoats = boats.filter(b => isBoatAllowedFor(b.id, b.type||'', act)).length;
        if (compatibleBoats > 0) score += Math.max(0, 30 - compatibleBoats*5);
      }
      // Skill-based eligibility count
      const eligibleInst = instructors.filter(i => {
        const sk = i.skills || [];
        if (sk.length === 0) return false;
        if (sk.includes(act.name)) return true;
        if (act.activityType === 'club' && sk.includes('מודרכת מועדון') && !knownSkillsSet.has(act.name)) return true;
        if (act.activityType === 'advanced' && sk.includes('מודרכות מתקדמות') && !knownSkillsSet.has(act.name)) return true;
        return false;
      }).length;
      if (eligibleInst <= 1) score += 40;
      else if (eligibleInst <= 3) score += 20;
      else if (eligibleInst <= 5) score += 10;
      // Long duration = harder to find slots
      score += (Number(act.durationHours)||3) * 2;
      // Activity type
      if (act.activityType === 'club' || act.activityType === 'advanced') score += 5;
      // Has weekend demand (limited slots)
      if ((Number(act.friday)||0) > 0 || (Number(act.saturday)||0) > 0) score += 15;
      return score;
    }
    const sortedActivities = activities.slice().sort((a,b) => activityDifficulty(b) - activityDifficulty(a));

    for (const activity of sortedActivities) {
      const demands = generateDemands(activity);
      // Skip demands that are already satisfied by manual fixed items for this activity.
      // Clamp: never produce more demands than what generateDemands declares — fixed items beyond that are dropped.
      let alreadyFixed = fixedItems.filter(f => f.activityId === activity.id).length;
      const remainingDemands = alreadyFixed >= demands.length ? [] : demands.slice(alreadyFixed);

      const activityDurationHours = activity.durationHours || 3;
      const activityBuckets = activity.buckets || DEFAULT_BUCKETS;
      const allRuns = getRunsForDuration(activityDurationHours);

      const totalDemands = remainingDemands.length;
      // Per-activity weekend counters — track Friday/Saturday demand position SEPARATELY for proper spreading
      let fridayCounter = 0;
      let saturdayCounter = 0;

      // Helper: total hours instructor already has scheduled on this date
      function dayTotalHours(instId, date) {
        const slots = instructorStats[instId]?.slotsByDate[date] || [];
        return slots.reduce((sum, s) => sum + (s.endMin - s.startMin)/60, 0);
      }
      // Whether assigning this slot leaves the instructor with realistic potential to reach min hours today.
      // - allowSingleActivity → bypass
      // - existing + slot >= min → reached
      // - otherwise: must have enough AVAILABLE hours today to potentially reach min
      function wouldReachMinHours(inst, slot) {
        if (inst.allowSingleActivity) return true;
        const min = inst.minHoursPerDay ?? 5;
        if (!min || min <= 0) return true;
        const existing = dayTotalHours(inst.id, slot.date);
        const slotDur = (slot.endMin - slot.startMin)/60;
        if (existing + slotDur >= min) return true;
        const avail = availability[`${inst.id}_${month}`] || {};
        let availToday = 0;
        for (let h = 0; h < 24; h++) {
          if (avail[`${slot.date}_${h.toString().padStart(2,'0')}:00`] === true) availToday++;
        }
        return availToday >= min;
      }
      // Get effective min hours for an instructor — accounts for activity restrictiveness:
      // For activities restricted to a small set of boats with few qualified instructors,
      // allow ANY instructor (lower min) since the alternative is no schedule.
      const activityIsBottleneck = (() => {
        // Bottleneck = boat-restricted activity AND few qualified instructors
        const boatRestrict = (activity.allowedBoatIds||[]).length > 0;
        const qualifiedCount = instructors.filter(i => {
          const sk = i.skills || [];
          if (!sk.length) return false;
          if (sk.includes(activity.name)) return true;
          if (activity.activityType === 'club' && !knownSkillsSet.has(activity.name) && sk.includes('מודרכת מועדון')) return true;
          if (activity.activityType === 'advanced' && !knownSkillsSet.has(activity.name) && sk.includes('מודרכות מתקדמות')) return true;
          return false;
        }).length;
        return boatRestrict && qualifiedCount <= 5;
      })();

      // Helper: filter & sort eligible instructors for a given slot.
      // Returns {instructor, rejectReasons} — instructor may be null if none eligible.
      // min-hours-per-day is enforced as a HARD constraint (only allowSingleActivity bypasses it).
      function findInstructorForSlot(slot){
        const rejectReasons = {skills:0, avail:0, daily:0, fri:0, sat:0, daysWeek:0, eveWeek:0, conflict:0, minHours:0};
        const eligibleInstructors = instructors.filter(inst => {
          const skills = inst.skills || [];
          // An instructor with NO skills is not certified for anything.
          if (skills.length === 0) { rejectReasons.skills++; return false; }
          // Specific certification always wins.
          const hasSpecific = skills.includes(activity.name);
          // Blanket certifications apply ONLY when the activity name is NOT a recognized specific skill
          // (i.e., no instructor in the system has been certified specifically for this activity).
          const activityHasSpecificSkill = knownSkillsSet.has(activity.name);
          const isClub = (activity.activityType === 'club');
          const isAdvanced = (activity.activityType === 'advanced');
          const hasClubBlanket = isClub && !activityHasSpecificSkill && skills.includes('מודרכת מועדון');
          const hasAdvancedBlanket = isAdvanced && !activityHasSpecificSkill && skills.includes('מודרכות מתקדמות');
          if (!hasSpecific && !hasClubBlanket && !hasAdvancedBlanket) { rejectReasons.skills++; return false; }
          if (!isInstructorAvailable(inst, slot.date, slot.startMin, slot.endMin)) { rejectReasons.avail++; return false; }
          const stats = instructorStats[inst.id];
          if (wouldExceedDailyLimit(inst.id, slot)) { rejectReasons.daily++; return false; }
          if (slot.dayOfWeek === 5) {
            const maxF = inst.maxFridaysPerMonth ?? 1;
            // OVERRIDE: allow if instructor has 'work' availability on this date (attach to existing work)
            if (!stats.fridayDates.has(slot.date) && stats.fridayDates.size >= maxF && !hasWorkOnDate(inst.id, slot.date)) { rejectReasons.fri++; return false; }
          }
          if (slot.dayOfWeek === 6) {
            const maxS = inst.maxSaturdaysPerMonth ?? 1;
            if (!stats.saturdayDates.has(slot.date) && stats.saturdayDates.size >= maxS && !hasWorkOnDate(inst.id, slot.date)) { rejectReasons.sat++; return false; }
          }
          // maxDaysPerWeek = weekdays only (Sun-Thu). Fri/Sat have their own limits.
          if (inst.maxDaysPerWeek && slot.dayOfWeek >= 0 && slot.dayOfWeek <= 4) {
            const wk = weekOf(slot.date);
            const daysSet = stats.daysByWeek[wk];
            if (daysSet && !daysSet.has(slot.date) && daysSet.size >= inst.maxDaysPerWeek) { rejectReasons.daysWeek++; return false; }
          }
          if (inst.maxEveningsPerWeek && slot.bucket === 'evening') {
            const wk = weekOf(slot.date);
            if ((stats.eveningsByWeek[wk]||0) >= inst.maxEveningsPerWeek) { rejectReasons.eveWeek++; return false; }
          }
          // Max mornings per week (morning bucket)
          if (inst.maxMorningsPerWeek && slot.bucket === 'morning') {
            const wk = weekOf(slot.date);
            if ((stats.morningsByWeek?.[wk]||0) >= inst.maxMorningsPerWeek) { rejectReasons.eveWeek++; return false; }
          }
          // Consecutive Fri-Sat rule: if instructor lacks allowConsecutiveWeekend,
          // can't be assigned BOTH Friday D and Saturday D+1 (same weekend).
          // OVERRIDE: allow if instructor has 'work' availability on this date.
          if (!inst.allowConsecutiveWeekend && !hasWorkOnDate(inst.id, slot.date)) {
            if (slot.dayOfWeek === 5) {
              // Adding a Friday — check if a Saturday on date+1 is already assigned to this instructor
              if (stats.saturdayDates.has(slot.date + 1)) { rejectReasons.fri++; return false; }
            }
            if (slot.dayOfWeek === 6) {
              // Adding a Saturday — check if a Friday on date-1 is already assigned
              if (stats.fridayDates.has(slot.date - 1)) { rejectReasons.sat++; return false; }
            }
          }
          const conflict = newSchedule.find(s =>
            s.instructorId === inst.id && s.date === slot.date &&
            s.startHour && timeToMin(s.startHour) < slot.endMin && timeToMin(s.endHour) > slot.startMin
          );
          if (conflict) { rejectReasons.conflict++; return false; }
          // allowSingleActivity rule: multiple activities in same day only allowed with >1h gap.
          // A single activity → OK. Two activities adjacent (≤1h gap) → NOT OK.
          if (inst.allowSingleActivity) {
            const sameDay = newSchedule.filter(s =>
              s.instructorId === inst.id && s.date === slot.date && s.startHour
            );
            for (const other of sameDay) {
              const oStart = timeToMin(other.startHour);
              const oEnd = timeToMin(other.endHour);
              const gap = oStart >= slot.endMin ? oStart - slot.endMin
                        : oEnd <= slot.startMin ? slot.startMin - oEnd
                        : 0;
              if (gap <= 60) { rejectReasons.conflict++; return false; }
            }
          }
          // HARD min-hours check. The only escape: instructor reaches min, has allowSingleActivity,
          // OR this is a "bottleneck" activity (restricted boat + few qualified instructors) where
          // requiring min would leave the activity un-schedulable.
          if (!activityIsBottleneck && !wouldReachMinHours(inst, slot)) {
            rejectReasons.minHours++; return false;
          }
          // HARD UTILIZATION CAP: max 120% of idealHours per instructor per month.
          // Prevents low-priority/short-min instructors from being overloaded.
          const ideal = inst.idealHours ?? inst.maxHours;
          if (ideal) {
            const newTotal = (instructorStats[inst.id]?.hours || 0) + (slot.endMin - slot.startMin)/60;
            if (newTotal > ideal * 1.2) { rejectReasons.daily++; return false; }
          }
          return true;
        }).sort((a, b) => {
          // PRIORITY weighted heavily (-15/0/+15). High instructors clearly preferred.
          const pScore = {high:-15, medium:0, low:15};
          const ca = contiguityScore(a.id, slot);
          const cb = contiguityScore(b.id, slot);
          const ma = wouldReachMinHours(a, slot) ? 1 : 0;
          const mb = wouldReachMinHours(b, slot) ? 1 : 0;
          const aa = adjacencyScore(a, slot.date, slot.startMin, slot.endMin);
          const ab = adjacencyScore(b, slot.date, slot.startMin, slot.endMin);
          // Utilization ratio (current/ideal) — prefer LESS-USED instructors. Range 0-1.
          const idealA = a.idealHours ?? a.maxHours ?? 80;
          const idealB = b.idealHours ?? b.maxHours ?? 80;
          const utilA = idealA > 0 ? (instructorStats[a.id].hours / idealA) : 0;
          const utilB = idealB > 0 ? (instructorStats[b.id].hours / idealB) : 0;
          // v5.71 — C6: STRONG attachment bias. Instructor already working that day (not single-only)
          // gets ×0.6 effect on priority — i.e., behaves as more attractive. Implement as bonus.
          const workA = (!a.allowSingleActivity && hasWorkOnDate(a.id, slot.date)) ? -10 : 0;
          const workB = (!b.allowSingleActivity && hasWorkOnDate(b.id, slot.date)) ? -10 : 0;
          // Also boost when instructor ALREADY has a scheduled slot today in newSchedule (attachment in same run).
          const hasSameDayA = newSchedule.some(s => s.instructorId === a.id && s.date === slot.date && s.startHour) ? -8 : 0;
          const hasSameDayB = newSchedule.some(s => s.instructorId === b.id && s.date === slot.date && s.startHour) ? -8 : 0;
          // v5.71 — E11: preferred-bucket bonus (soft).
          const slotBucketPref = instructorBucketForSlot(slot.startMin);
          const prefA = (a.preferredBucket && a.preferredBucket !== 'none' && a.preferredBucket === slotBucketPref) ? -3 : 0;
          const prefB = (b.preferredBucket && b.preferredBucket !== 'none' && b.preferredBucket === slotBucketPref) ? -3 : 0;
          // v5.71 — D9: same-activity-same-day penalty (discourage repeating same training type for same instructor).
          const sameTypeA = newSchedule.some(s => s.instructorId === a.id && s.date === slot.date && s.activityId === activity.id) ? 5 : 0;
          const sameTypeB = newSchedule.some(s => s.instructorId === b.id && s.date === slot.date && s.activityId === activity.id) ? 5 : 0;
          // Combined score (lower = better). utilization×20 — strong pull toward under-used.
          const scoreA = (pScore[a.priority] ?? 0) - ca*10 - ma*5 - aa*2 + utilA*20 + workA + hasSameDayA + prefA + sameTypeA;
          const scoreB = (pScore[b.priority] ?? 0) - cb*10 - mb*5 - ab*2 + utilB*20 + workB + hasSameDayB + prefB + sameTypeB;
          return scoreA - scoreB;
        });
        return {instructor: eligibleInstructors[0] || null, rejectReasons};
      }

      const isClubActivity = (activity.activityType === 'club');
      const isAdvancedActivity = (activity.activityType === 'advanced');
      const isStudentsActivity = !isClubActivity && !isAdvancedActivity;

      remainingDemands.forEach((demand, demandIdx) => {
        // Filter candidate runs (each run = contiguous slots totaling activityDurationHours on same boat+date)
        // Per-candidate: also memoize the soft-CRM blocker, so we can tag the chosen slot.
        const candSoftBlockers = new Map();
        let candidates = allRuns.filter(slot => {
          if (slot.runSlots.some(s => used.has(`${slot.boatId}_${slot.date}_${s}`))) return false;
          if (!isBoatAllowedFor(slot.boatId, slot.boatType, activity)) return false;
          // Bucket is SOFT — not a hard filter. Mismatch incurs a score penalty (handled below).
          // (Removed: previously rejected here. Now we allow but prefer correct bucket.)
          // Date-fixed demand (from specificDates): only that exact date.
          if (demand.fixedDate != null) {
            if (slot.date !== demand.fixedDate) return false;
          } else if (demand.weekend !== null) {
            if (slot.dayOfWeek !== demand.weekend) return false;
          } else {
            if (slot.dayOfWeek === 5 || slot.dayOfWeek === 6) return false;
          }
          // Time window enforcement (HARD):
          // 1) Explicit activeWindowStart/End (per-activity) wins if set.
          // 2) Else timeMode: 'daylight' (slot fully within daylightStart..daylightEnd),
          //    'dark' (slot fully OUTSIDE daylight), 'any' (no constraint).
          const awsStr = activity.activeWindowStart;
          const aweStr = activity.activeWindowEnd;
          const explicit = (awsStr && /^\d{1,2}:\d{2}$/.test(awsStr)) || (aweStr && /^\d{1,2}:\d{2}$/.test(aweStr));
          if (explicit) {
            if (awsStr && /^\d{1,2}:\d{2}$/.test(awsStr)) {
              const [h,m] = awsStr.split(':').map(Number);
              if (slot.startMin < h*60+m) return false;
            }
            if (aweStr && /^\d{1,2}:\d{2}$/.test(aweStr)) {
              const [h,m] = aweStr.split(':').map(Number);
              if (slot.endMin > h*60+m) return false;
            }
          } else {
            // Only apply daylight/dark check if EXPLICITLY set on the activity.
            // Activities from backups without timeMode → treated as 'any' (no constraint).
            const mode = activity.timeMode;
            if ((mode === 'daylight' || mode === 'dark') && /^\d{1,2}:\d{2}$/.test(daylightStart||'') && /^\d{1,2}:\d{2}$/.test(daylightEnd||'')) {
              const [sh,sm] = daylightStart.split(':').map(Number);
              const [eh,em] = daylightEnd.split(':').map(Number);
              const dStart = sh*60+sm, dEnd = eh*60+em;
              if (mode === 'daylight') {
                if (slot.startMin < dStart || slot.endMin > dEnd) return false;
              } else if (mode === 'dark') {
                const beforeDay = slot.endMin <= dStart;
                const afterDay = slot.startMin >= dEnd;
                if (!beforeDay && !afterDay) return false;
              }
            }
          }
          // HARD RULE: Friday/Saturday slots are reserved for STUDENT-LED activities only.
          // Club AND advanced activities cannot occupy Fri/Sat slots — those are for students.
          if ((slot.dayOfWeek === 5 || slot.dayOfWeek === 6) && !isStudentsActivity && demand.fixedDate == null) return false;
          // HARD RULE: max 2 of the same activity on the same date
          if ((sameActivityDayCount[`${activity.id}_${slot.date}`] || 0) >= 2) return false;
          // v5.71 — C8: weekly quota check. Skip weekday slots when activity's weekly cap reached.
          // Fixed-date demands bypass (user-mandated dates). Weekend demands bypass (separate quota system).
          if (demand.fixedDate == null && demand.weekend == null && isWeeklyQuotaExhausted(activity.id, slot.date, slot.dayOfWeek)) return false;
          const crmStatus = isSlotBlockedByCrm(slot.boatId, slot.date, slot.startMin, slot.endMin);
          if (crmStatus === 'hard') return false;
          if (crmStatus && crmStatus.soft) {
            // Soft block — allowed, but remember the blocker so we can tell the user
            candSoftBlockers.set(slot, crmStatus.text);
          }
          // Friday/Saturday end no later than 14:00 AND start no earlier than 07:00 on Fri / 08:00 on Sat
          if (slot.dayOfWeek === 5 || slot.dayOfWeek === 6) {
            if (slot.endMin > 14*60) return false;
            const minStartMin = slot.dayOfWeek === 6 ? 8*60 : 7*60;
            if (slot.startMin < minStartMin) return false;
          }
          return true;
        });

        if (candidates.length === 0) {
          newSchedule.push({
            id: generateId(),
            activityId: activity.id, activityName: activity.name,
            status: 'no_slot', date: null, boatId: null, instructorId: null
          });
          unassignedSlot++;
          return;
        }

        // Distribute demands across the month
        let targetDay;
        if (demand.fixedDate != null) {
          targetDay = demand.fixedDate;
        } else if (demand.weekend !== null) {
          // CRITICAL FIX: use per-weekend counter so saturday demand #0 → first Saturday, etc.
          // Previously used demandIdx (global) which mis-targeted demands.
          const weekendDates = [...new Set(candidates.map(c => c.date))].sort((a,b) => a-b);
          const weekendIdx = demand.weekend === 5 ? fridayCounter : saturdayCounter;
          targetDay = weekendDates[weekendIdx % Math.max(weekendDates.length, 1)] || 1;
          if (demand.weekend === 5) fridayCounter++; else saturdayCounter++;
        } else {
          targetDay = Math.max(1, Math.min(lastDay, Math.round((demandIdx + 0.5) * lastDay / Math.max(totalDemands, 1))));
        }

        // Per-activity ideal gap between same-activity occurrences (for spread across the month)
        const activityDemandsTotal = totalDemands;
        const idealActivityGap = activityDemandsTotal > 0 ? Math.max(2, lastDay / activityDemandsTotal) : lastDay;
        const usedDatesForActivity = activityDatesUsed[activity.id] || [];

        // Score each candidate: lower is better.
        const scoredCandidates = candidates.map(c => {
          let bestContig = 0, bestWorkAdj = 0;
          for (const inst of instructors) {
            const cs = contiguityScore(inst.id, c);
            if (cs > bestContig) bestContig = cs;
            const wa = adjacencyScore(inst, c.date, c.startMin, c.endMin);
            if (wa > bestWorkAdj) bestWorkAdj = wa;
            if (bestContig >= 2 && bestWorkAdj >= 2) break;
          }
          // Soft-blocked slots cost +20 days (only used when no clean slot exists)
          const softPenalty = candSoftBlockers.has(c) ? 20 : 0;
          // GLOBAL distribution penalty: days already loaded above the average pay a cost.
          const load = dayLoad[c.date] || 0;
          const overloadPenalty = demand.fixedDate != null ? 0 : Math.max(0, load - avgPerDay) * 20;
          // Same-day same-activity penalty: prefer not repeating the same activity on the same day
          const sameDayCount = sameActivityDayCount[`${activity.id}_${c.date}`] || 0;
          const sameDayPenalty = sameDayCount * 100;
          // SAME-ACTIVITY spread across month: avoid clustering this activity in the same week
          let activitySpreadPenalty = 0;
          if (demand.fixedDate == null && usedDatesForActivity.length > 0) {
            let nearest = lastDay;
            for (const d of usedDatesForActivity) {
              const dist = Math.abs(c.date - d);
              if (dist < nearest) nearest = dist;
            }
            // If nearest used date is < idealGap, penalize proportionally
            activitySpreadPenalty = Math.max(0, idealActivityGap - nearest) * 4;
          }
          // Weekend boost for student activities — each weekend day should host 6 student activities.
          // If this slot is on a Fri/Sat that hasn't reached the target, give a strong PULL.
          let weekendBoost = 0;
          if (isStudentsActivity && (c.dayOfWeek === 5 || c.dayOfWeek === 6)) {
            const studentsToday = weekendStudentLoad[c.date] || 0;
            if (studentsToday < TARGET_WEEKEND_STUDENT) {
              weekendBoost = -(TARGET_WEEKEND_STUDENT - studentsToday) * 12; // strong negative score = preferred
            }
          }
          // Bucket mismatch penalty (soft: prefer matching but not required)
          const slotBucketForActivity = classifyBucketWith(c.startMin, activityBuckets);
          const bucketPenalty = (demand.bucket !== 'open' && slotBucketForActivity !== demand.bucket) ? 30 : 0;
          // Penalty: avoid scheduling 2 consecutive קטמנדו for same instructor.
          let consecKatamanduPenalty = 0;
          if (activity.name === 'קטמנדו') {
            const anyAdjacentKatamandu = newSchedule.some(s =>
              s.activityName === 'קטמנדו' && s.date === c.date && s.startHour && s.instructorId &&
              (timeToMin(s.endHour) === c.startMin || timeToMin(s.startHour) === c.endMin)
            );
            if (anyAdjacentKatamandu) consecKatamanduPenalty = 40;
          }
          // v5.71 — D10: month-wide bucket-distribution penalty. Discourage clustering an activity
          // type in the same time-of-day bucket across the month (user's "diversify hours" principle).
          // Only applies to non-fixed, non-weekend demands.
          const bucketDiversityPenalty = (demand.fixedDate == null && demand.weekend == null)
            ? bucketOverRatio(activity.id, c.startMin) * 30 : 0;
          // v5.71 — B5: hard-day-first pull. Harder days (more CRM blocks / fewer instructors) get a small bonus.
          // Lower score = better, so subtract.
          const hardDayBonus = (demand.fixedDate == null) ? -(dayDifficulty[c.date] || 0) * 1.2 : 0;
          const score = Math.abs(c.date - targetDay) - bestContig*50 - bestWorkAdj*20
                      + softPenalty + overloadPenalty + sameDayPenalty + activitySpreadPenalty + weekendBoost + bucketPenalty + consecKatamanduPenalty + bucketDiversityPenalty + hardDayBonus;
          return {c, score};
        });
        scoredCandidates.sort((a,b) => a.score - b.score || a.c.startMin - b.c.startMin);

        // Try candidates in scored order, looking for one with enough eligible instructors (strict).
        const instructorsNeeded = Math.max(1, Number(activity.instructorsNeeded)||1);
        let chosen = null, chosenInstructors = [], lastRejectReasons = null;
        for (const {c: slot} of scoredCandidates) {
          const {instructor, rejectReasons} = findInstructorForSlot(slot);
          lastRejectReasons = rejectReasons;
          if (!instructor) continue;
          // Found at least 1. If more needed, try to fill them too.
          const team = [instructor];
          if (instructorsNeeded > 1) {
            // Temporarily commit this instructor's stats so the next findInstructorForSlot won't pick them again
            const tempCommit = (inst) => { recordStat(inst.id, slot, (slot.endMin-slot.startMin)/60); };
            const tempUndo = (inst) => {
              const s = instructorStats[inst.id]; if(!s) return;
              s.hours -= (slot.endMin-slot.startMin)/60;
              const arr = s.slotsByDate[slot.date]||[];
              const idx = arr.findIndex(x => x.startMin===slot.startMin && x.endMin===slot.endMin);
              if (idx>=0) arr.splice(idx,1);
            };
            for (let extra = 1; extra < instructorsNeeded; extra++) {
              tempCommit(team[team.length-1]);
              const {instructor: more} = findInstructorForSlot(slot);
              if (more && !team.find(t=>t.id===more.id)) team.push(more);
              else break;
            }
            // Undo all temp commits — final commit happens after the slot is officially chosen below
            for (let i = team.length-1; i >= 1; i--) tempUndo(team[i-1]);
          }
          chosen = slot;
          chosenInstructors = team;
          break;
        }

        // If no candidate found any eligible instructor: still place the slot for visibility, but flag as no_instructor
        if (!chosen) {
          chosen = scoredCandidates[0].c;
          chosenInstructors = [];
        }

        const slot = chosen;
        slot.runSlots.forEach(s => used.add(`${slot.boatId}_${slot.date}_${s}`));
        dayLoad[slot.date] = (dayLoad[slot.date]||0) + 1;
        const sadKey = `${activity.id}_${slot.date}`;
        sameActivityDayCount[sadKey] = (sameActivityDayCount[sadKey]||0) + 1;
        if (!activityDatesUsed[activity.id]) activityDatesUsed[activity.id] = [];
        activityDatesUsed[activity.id].push(slot.date);
        // Track weekend student-activity load
        if (isStudentsActivity && (slot.dayOfWeek === 5 || slot.dayOfWeek === 6)) {
          weekendStudentLoad[slot.date] = (weekendStudentLoad[slot.date]||0) + 1;
        }

        const dur = (slot.endMin - slot.startMin) / 60;
        const chosenInstructor = chosenInstructors[0] || null;
        chosenInstructors.forEach(inst => recordStat(inst.id, slot, dur));
        if (!chosenInstructor) unassignedInstructor++;

        let rejectSummary = null;
        if (!chosenInstructor && lastRejectReasons) {
          const labels = {skills:'כישורים',avail:'לא זמין',daily:'מעל מקס יומי',fri:'מקס שישי',sat:'מקס שבת',daysWeek:'ימי שבוע',eveWeek:'ערבים בשבוע',conflict:'התנגשות',minHours:'מתחת למינ׳ יומי'};
          rejectSummary = Object.entries(lastRejectReasons)
            .filter(([k,v]) => v>0)
            .map(([k,v]) => `${labels[k]}:${v}`)
            .join(' · ') || 'אין מדריכים';
        }

        const tentativeBlocker = candSoftBlockers.get(slot) || null;

        const extraInstructors = chosenInstructors.slice(1).map(i => ({id:i.id, name:i.name}));
        const instructorsNeededFinal = Math.max(1, Number(activity.instructorsNeeded)||1);
        const missingInstructors = instructorsNeededFinal - chosenInstructors.length;

        newSchedule.push({
          id: generateId(),
          activityId: activity.id, activityName: activity.name,
          boatId: slot.boatId, boatName: slot.boatName, boatType: slot.boatType,
          date: slot.date, dayOfWeek: slot.dayOfWeek,
          startHour: slot.startHour, endHour: slot.endHour,
          instructorId: chosenInstructor?.id || null,
          instructorName: chosenInstructor?.name || null,
          extraInstructors,
          instructorsNeeded: instructorsNeededFinal,
          missingInstructors: missingInstructors > 0 ? missingInstructors : 0,
          status: chosenInstructor ? (missingInstructors > 0 ? 'partial' : 'assigned') : 'no_instructor',
          rejectSummary,
          tentativeBlocker,
          _placedBy: 'main'
        });
        // v5.71 — A3/C8/D10: consume quota and record bucket on every real placement
        decrementWeeklyQuota(activity.id, slot.date, slot.dayOfWeek);
        recordActivityBucket(activity.id, slot.startMin);
      });
    }

    // RESCUE PASS: before the strict cleanup, try to add up to 3 EXTRA demands of DIFFERENT activities
    // to push below-min instructors above the threshold. These extras go beyond totalPerMonth.
    function computeDailyTotals() {
      const t = {};
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date || !s.startHour) return;
        const key = `${s.instructorId}_${s.date}`;
        const dur = (timeToMin(s.endHour) - timeToMin(s.startHour))/60;
        t[key] = (t[key]||0) + dur;
      });
      return t;
    }
    // v5.71 — C7: Immediate-bundling intent. Was MAX_RESCUES=3 (global cap caused below-min
    // instructors to be stripped). Now uncapped — rescue until every below-min instructor reaches min,
    // or until no qualified slot exists.
    const MAX_RESCUES = 999;
    const rescueActivitiesUsed = new Set();
    let rescueAdded = 0;
    {
      const dailyTotals = computeDailyTotals();
      const belowMinPairs = [];
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date) return;
        const inst = instructors.find(i => i.id === s.instructorId);
        if (!inst || inst.allowSingleActivity) return;
        const min = inst.minHoursPerDay ?? 5;
        if (!min || min <= 0) return;
        const total = dailyTotals[`${s.instructorId}_${s.date}`] || 0;
        if (total >= min) return;
        const key = `${s.instructorId}_${s.date}`;
        if (!belowMinPairs.find(p => p.key === key)) {
          belowMinPairs.push({key, instId: s.instructorId, date: s.date, total, min, missing: min - total});
        }
      });
      // Sort by smallest missing first — easier to fix
      belowMinPairs.sort((a,b) => a.missing - b.missing);
      for (const pair of belowMinPairs) {
        if (rescueActivitiesUsed.size >= MAX_RESCUES) break;
        const inst = instructors.find(i => i.id === pair.instId);
        if (!inst) continue;
        // Find an activity not yet used, that the instructor is qualified for, with a slot adjacent to existing
        // v5.71 — C7: AGGRESSIVE rescue. Keep adding activities until instructor reaches min
        // (or until no qualified slot remains). Removes the old "one activity per pair" limit.
        let stillMissing = pair.missing;
        let attempts = 0;
        while (stillMissing > 0 && attempts < 6) {
          attempts++;
          let placedThisRound = false;
          for (const activity of activities) {
            if ((Number(activity.totalPerMonth)||0) === 0 && (activity.specificDates||[]).length === 0) continue;
            // Skill check
            const skills = inst.skills || [];
            if (skills.length === 0) continue;
            const hasSpecific = skills.includes(activity.name);
            const isClub = activity.activityType === 'club';
            const isAdvanced = activity.activityType === 'advanced';
            const activityHasSpecificSkill = knownSkillsSet.has(activity.name);
            const hasClubBlanket = isClub && !activityHasSpecificSkill && skills.includes('מודרכת מועדון');
            const hasAdvancedBlanket = isAdvanced && !activityHasSpecificSkill && skills.includes('מודרכות מתקדמות');
            if (!hasSpecific && !hasClubBlanket && !hasAdvancedBlanket) continue;
            const dur = activity.durationHours || 3;
            // Skip if this activity already exists on this date for this instructor (D9: same-day diversity).
            const sameActivitySameDay = newSchedule.some(s =>
              s.instructorId === inst.id && s.date === pair.date && s.activityId === activity.id
            );
            if (sameActivitySameDay) continue;
            // Look for a free slot on pair.date that the instructor is available for
            const runs = getRunsForDuration(dur);
            const candidate = runs.find(slot => {
              if (slot.date !== pair.date) return false;
              if (slot.runSlots.some(s => used.has(`${slot.boatId}_${slot.date}_${s}`))) return false;
              if (!isBoatAllowedFor(slot.boatId, slot.boatType, activity)) return false;
              const crmStatus = isSlotBlockedByCrm(slot.boatId, slot.date, slot.startMin, slot.endMin);
              if (crmStatus === 'hard') return false;
              if (slot.dayOfWeek === 5 || slot.dayOfWeek === 6) {
                if (activity.activityType === 'club' || activity.activityType === 'advanced') return false;
                if (slot.endMin > 14*60) return false;
                if (slot.startMin < (slot.dayOfWeek === 6 ? 8*60 : 7*60)) return false;
              }
              if (!isInstructorAvailable(inst, slot.date, slot.startMin, slot.endMin)) return false;
              // Conflict with instructor's existing slots
              const conflict = newSchedule.find(s =>
                s.instructorId === inst.id && s.date === slot.date &&
                s.startHour && timeToMin(s.startHour) < slot.endMin && timeToMin(s.endHour) > slot.startMin
              );
              if (conflict) return false;
              // E12: respect preferredBreakMin — skip if gap to existing slot is non-zero but below preference.
              const breakPref = inst.preferredBreakMin || 0;
              if (breakPref > 0) {
                const sameDay = newSchedule.filter(s => s.instructorId === inst.id && s.date === slot.date && s.startHour);
                for (const other of sameDay) {
                  const oStart = timeToMin(other.startHour), oEnd = timeToMin(other.endHour);
                  const gap = oStart >= slot.endMin ? oStart - slot.endMin
                            : oEnd <= slot.startMin ? slot.startMin - oEnd
                            : 0;
                  if (gap > 0 && gap < breakPref) return false;
                }
              }
              return true;
            });
            if (candidate) {
              // Add rescue item
              candidate.runSlots.forEach(s => used.add(`${candidate.boatId}_${candidate.date}_${s}`));
              newSchedule.push({
                id: generateId(),
                activityId: activity.id, activityName: activity.name,
                boatId: candidate.boatId, boatName: candidate.boatName, boatType: candidate.boatType,
                date: candidate.date, dayOfWeek: candidate.dayOfWeek,
                startHour: candidate.startHour, endHour: candidate.endHour,
                instructorId: inst.id, instructorName: inst.name,
                status: 'assigned',
                _rescue: true,
                _placedBy: 'rescue'
              });
              // Update stats
              const stats = instructorStats[inst.id];
              if (stats) {
                const slotDur = (candidate.endMin - candidate.startMin)/60;
                stats.hours += slotDur;
                if (!stats.slotsByDate[candidate.date]) stats.slotsByDate[candidate.date] = [];
                stats.slotsByDate[candidate.date].push({startMin: candidate.startMin, endMin: candidate.endMin});
                stillMissing -= slotDur;
              }
              rescueActivitiesUsed.add(activity.id);
              rescueAdded++;
              placedThisRound = true;
              recordActivityBucket(activity.id, candidate.startMin);
              break;
            }
          }
          if (!placedThisRound) break;
        }
      }
    }

    // Post-process: iterative cleanup + retry until stable.
    // Track which instructors have been TRIED + FAILED for each item — never re-try the same one.
    // This guarantees convergence: max passes ≤ items × instructors. 50 is far more than enough.
    let minHoursViolations = 0;
    let retried = 0;
    const MAX_CLEANUP_PASSES = 50;
    const itemStripHistory = new Map(); // item.id → Set of instructor IDs already tried and stripped
    for (let pass = 0; pass < MAX_CLEANUP_PASSES; pass++) {
      const dailyTotals = {};
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date || !s.startHour) return;
        const key = `${s.instructorId}_${s.date}`;
        const dur = (timeToMin(s.endHour) - timeToMin(s.startHour))/60;
        dailyTotals[key] = (dailyTotals[key]||0) + dur;
      });
      const strippedItems = [];
      newSchedule.forEach(s => {
        if (!s.instructorId || !s.date || s._userEdited) return;
        const inst = instructors.find(i => i.id === s.instructorId);
        if (!inst || inst.allowSingleActivity) return;
        // Bottleneck activities: don't strip even if below min — the alternative is no instructor at all.
        const act = activities.find(a => a.id === s.activityId);
        if (act) {
          const boatRestrict = (act.allowedBoatIds||[]).length > 0;
          if (boatRestrict) {
            const qualifiedCount = instructors.filter(i => {
              const sk = i.skills || [];
              if (!sk.length) return false;
              if (sk.includes(act.name)) return true;
              if (act.activityType === 'club' && !knownSkillsSet.has(act.name) && sk.includes('מודרכת מועדון')) return true;
              if (act.activityType === 'advanced' && !knownSkillsSet.has(act.name) && sk.includes('מודרכות מתקדמות')) return true;
              return false;
            }).length;
            if (qualifiedCount <= 5) return; // bottleneck — don't strip
          }
        }
        const min = inst?.minHoursPerDay ?? 5;
        if (!min || min <= 0) return;
        const total = dailyTotals[`${s.instructorId}_${s.date}`] || 0;
        if (total < min) {
          strippedItems.push({item: s, stripped: inst});
          if (!itemStripHistory.has(s.id)) itemStripHistory.set(s.id, new Set());
          itemStripHistory.get(s.id).add(inst.id);
          s.instructorId = null;
          s.instructorName = null;
          s.status = 'no_instructor';
          s.rejectSummary = `${inst.name} מתחת למינ׳ יומי (${total}/${min}ש׳) - הוסר`;
          if (pass === 0) minHoursViolations++;
        }
      });
      // Undo the stripped instructors' stats so they're free for other slots
      strippedItems.forEach(({item, stripped}) => {
        const stats = instructorStats[stripped.id];
        if (stats) {
          const dur = (timeToMin(item.endHour) - timeToMin(item.startHour))/60;
          stats.hours -= dur;
          const arr = stats.slotsByDate[item.date] || [];
          const idx = arr.findIndex(x => x.startMin === timeToMin(item.startHour) && x.endMin === timeToMin(item.endHour));
          if (idx >= 0) arr.splice(idx, 1);
          // If no more items for this instructor on this date, clear weekend tracking
          const stillHasItemsOnDate = newSchedule.some(s =>
            s.instructorId === stripped.id && s.date === item.date && s.id !== item.id && s.startHour
          );
          if (!stillHasItemsOnDate) {
            stats.fridayDates.delete(item.date);
            stats.saturdayDates.delete(item.date);
          }
        }
      });
      if (strippedItems.length === 0) break; // Stable — no more strips needed
      // Retry: find new instructor for each stripped item
      let retriedThisPass = 0;
      newSchedule.forEach(item => {
      if (item.instructorId || !item.boatId || !item.date || item._userEdited) return;
      const activity = activities.find(a => a.id === item.activityId);
      if (!activity) return;
      const slot = {
        boatId: item.boatId, boatName: item.boatName, boatType: item.boatType,
        date: item.date, dayOfWeek: item.dayOfWeek,
        startMin: timeToMin(item.startHour), endMin: timeToMin(item.endHour),
        startHour: item.startHour, endHour: item.endHour,
        bucket: classifyBucket(timeToMin(item.startHour))
      };
      // Local find: same logic as findInstructorForSlot but inline.
      // CRITICAL: exclude instructors already stripped from THIS item to prevent oscillation.
      const triedForThisItem = itemStripHistory.get(item.id) || new Set();
      const eligible = instructors.filter(inst => {
        if (triedForThisItem.has(inst.id)) return false;
        const skills = inst.skills || [];
        if (skills.length === 0) return false;
        const hasSpecific = skills.includes(activity.name);
        const isClub = activity.activityType === 'club';
        const isAdvanced = activity.activityType === 'advanced';
        const activityHasSpecificSkill = knownSkillsSet.has(activity.name);
        const hasClubBlanket = isClub && !activityHasSpecificSkill && skills.includes('מודרכת מועדון');
        const hasAdvancedBlanket = isAdvanced && !activityHasSpecificSkill && skills.includes('מודרכות מתקדמות');
        if (!hasSpecific && !hasClubBlanket && !hasAdvancedBlanket) return false;
        if (!isInstructorAvailable(inst, slot.date, slot.startMin, slot.endMin)) return false;
        if (wouldExceedDailyLimit(inst.id, slot)) return false;
        const stats = instructorStats[inst.id];
        if (slot.dayOfWeek === 5) {
          const maxF = inst.maxFridaysPerMonth ?? 1;
          if (!stats.fridayDates.has(slot.date) && stats.fridayDates.size >= maxF && !hasWorkOnDate(inst.id, slot.date)) return false;
        }
        if (slot.dayOfWeek === 6) {
          const maxS = inst.maxSaturdaysPerMonth ?? 1;

    function makeSlot(item) {

    {

    }

            if (inst.allowSingleActivity) {
              const sameDay = [...newSchedule.filter(s => s.instructorId === inst.id && s.date === slot.date && s.startHour), ...myGhosts];
              let gapOk = true;
              for (const other of sameDay) {
                const oStart = timeToMin(other.startHour), oEnd = timeToMin(other.endHour);
                const gap = oStart >= slot.endMin ? oStart - slot.endMin : oEnd <= slot.startMin ? slot.startMin - oEnd : 0;
                if (gap <= 60) { gapOk = false; break; }
              }
              if (!gapOk) continue;
            }
            // v5.71 — E12: respect preferredBreakMin (soft, same check as in BUNDLED #1)
            if (inst.preferredBreakMin && inst.preferredBreakMin > 0) {
              const sameDayPref = [...newSchedule.filter(s => s.instructorId === inst.id && s.date === slot.date && s.startHour), ...myGhosts];
              let prefOk = true;
              for (const other of sameDayPref) {
                const oStart = timeToMin(other.startHour), oEnd = timeToMin(other.endHour);
                const gap = oStart >= slot.endMin ? oStart - slot.endMin : oEnd <= slot.startMin ? slot.startMin - oEnd : 0;
                if (gap > 0 && gap < inst.preferredBreakMin) { prefOk = false; break; }
              }
              if (!prefOk) continue;
            }
            // Daily limit + gap≤1h rule (with virtual myGhosts included)
            {
              const existing = (instructorStats[inst.id]?.slotsByDate[slot.date]||[]).slice();
              myGhosts.forEach(mg => existing.push({startMin: timeToMin(mg.startHour), endMin: timeToMin(mg.endHour)}));
              const all = [...existing, {startMin: slot.startMin, endMin: slot.endMin}].sort((a,b) => a.startMin - b.startMin);
              const totalH = all.reduce((s, sl) => s + (sl.endMin - sl.startMin), 0)/60;
              let hb = false, gapOk = true;
              for (let i = 0; i < all.length - 1; i++) {
                const gp = all[i+1].startMin - all[i].endMin;
                if (gp > 60) { gapOk = false; break; }
                if (gp >= 60) hb = true;
              }
              if (!gapOk) continue;
              const lim = hb ? (inst.maxHoursPerDayWithBreak ?? 8) : (inst.maxHoursPerDayNoBreak ?? 6);
              if (totalH > lim) continue;
            }
            const stats = instructorStats[inst.id] || {fridayDates: new Set(), saturdayDates: new Set()};
            const workOverride = hasWorkOnDate(inst.id, slot.date);
            if (slot.dayOfWeek === 5) {
              const maxF = inst.maxFridaysPerMonth ?? 1;
              if (!stats.fridayDates.has(slot.date) && stats.fridayDates.size >= maxF && !workOverride) continue;
            }
            if (slot.dayOfWeek === 6) {
              const maxS = inst.maxSaturdaysPerMonth ?? 1;
              if (!stats.saturdayDates.has(slot.date) && stats.saturdayDates.size >= maxS && !workOverride) continue;
            }
            if (!inst.allowConsecutiveWeekend && !workOverride) {
              if (slot.dayOfWeek === 5 && stats.saturdayDates.has(slot.date + 1)) continue;
              if (slot.dayOfWeek === 6 && stats.fridayDates.has(slot.date - 1)) continue;
            }
            myGhosts.push(g);
          }
          if (myGhosts.length === 0) continue;
          const existingHours = newSchedule.filter(s => s.instructorId === inst.id && s.date === date && s.startHour)
            .reduce((sum, s) => sum + (timeToMin(s.endHour) - timeToMin(s.startHour))/60, 0);
          const ghostHours = myGhosts.reduce((sum, g) => sum + (timeToMin(g.endHour) - timeToMin(g.startHour))/60, 0);
          const total = existingHours + ghostHours;
          const min = inst.allowSingleActivity ? 0 : (inst.minHoursPerDay ?? 5);
          if (total < min) continue;
          const ideal = inst.idealHours ?? inst.maxHours;
          if (ideal) {
            const monthH = newSchedule.filter(s => s.instructorId === inst.id && s.startHour)
              .reduce((sum, s) => sum + (timeToMin(s.endHour) - timeToMin(s.startHour))/60, 0);
            if (monthH + ghostHours > ideal * 1.2) continue;
          }
          for (const g of myGhosts) {
            g.instructorId = inst.id;
            g.instructorName = inst.name;
            g.status = 'assigned';
            g.rejectSummary = null;
            g._bundled = true;
            g._placedBy = 'bundled';
            const stats2 = instructorStats[inst.id];
            if (stats2) {
              const dur = (timeToMin(g.endHour) - timeToMin(g.startHour))/60;
              stats2.hours += dur;
              if (!stats2.slotsByDate[date]) stats2.slotsByDate[date] = [];
              stats2.slotsByDate[date].push({startMin: timeToMin(g.startHour), endMin: timeToMin(g.endHour)});
              if (g.dayOfWeek === 5) stats2.fridayDates.add(date);
              if (g.dayOfWeek === 6) stats2.saturdayDates.add(date);
